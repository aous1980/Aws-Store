<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة متجر Aws Store - النسخة المصلحة</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.14.0/Sortable.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #121212; color: #fff; padding: 20px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        .admin-panel { width: 100%; max-width: 600px; background: #1e1e1e; padding: 25px; border-radius: 15px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #00ff88; margin-top: 0; }
        .status-indicator { font-size: 12px; text-align: center; margin-bottom: 15px; color: #888; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: #252525; color: #fff; outline: none; box-sizing: border-box; }
        input:focus { border-color: #00ff88; }
        .save-btn { background: #00ff88; color: #000; font-weight: bold; cursor: pointer; border: none; font-size: 16px; }
        .save-btn:hover { background: #00cc6e; }
        .edit-mode { background: #ffcc00 !important; color: #000 !important; }
        
        .app-list-container { width: 100%; max-width: 600px; margin-top: 30px; }
        .app-item { background: #1c2329; padding: 15px; margin: 10px 0; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #2d353b; cursor: grab; }
        .app-item:active { cursor: grabbing; }
        .controls { display: flex; gap: 8px; }
        .btn-sm { width: auto; padding: 6px 15px; font-size: 13px; cursor: pointer; border: none; border-radius: 5px; color: #fff; font-weight: bold; }
        .del-btn { background: #ff4757; }
        .edit-btn { background: #00a2ff; }
        .cancel-btn { background: #444; display: none; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="admin-panel">
        <h2 id="formTitle">إضافة تطبيق جديد</h2>
        <div id="connectionStatus" class="status-indicator">جاري الاتصال بقاعدة البيانات...</div>
        
        <input type="text" id="appName" placeholder="اسم التطبيق (مثال: دراما سلاير)">
        <input type="text" id="appUrl" placeholder="رابط التحميل المباشر">
        <input type="text" id="appImg" placeholder="رابط أيقونة التطبيق">
        <input type="text" id="appVer" placeholder="الإصدار (مثال: v2.1)">
        
        <label style="font-size: 14px; color: #00ff88;">اختر القسم:</label>
        <select id="categorySelect">
            <option value="">-- يرجى إضافة قسم أولاً --</option>
        </select>
        
        <div style="display:flex; gap:8px;">
            <input type="text" id="newCat" placeholder="أدخل اسم قسم جديد">
            <button onclick="addCat()" style="width:120px; background: #333; margin: 8px 0;">➕ إضافة</button>
        </div>
        
        <button id="submitBtn" class="save-btn" onclick="saveData()">🚀 حفظ ونشر التطبيق</button>
        <button id="cancelBtn" class="cancel-btn" onclick="resetForm()">إلغاء التعديل</button>
    </div>

    <div class="app-list-container">
        <h3 style="border-right: 4px solid #00ff88; padding-right: 10px;">إدارة التطبيقات المنشورة:</h3>
        <div id="itemsContainer">
