<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Aws Store | Login Fix</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #0b0f12; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; border: 1px solid #00ff88; text-align: center; width: 350px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #161b22; color: white; box-sizing: border-box; }
        button { background: #00ff88; color: black; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        #adminPanel { display: none; width: 90%; max-width: 800px; background: #161b22; padding: 20px; border-radius: 15px; }
    </style>
</head>
<body>

    <div id="loginSection" class="login-box">
        <h2 style="color: #00ff88;">Aws Store Admin</h2>
        <input type="email" id="userEmail" placeholder="البريد الإلكتروني">
        <input type="password" id="userPass" placeholder="كلمة المرور">
        <button onclick="checkAuth()">تسجيل الدخول</button>
    </div>

    <div id="adminPanel">
        <h2 style="color: #00ff88; text-align: center;">تم تسجيل الدخول بنجاح ✅</h2>
        <p style="text-align: center;">مرحباً بك: aous.safaa.hd.1980@gmail.com</p>
        <hr>
        <button onclick="location.reload()" style="background: #ff4444; color: white;">خروج آمن</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBcWwHSDX9kWVxbw1DLgGkTJoYFSBsdeuk",
            authDomain: "aws-store-aaf40.firebaseapp.com",
            databaseURL: "https://aws-store-aaf40-default-rtdb.firebaseio.com",
            projectId: "aws-store-aaf40",
            appId: "1:962301504605:web:96661f5c465b2cfd4331b4"
        };
        firebase.initializeApp(firebaseConfig);

        function checkAuth() {
            // سحب البيانات مع تنظيفها من المسافات وتحويل الإيميل لحروف صغيرة
            const emailInput = document.getElementById('userEmail').value.trim().toLowerCase();
            const passInput = document.getElementById('userPass').value.trim();

            const correctEmail = "aous.safaa.hd.1980@gmail.com";
            const correctPass = "ashd1980";

            if (emailInput === correctEmail && passInput === correctPass) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
            } else {
                alert("⚠️ خطأ في البيانات! تأكد من كتابة الإيميل والباسوورد بشكل صحيح.");
            }
        }
    </script>
</body>
</html>
