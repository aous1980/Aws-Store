<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>🔐 لوحة التحكم - Aws Store</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f8f9fa; padding: 20px; direction: rtl; }
        .admin-panel { width: 480px; background: white; margin: auto; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: center; border: 2px solid #333; }
        h1 { font-size: 26px; font-weight: bold; margin-bottom: 30px; text-decoration: underline; }
        
        .field-container { margin-bottom: 20px; text-align: right; }
        .label-text { display: block; font-weight: bold; margin-bottom: 8px; font-size: 18px; }
        
        .input-row { display: flex; border: 2px solid #000; border-radius: 6px; overflow: hidden; background: #fff; }
        .input-row input { flex: 1; border: none; padding: 12px; outline: none; text-align: center; font-size: 16px; }
        .input-row button { border: none; background: #eee; padding: 0 15px; cursor: pointer; border-right: 2px solid #000; font-weight: bold; }
        
        .category-section { margin: 25px 0; display: flex; align-items: center; justify-content: center; gap: 15px; }
        select { font-size: 20px; font-weight: bold; border: none; border-bottom: 2px solid #000; cursor: pointer; }

        .add-btn { background: none; border: none; cursor: pointer; margin-top: 20px; }
        .add-btn .icon { font-size: 60px; display: block; line-height: 1; color: #000; }
        .add-btn .text { font-size: 24px; font-weight: bold; display: block; color: #000; }

        .manage-section { margin-top: 40px; text-align: right; border-top: 3px double #333; padding-top: 20px; }
        .app-item { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 10px; border: 1px solid #000; margin-bottom: 8px; border-radius: 5px; }
        .delete-btn { background: #ff4d4d; color: white; border: 1px solid #000; padding: 5px 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="admin-panel">
        <h1>🔐 لوحة التحكم</h1>

        <div class="field-container">
            <span class="label-text">اسم التطبيق</span>
            <div class="input-row">
                <input type="text" id="appName" placeholder="اكتب اسم التطبيق">
            </div>
        </div>

        <div class="field-container">
            <span class="label-text">رابط التطبيق</span>
            <div class="input-row">
                <button onclick="document.getElementById('appUrl').focus()">تعديل</button>
                <button onclick="document.getElementById('appUrl').value=''">حذف</button>
                <input type="text" id="appUrl" placeholder="https://...">
            </div>
        </div>

        <div class="field-container">
            <span class="label-text">رابط صورة التطبيق</span>
            <div class="input-row">
                <button onclick="document.getElementById('appImg').focus()">تعديل</button>
                <button onclick="document.getElementById('appImg').value=''">حذف</button>
                <input type="text" id="appImg" placeholder="رابط الصورة">
            </div>
        </div>

        <div class="category-section">
            <label>تثبيت في قسم:</label>
            <select id="category">
                <option value="apps">التطبيقات (Apps)</option>
                <option value="sat">Sat Softwar</option>
            </select>
        </div>

        <button class="add-btn" onclick="saveData()">
            <span class="icon">➕</span>
            <span class="text">إضافة</span>
        </button>

        <div class="manage-section">
            <h3>📦 إدارة التطبيقات المضافة:</h3>
            <div id="appList"></div>
        </div>
    </div>

    <script>
        const DB_KEY = 'aws_store_final_db';

        function saveData() {
            const name = document.getElementById('appName').value.trim();
            const url = document.getElementById('appUrl').value.trim();
            const img = document.getElementById('appImg').value.trim();
            const cat = document.getElementById('category').value;

            if (name && url && img) {
                let store = JSON.parse(localStorage.getItem(DB_KEY)) || [];
                store.push({ name, url, img, cat });
                localStorage.setItem(DB_KEY, JSON.stringify(store));
                
                // تصفير الخانات
                document.getElementById('appName').value = "";
                document.getElementById('appUrl').value = "";
                document.getElementById('appImg').value = "";
                
                renderList();
                alert("✅ تم الحفظ بنجاح!");
            } else {
                alert("⚠️ يرجى ملء كافة البيانات");
            }
        }

        function renderList() {
            const listDiv = document.getElementById('appList');
            const store = JSON.parse(localStorage.getItem(DB_KEY)) || [];
