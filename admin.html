<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 لوحة تحكم Aws Store</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .admin-panel { width: 100%; max-width: 500px; background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); text-align: center; }
        h1 { font-size: 22px; color: #1a1a1a; margin-bottom: 20px; border-bottom: 2px solid #000; padding-bottom: 10px; }
        .input-group { margin-bottom: 15px; text-align: right; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e1e1e1; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; transition: border-color 0.3s; }
        input:focus { border-color: #000; }
        .add-btn { width: 100%; background: #000; color: #fff; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; margin-top: 10px; }
        .add-btn:active { transform: scale(0.98); }
        .manage-list { width: 100%; max-width: 500px; margin-top: 30px; }
        .app-item { background: #fff; padding: 15px; margin-bottom: 10px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .app-info { text-align: right; }
        .del-btn { background: #ff4757; color: #fff; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="admin-panel">
        <h1>إضافة تطبيق جديد للمتجر</h1>
        
        <div class="input-group">
            <label>اسم التطبيق:</label>
            <input type="text" id="appName" placeholder="مثلاً: واتساب الذهبي">
        </div>

        <div class="input-group">
            <label>رابط التحميل:</label>
            <input type="text" id="appUrl" placeholder="https://...">
        </div>

        <div class="input-group">
            <label>رابط أيقونة الصورة:</label>
            <input type="text" id="appImg" placeholder="https://...">
        </div>

        <div class="input-group">
            <label>القسم:</label>
            <select id="category">
                <option value="apps">📱 التطبيقات (Apps)</option>
                <option value="sat">🛰️ Sat Softwar</option>
            </select>
        </div>

        <button class="add-btn" onclick="saveData()">🚀 حفظ ونشر الآن</button>
    </div>

    <div class="manage-list">
        <h3 style="text-align: right;">📦 التطبيقات المنشورة حالياً:</h3>
        <div id="statusList"></div>
    </div>

    <script>
        const firebaseConfig = {
            databaseURL: "https://aws-store-aaf40-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref("apps");

        function saveData() {
            const name = document.getElementById('appName').value.trim();
            const url = document.getElementById('appUrl').value.trim();
            const img = document.getElementById('appImg').value.trim();
            const cat = document.getElementById('category').value;

            if (name && url && img) {
                db.push({ name, url, img, cat })
                .then(() => {
                    alert("✅ تم النشر بنجاح!");
                    document.getElementById('appName').value = "";
                    document.getElementById('appUrl').value = "";
                    document.getElementById('appImg').value = "";
                });
            } else {
                alert("⚠️ يرجى ملء جميع الحقول!");
            }
        }

        db.on('value', (snapshot) => {
            const listDiv = document.getElementById('statusList');
            listDiv.innerHTML = "";
            snapshot.forEach((child) => {
                const item = child.val();
                listDiv.innerHTML += `
                    <div class="app-item">
                        <div class="app-info">
                            <strong>${item.name}</strong> <br>
                            <small style="color:gray;">${item.cat === 'apps' ? 'تطبيقات' : 'ستلايت'}</small>
                        </div>
                        <button class="del-btn" onclick="deleteItem('${child.key}')">حذف</button>
                    </div>
                `;
            });
        });

        function deleteItem(id) {
            if (confirm("هل أنت متأكد من حذف هذا التطبيق نهائياً؟")) {
                db.child(id).remove();
            }
        }
    </script>
</body>
</html>
