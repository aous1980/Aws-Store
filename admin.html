<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة Aws Store | نظام الملاحظات</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0f12; color: white; direction: rtl; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .panel { background: #161b20; padding: 25px; border-radius: 15px; border: 1px solid #bc13fe; margin-bottom: 20px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #2d353b; background: #1c2329; color: white; box-sizing: border-box; }
        .btn-main { background: #bc13fe; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        .app-item { background: #1c2329; padding: 15px; margin: 10px 0; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #2d353b; }
        .btn-edit { background: #f1c40f; color: black; padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }
        .btn-del { background: #ff4757; color: white; padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="panel" id="mainForm">
            <h2 id="formTitle">إضافة تطبيق جديد</h2>
            <input type="hidden" id="editKey">
            <input type="text" id="appName" placeholder="اسم التطبيق">
            <input type="text" id="appUrl" placeholder="رابط التحميل">
            <input type="text" id="appImg" placeholder="رابط الأيقونة">
            <input type="text" id="appVer" placeholder="الإصدار">
            <textarea id="appNotes" rows="4" placeholder="اكتب هنا شرح التحديث أو الملاحظات الهامة للمستخدم..."></textarea>
            <label>القسم:</label>
            <select id="categorySelect"></select>
            <button class="btn-main" id="submitBtn" onclick="saveData()">حفظ البيانات للمتجر</button>
            <button id="cancelBtn" onclick="resetForm()" style="display:none; background:#555; margin-top:10px;" class="btn-main">إلغاء</button>
        </div>

        <div class="panel">
            <h2>إدارة الأقسام</h2>
            <div style="display: flex; gap: 10px;"><input type="text" id="newCatName" placeholder="اسم القسم الجديد" style="margin:0;"><button onclick="addCat()" style="background: #2ed573; width: 120px;" class="btn-main">إضافة</button></div>
            <div id="catList" style="margin-top:15px;"></div>
        </div>

        <div class="panel"><h2>قائمة التطبيقات</h2><div id="appList"></div></div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBcWwHSDX9kWVxbw1DLgGkTJoYFSBsdeuk",
        authDomain: "aws-store-aaf40.firebaseapp.com",
        databaseURL: "https://aws-store-aaf40-default-rtdb.firebaseio.com",
        projectId: "aws-store-aaf40",
        appId: "1:962301504605:web:96661f5c465b2cfd4331b4"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref().on('value', snap => {
        const data = snap.val() || {};
        const catSelect = document.getElementById('categorySelect');
        const catListDiv = document.getElementById('catList');
        const appListDiv = document.getElementById('appList');
        
        catSelect.innerHTML = ""; catListDiv.innerHTML = ""; appListDiv.innerHTML = "";
        
        if(data.categories) {
            Object.keys(data.categories).forEach(id => {
                const name = data.categories[id].name;
                catSelect.innerHTML += `<option value="${name}">${name}</option>`;
                catListDiv.innerHTML += `<div class="app-item"><span>${name}</span><button class="btn-del" onclick="deleteItem('categories/${id}')">حذف</button></div>`;
            });
        }
        if(data.apps) {
            Object.keys(data.apps).forEach(id => {
                const app = data.apps[id];
                appListDiv.innerHTML += `<div class="app-item"><span>${app.name} (${app.cat})</span><div><button class="btn-edit" onclick="editApp('${id}', ${JSON.stringify(app).replace(/"/g, '&quot;')})">تعديل</button><button class="btn-del" onclick="deleteItem('apps/${id}')">حذف</button></div></div>`;
            });
        }
    });

    function saveData() {
        const key = document.getElementById('editKey').value;
        const appData = {
            name: document.getElementById('appName').value,
            url: document.getElementById('appUrl').value,
            img: document.getElementById('appImg').value,
            ver: document.getElementById('appVer').value,
            cat: document.getElementById('categorySelect').value,
            notes: document.getElementById('appNotes').value || ""
        };
        if(key) db.ref('apps/' + key).update(appData).then(() => resetForm());
        else db.ref('apps').push(appData).then(() => resetForm());
    }

    function editApp(id, app) {
        document.getElementById('editKey').value = id;
        document.getElementById('appName').value = app.name;
        document.getElementById('appUrl').value = app.url;
        document.getElementById('appImg').value = app.img;
        document.getElementById('appVer').value = app.ver || "";
        document.getElementById('appNotes').value = app.notes || "";
        document.getElementById('categorySelect').value = app.cat;
        document.getElementById('submitBtn').innerText = "تحديث التعديلات";
        document.getElementById('cancelBtn').style.display = "block";
    }

    function resetForm() { document.getElementById('editKey').value = ""; document.getElementById('appName').value = ""; document.getElementById('appUrl').value = ""; document.getElementById('appImg').value = ""; document.getElementById('appVer').value = ""; document.getElementById('appNotes').value = ""; document.getElementById('submitBtn').innerText = "حفظ البيانات للمتجر"; document.getElementById('cancelBtn').style.display = "none"; }
    function addCat() { const name = document.getElementById('newCatName').value; if(name) db.ref('categories').push({name}).then(()=>document.getElementById('newCatName').value=""); }
    function deleteItem(p) { if(confirm("حذف؟")) db.ref(p).remove(); }
</script>
</body>
</html>
