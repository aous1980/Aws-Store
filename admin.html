<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Admin - Aws Store</title>
</head>

<body style="background:#111;color:#fff;font-family:Arial;text-align:center">

<h1>🔐 لوحة التحكم</h1>

<input id="img" placeholder="رابط الصورة"><br><br>
<input id="url" placeholder="رابط التحميل"><br><br>

<select id="type">
  <option value="apps">📱 تطبيقات</option>
  <option value="sat">🛰️ SatSoftware</option>
</select>

<br><br>

<button onclick="add()">➕ إضافة</button>

<hr>

<h2>📦 الإدارة</h2>
<div id="list"></div>

<script>

function load(){
  let data = JSON.parse(localStorage.getItem("store")) || [];
  let box = document.getElementById("list");
  box.innerHTML = "";

  data.forEach((item,index)=>{
    box.innerHTML += `
      <div style="margin:10px;padding:10px;background:#222">
        <img src="${item.img}" width="80"><br>
        <a href="${item.url}" target="_blank">فتح</a><br><br>

        <button onclick="del(${index})" style="background:red;color:#fff">
          حذف
        </button>
      </div>
    `;
  });
}

function add(){
  let img = document.getElementById("img").value;
  let url = document.getElementById("url").value;
  let type = document.getElementById("type").value;

  let data = JSON.parse(localStorage.getItem("store")) || [];

  data.push({img,url,type});

  localStorage.setItem("store", JSON.stringify(data));

  load();
}

function del(i){
  let data = JSON.parse(localStorage.getItem("store")) || [];

  data.splice(i,1);

  localStorage.setItem("store", JSON.stringify(data));

  load();
}

load();

</script>

</body>
</html>
