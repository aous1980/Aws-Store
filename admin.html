<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم - Aws Store</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f4f4; }
        .box { background: white; max-width: 450px; margin: auto; padding: 20px; border: 2px solid #000; border-radius: 10px; }
        .input-group { margin-bottom: 15px; text-align: right; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input { width: 95%; padding: 10px; border: 1px solid #000; }
        select { width: 100%; padding: 10px; font-weight: bold; margin-top: 10px; }
        .add-btn { background: #000; color: #fff; border: none; padding: 15px 30px; font-size: 20px; cursor: pointer; margin-top: 20px; width: 100%; }
        .list { margin-top: 30px; text-align: right; border-top: 2px solid #000; padding-top: 10px; }
        .item { background: #fff; border: 1px solid #ccc; padding: 10px; margin-bottom: 5px; display: flex; justify-content: space-between; }
        .del { background: red; color: white; border: none; padding: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="box">
        <h1>🔐 لوحة التحكم</h1>

        <div class="input-group">
            <label>اسم التطبيق</label>
            <input type="text" id="name" placeholder="اكتب الاسم...">
        </div>

        <div class="input-group">
            <label>رابط التحميل</label>
            <input type="text" id="link" placeholder="ضع الرابط هنا...">
        </div>

        <div class="input-group">
            <label>رابط الصورة</label>
            <input type="text" id="img" placeholder="ضع رابط الصورة هنا...">
        </div>

        <label>اختر القسم:</label>
        <select id="cat">
            <option value="apps">التطبيقات (Apps)</option>
            <option value="sat">Sat Softwar</option>
        </select>

        <button class="add-btn" id="saveBtn">➕ إضافة للمتجر</button>

        <div class="list" id="appList">
            <h3>التطبيقات المضافة:</h3>
            <div id="itemsBox"></div>
        </div>
    </div>

    <script>
        // اسم قاعدة البيانات
        const DB_NAME = "aws_store_v1";

        // وظيفة الحفظ
        document.getElementById('saveBtn').onclick = function() {
            const name = document.getElementById('name').value;
            const link = document.getElementById('link').value;
            const img = document.getElementById('img').value;
            const cat = document.getElementById('cat').value;

            if (name && link && img) {
                // جلب البيانات القديمة
                let data = JSON.parse(localStorage.getItem(DB_NAME)) || [];
                
                // إضافة الجديد
                data.push({ name, link, img, cat });
                
                // حفظ
                localStorage.setItem(DB_NAME, JSON.stringify(data));
                
                alert("تمت الإضافة بنجاح ✅");
                
                // تصفير الخانات
                document.getElementById('name').value = "";
                document.getElementById('link').value = "";
                document.getElementById('img').value = "";
                
                showData(); // تحديث القائمة
            } else {
                alert("يرجى ملء جميع الخانات ⚠️");
            }
        };

        // وظيفة العرض والحذف
        function showData() {
            const box = document.getElementById('itemsBox');
            let data = JSON.parse(localStorage.getItem(DB_NAME)) || [];
            box.innerHTML = "";

            data.forEach((item, index) => {
                box.innerHTML += `
                    <div class="item">
                        <span>${item.name} (${item.cat})</span>
                        <button class="del" onclick="deleteItem(${index})">حذف</button>
                    </div>
                `;
            });
        }

        function deleteItem(index) {
            let data = JSON.parse(localStorage.getItem(DB_NAME)) || [];
            data.splice(index, 1);
            localStorage.setItem(DB_NAME, JSON.stringify(data));
            showData();
        }

        // تشغيل عند الفتح
        window.onload = showData;
    </script>
</body>
</html>
