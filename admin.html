<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم المتقدمة | Aws Store</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --main-bg: #0b0f12; --card-bg: #161b20; --accent: #00ff88; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--main-bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .panel { width: 100%; max-width: 700px; background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid #2d353b; margin-bottom: 20px; }
        .status-bar { font-size: 12px; text-align: center; margin-bottom: 15px; color: var(--accent); }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #2d353b; background: #1c2329; color: #fff; outline: none; box-sizing: border-box; }
        .btn-add { background: var(--accent); color: #000; font-weight: bold; cursor: pointer; border: none; margin-top: 10px; }
        .item-row { background: #1c2329; padding: 10px; margin: 5px 0; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #232a31; }
        .sub-item { margin-right: 30px; border-right: 2px solid var(--accent); padding-right: 10px; background: #12181d; }
        .controls span { cursor: pointer; margin-right: 10px; font-size: 12px; }
    </style>
</head>
<body>

    <div class="panel">
        <div id="connStatus" class="status-bar">جاري فحص الاتصال...</div>
        
        <h3>🛠️ إدارة الأقسام والفروع</h3>
        <div style="display:flex; gap:5px;">
            <input type="text" id="catInput" placeholder="اسم القسم أو الفرع">
            <select id="parentSelect" style="width:180px;">
                <option value="none">قسم رئيسي</option>
            </select>
            <button onclick="saveCategory()" id="catBtn" style="width:80px; background:var(--accent); color:#000;">حفظ</button>
        </div>
        
        <div id="catsListDisplay" style="margin-top:15px; max-height:200px; overflow-y:auto;"></div>
    </div>

    <div class="panel">
        <h3>🚀 إضافة تطبيق</h3>
        <input type="text" id="appName" placeholder="اسم التطبيق">
        <input type="text" id="appUrl" placeholder="رابط التحميل">
        <input type="text" id="appImg" placeholder="رابط الأيقونة">
        <select id="appCatSelect"></select>
        <button class="btn-add" onclick="saveApp()">حفظ ونشر التطبيق</button>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://aws-store-aaf40-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let editCatId = null;

        // الاتصال
        db.ref(".info/connected").on("value", s => {
            document.getElementById('connStatus').innerText = s.val() ? "● متصل بالسحابة" : "○ غير متصل";
        });

        // إدارة الأقسام (رئيسي وفرعي)
        function saveCategory() {
            const name = document.getElementById('catInput').value.trim();
            const parent = document.getElementById('parentSelect').value;
            if(!name) return;

            const ref = editCatId ? db.ref('categories/' + editCatId) : db.ref('categories').push();
            ref.set({ name: name, parent: parent }).then(() => {
                document.getElementById('catInput').value = "";
                editCatId = null;
                document.getElementById('catBtn').innerText = "حفظ";
            });
        }

        db.ref('categories').on('value', s => {
            const parentSelect = document.getElementById('parentSelect');
            const appCatSelect = document.getElementById('appCatSelect');
            const list = document.getElementById('catsListDisplay');
            
            parentSelect.innerHTML = '<option value="none">قسم رئيسي</option>';
            appCatSelect.innerHTML = '';
            list.innerHTML = '';

            const data = s.val() || {};
            
            // عرض الأقسام الرئيسية أولاً
            Object.keys(data).forEach(id => {
                const cat = data[id];
                if(cat.parent === "none") {
                    parentSelect.innerHTML += `<option value="${id}">${cat.name}</option>`;
                    appCatSelect.innerHTML += `<option value="${cat.name}">${cat.name}</option>`;
                    list.innerHTML += `
                        <div class="item-row">
                            <b>${cat.name}</b>
                            <div class="controls">
                                <span style="color:#00a2ff" onclick="startEditCat('${id}','${cat.name}','none')">تعديل</span>
                                <span style="color:#ff4757" onclick="db.ref('categories/${id}').remove()">حذف</span>
                            </div>
                        </div>`;
                    
                    // عرض الفروع التابعة لهذا القسم
                    Object.keys(data).forEach(subId => {
                        const subCat = data[subId];
                        if(subCat.parent === id) {
                            appCatSelect.innerHTML += `<option value="${subCat.name}">-- ${subCat.name}</option>`;
                            list.innerHTML += `
                                <div class="item-row sub-item">
                                    <span>${subCat.name}</span>
                                    <div class="controls">
                                        <span style="color:#00a2ff" onclick="startEditCat('${subId}','${subCat.name}','${id}')">تعديل</span>
                                        <span style="color:#ff4757" onclick="db.ref('categories/${subId}').remove()">حذف</span>
                                    </div>
                                </div>`;
                        }
                    });
                }
            });
        });

        function startEditCat(id, name, parent) {
            editCatId = id;
            document.getElementById('catInput').value = name;
            document.getElementById('parentSelect').value = parent;
            document.getElementById('catBtn').innerText = "تعديل";
        }

        function saveApp() {
            const data = {
                name: document.getElementById('appName').value,
                url: document.getElementById('appUrl').value,
                img: document.getElementById('appImg').value,
                cat: document.getElementById('appCatSelect').value,
                order: Date.now()
            };
            db.ref('apps').push(data).then(() => alert("تم الحفظ!"));
        }
    </script>
</body>
</html>
