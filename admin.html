<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم - الأقسام والترتيب</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; direction: rtl; }
        .admin-box { max-width: 500px; margin: auto; background: #fff; padding: 20px; border-radius: 12px; border: 2px solid #000; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .save-btn { width: 100%; padding: 15px; background: #000; color: #fff; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
        .list-item { background: #fff; border: 1px solid #ddd; padding: 10px; margin-top: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .controls button { margin-left: 5px; cursor: pointer; padding: 5px 10px; }
        .badge { background: #eee; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>

    <div class="admin-box">
        <h2 id="title">إضافة تطبيق</h2>
        <input type="text" id="name" placeholder="اسم التطبيق">
        <input type="text" id="link" placeholder="رابط التحميل">
        <input type="text" id="img" placeholder="رابط الصورة">
        <select id="cat">
            <option value="apps">التطبيقات (Apps)</option>
            <option value="sat">Sat Softwar</option>
        </select>
        <button class="save-btn" id="saveBtn">حفظ التطبيق</button>
        <button id="cancelBtn" style="display:none; width:100%; margin-top:5px;" onclick="reset()">إلغاء التعديل</button>

        <div id="list" style="margin-top:30px;">
            <h3>القائمة الحالية (اسحب للترتيب):</h3>
            <div id="itemsBox"></div>
        </div>
    </div>

    <script>
        const DB_KEY = "aws_store_v1";
        let editId = -1;

        document.getElementById('saveBtn').onclick = function() {
            const name = document.getElementById('name').value;
            const url = document.getElementById('link').value;
            const img = document.getElementById('img').value;
            const cat = document.getElementById('cat').value;

            if(name && url && img) {
                let data = JSON.parse(localStorage.getItem(DB_KEY)) || [];
                if(editId === -1) {
                    data.push({name, url, img, cat});
                } else {
                    data[editId] = {name, url, img, cat};
                }
                localStorage.setItem(DB_KEY, JSON.stringify(data));
                reset();
                render();
            }
        }

        function render() {
            const box = document.getElementById('itemsBox');
            let data = JSON.parse(localStorage.getItem(DB_KEY)) || [];
            box.innerHTML = "";
            data.forEach((item, index) => {
                box.innerHTML += `
                    <div class="list-item">
                        <div>
                            <strong>${item.name}</strong> <span class="badge">${item.cat}</span>
                        </div>
                        <div class="controls">
                            <button onclick="move(${index}, -1)">🔼</button>
                            <button onclick="move(${index}, 1)">🔽</button>
                            <button style="color:blue" onclick="startEdit(${index})">تعديل</button>
                            <button style="color:red" onclick="del(${index})">حذف</button>
                        </div>
                    </div>
                `;
            });
        }

        function move(index, step) {
            let data = JSON.parse(localStorage.getItem(DB_KEY)) || [];
            let target = index + step;
            if(target >= 0 && target < data.length) {
                [data[index], data[target]] = [data[target], data[index]];
                localStorage.setItem(DB_KEY, JSON.stringify(data));
                render();
            }
        }

        function startEdit(index) {
            let data = JSON.parse(localStorage.getItem(DB_KEY)) || [];
            let itm = data[index];
            document.getElementById('name').value = itm.name;
            document.getElementById('link').value = itm.url;
            document.getElementById('img').value = itm.img;
            document.getElementById('cat').value = itm.cat;
            editId = index;
            document.getElementById('saveBtn').innerText = "تحديث البيانات";
            document.getElementById('cancelBtn').style.display = "block";
        }

        function reset() {
            document.getElementById('name').value = "";
            document.getElementById('link').value = "";
            document.getElementById('img').value = "";
            editId = -1;
            document.getElementById('saveBtn').innerText = "حفظ التطبيق";
            document.getElementById('cancelBtn').style.display = "none";
        }

        function del(index) {
            if(confirm("حذف؟")) {
                let data = JSON.parse(localStorage.getItem(DB_KEY)) || [];
                data.splice(index, 1);
                localStorage.setItem(DB_KEY, JSON.stringify(data));
                render();
            }
        }

        window.onload = render;
    </script>
</body>
</html>
