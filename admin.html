<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body{font-family:Arial;background:#111;color:#fff;padding:20px}
input,button,textarea{width:100%;padding:10px;margin:5px 0;border:none;border-radius:8px}
button{background:#00c853;color:#fff;font-weight:bold}
.card{background:#222;padding:10px;margin-top:10px;border-radius:10px}
</style>
</head>

<body>

<h2>🔐 Admin Panel</h2>

<input id="name" placeholder="Name">
<input id="image" placeholder="Image URL">
<input id="url" placeholder="URL">
<input id="iptv" placeholder="IPTV">
<textarea id="desc" placeholder="Description"></textarea>
<input id="price" placeholder="Price">
<input id="phone" placeholder="WhatsApp">

<button onclick="addProduct()">➕ Add Product</button>

<h3>📦 Products</h3>
<div id="list"></div>

<script>

let products = JSON.parse(localStorage.getItem("products") || "[]");

function addProduct(){

let product = {
name: document.getElementById("name").value,
image: document.getElementById("image").value,
url: document.getElementById("url").value,
iptv: document.getElementById("iptv").value,
desc: document.getElementById("desc").value,
price: document.getElementById("price").value,
phone: document.getElementById("phone").value
};

products.push(product);
localStorage.setItem("products", JSON.stringify(products));

render();
alert("تمت الإضافة ✅");
}

function render(){

let list = document.getElementById("list");
list.innerHTML = "";

products.forEach(p=>{
list.innerHTML += `
<div class="card">
<b>${p.name}</b><br>
<img src="${p.image}" width="100%"><br>
<a href="${p.url}" target="_blank">Open</a><br>
IPTV: ${p.iptv}<br>
Price: ${p.price}<br>
WhatsApp: ${p.phone}<br>
<p>${p.desc}</p>
</div>
`;
});
}

render();

</script>

</body>
</html>
