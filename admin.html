<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة Aws Store | نظام التعديل الشامل</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0b0f12; color: white; direction: rtl; padding: 20px; }
        .container { max-width: 850px; margin: auto; }
        .panel { background: #161b20; padding: 25px; border-radius: 15px; border: 1px solid #bc13fe; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #bc13fe; border-bottom: 2px solid #bc13fe; display: inline-block; padding-bottom: 5px; margin-bottom: 20px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #2d353b; background: #1c2329; color: white; box-sizing: border-box; font-size: 14px; }
        .btn-main { background: #bc13fe; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; font-size: 16px; }
        .btn-main:hover { background: #9a0dcf; transform: translateY(-2px); }
        .btn-edit { background: #f1c40f; color: #000; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; margin-left: 5px; font-weight: bold; }
        .btn-del { background: #ff4757; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .app-item { background: #1c2329; padding: 15px; margin: 10px 0; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #2d353b; transition: 0.3s; }
        .app-item:hover { border-color: #bc13fe; }
        .edit-mode { border-color: #f1c40f !important; box-shadow: 0 0 15px rgba(241, 196, 15, 0.3); }
        .loader { text-align: center; color: #bc13fe; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel" id="appForm">
        <h2 id="appFormTitle">إضافة تطبيق جديد</h2>
        <input type="hidden" id="editAppKey">
        
        <input type="text" id="appName" placeholder="اسم التطبيق">
        <input type="text" id="appUrl" placeholder="رابط التحميل">
        <input type="text" id="appImg" placeholder="رابط الأيقونة">
        <input type="text" id="appVer" placeholder="الإصدار">
        <input type="text" id="appCode" placeholder="كود التفعيل (اختياري)">
        <textarea id="appNotes" rows="3" placeholder="ملاحظات وشرح التحديث..."></textarea>
        
        <label>القسم:</label>
        <select id="categorySelect"></select>
        
        <button class="btn-main" id="appSubmitBtn" onclick="saveAppData()">إضافة للمتجر</button>
        <button id="cancelAppBtn" onclick="resetAppForm()" style="display:none; background:#555; margin-top:10px;" class="btn-main">إلغاء التعديل</button>
    </div>

    <div class="panel" id="catForm">
        <h2 id="catFormTitle">إدارة الأقسام</h2>
        <input type="hidden" id="editCatKey">
        <div style="display: flex; gap: 10px;">
            <input type="text" id="newCatName" placeholder="اسم القسم" style="margin:0;">
            <button onclick="saveCatData()" id="catSubmitBtn" style="background: #2ed573; width: 150px;" class="btn-main">إضافة</button>
        </div>
        <button id="cancelCatBtn" onclick="resetCatForm()" style="display:none; background:#555; margin-top:10px;" class="btn-main">إلغاء تعديل القسم</button>
        <div id="catList" style="margin-top:20px;"></div>
    </div>

    <div class="panel">
        <h2>التطبيقات الحالية</h2>
        <div id="appList"><p class="loader">جاري المزامنة...</p></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBcWwHSDX9kWVxbw1DLgGkTJoYFSBsdeuk",
        authDomain: "aws-store-aaf40.firebaseapp.com",
        databaseURL: "https://aws-store-aaf40-default-rtdb.firebaseio.com",
        projectId: "aws-store-aaf40",
        appId: "1:962301504605:web:96661f5c465b2cfd4331b4"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // جلب البيانات وتحديث الواجهة
    db.ref().on('value', snap => {
        const data = snap.val() || {};
        
        // 1. تحديث الأقسام
        const catSelect = document.getElementById('categorySelect');
        const catListDiv = document.getElementById('catList');
        catSelect.innerHTML = "";
        catListDiv.innerHTML = "";
        
        if (data.categories) {
            Object.keys(data.categories).forEach(id => {
                const cat = data.categories[id];
                catSelect.innerHTML += `<option value="${cat.name}">${cat.name}</option>`;
                catListDiv.innerHTML += `
                    <div class="app-item">
                        <span>📂 ${cat.name}</span>
                        <div>
                            <button class="btn-edit" onclick="editCat('${id}', '${cat.name}')">تعديل</button>
                            <button class="btn-del" onclick="deleteItem('categories/${id}')">حذف</button>
                        </div>
                    </div>`;
            });
        }

        // 2. تحديث التطبيقات
        const appListDiv = document.getElementById('appList');
        appListDiv.innerHTML = "";
        if (data.apps) {
            Object.keys(data.apps).forEach(id => {
                const app = data.apps[id];
                appListDiv.innerHTML += `
                    <div class="app-item">
                        <div>
                            <strong>${app.name}</strong> <small style="color:#bc13fe">[${app.cat}]</small>
                        </div>
                        <div>
                            <button class="btn-edit" onclick="editApp('${id}', ${JSON.stringify(app).replace(/"/g, '&quot;')})">تعديل</button>
                            <button class="btn-del" onclick="deleteItem('apps/${id}')">حذف</button>
                        </div>
                    </div>`;
            });
        } else {
            appListDiv.innerHTML = "القائمة فارغة.";
        }
    });

    // --- وظائف الأقسام ---
    function saveCatData() {
        const key = document.getElementById('editCatKey').value;
        const name = document.getElementById('newCatName').value;
        if(!name) return;

        if(key) {
            db.ref('categories/' + key).update({ name }).then(() => {
                resetCatForm();
            });
        } else {
            db.ref('categories').push({ name }).then(() => {
                document.getElementById('newCatName').value = "";
            });
        }
    }

    function editCat(id, name) {
        document.getElementById('editCatKey').value = id;
        document.getElementById('newCatName').value = name;
        document.getElementById('catFormTitle').innerText = "تعديل القسم";
        document.getElementById('catSubmitBtn').innerText = "تحديث";
        document.getElementById('catSubmitBtn').style.background = "#f1c40f";
        document.getElementById('catForm').classList.add('edit-mode');
        document.getElementById('cancelCatBtn').style.display = "block";
    }

    function resetCatForm() {
        document.getElementById('editCatKey').value = "";
        document.getElementById('newCatName').value = "";
        document.getElementById('catFormTitle').innerText = "إدارة الأقسام";
        document.getElementById('catSubmitBtn').innerText = "إضافة";
        document.getElementById('catSubmitBtn').style.background = "#2ed573";
        document.getElementById('catForm').classList.remove('edit-mode');
        document.getElementById('cancelCatBtn').style.display = "none";
    }

    // --- وظائف التطبيقات ---
    function saveAppData() {
        const key = document.getElementById('editAppKey').value;
        const appData = {
            name: document.getElementById('appName').value,
            url: document.getElementById('appUrl').value,
            img: document.getElementById('appImg').value,
            ver: document.getElementById('appVer').value,
            cat: document.getElementById('categorySelect').value,
            code: document.getElementById('appCode').value || "",
            notes: document.getElementById('appNotes').value || ""
        };

        if(!appData.name || !appData.url) return alert("يرجى إدخال البيانات!");

        if(key) {
            db.ref('apps/' + key).update(appData).then(() => {
                alert("تم التحديث!");
                resetAppForm();
            });
        } else {
            db.ref('apps').push(appData).then(() => {
                alert("تمت الإضافة!");
                resetAppForm();
            });
        }
    }

    function editApp(id, app) {
        document.getElementById('editAppKey').value = id;
        document.getElementById('appName').value = app.name;
        document.getElementById('appUrl').value = app.url;
        document.getElementById('appImg').value = app.img;
        document.getElementById('appVer').value = app.ver || "";
        document.getElementById('appCode').value = app.code || "";
        document.getElementById('appNotes').value = app.notes || "";
        document.getElementById('categorySelect').value = app.cat;

        document.getElementById('appFormTitle').innerText = "تعديل تطبيق: " + app.name;
        document.getElementById('appSubmitBtn').innerText = "حفظ التعديلات";
        document.getElementById('appSubmitBtn').style.background = "#f1c40f";
        document.getElementById('appSubmitBtn').style.color = "#000";
        document.getElementById('appForm').classList.add('edit-mode');
        document.getElementById('cancelAppBtn').style.display = "block";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetAppForm() {
        document.getElementById('editAppKey').value = "";
        document.getElementById('appName').value = "";
        document.getElementById('appUrl').value = "";
        document.getElementById('appImg').value = "";
        document.getElementById('appVer').value = "";
        document.getElementById('appCode').value = "";
        document.getElementById('appNotes').value = "";
        document.getElementById('appFormTitle').innerText = "إضافة تطبيق جديد";
        document.getElementById('appSubmitBtn').innerText = "إضافة للمتجر";
        document.getElementById('appSubmitBtn').style.background = "#bc13fe";
        document.getElementById('appSubmitBtn').style.color = "white";
        document.getElementById('appForm').classList.remove('edit-mode');
        document.getElementById('cancelAppBtn').style.display = "none";
    }

    function deleteItem(path) {
        if(confirm("هل أنت متأكد من الحذف؟")) db.ref(path).remove();
    }
</script>
</body>
</html>
