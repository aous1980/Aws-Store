<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم 🔐 - إدارة التطبيقات</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; direction: rtl; }
        .admin-panel { width: 500px; background: white; margin: auto; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); text-align: center; }
        h1 { font-size: 26px; border-bottom: 2px solid #333; padding-bottom: 10px; }
        
        .field-container { margin-bottom: 20px; text-align: right; }
        .label-text { display: block; font-weight: bold; margin-bottom: 5px; }
        
        .input-row { display: flex; border: 1px solid #000; border-radius: 5px; overflow: hidden; background: #fff; }
        .input-row input { flex: 1; border: none; padding: 10px; outline: none; text-align: center; }
        .input-row button { border: none; background: #eee; padding: 0 15px; cursor: pointer; border-right: 1px solid #000; }
        .input-row button:hover { background: #ddd; }

        .category-section { margin: 20px 0; display: flex; align-items: center; justify-content: center; gap: 10px; }
        select { padding: 5px; font-weight: bold; border-radius: 5px; }

        .add-btn { background: #333; color: white; border: none; padding: 10px 30px; border-radius: 5px; cursor: pointer; font-size: 18px; width: 100%; margin-bottom: 30px; }
        .add-btn:hover { background: #000; }

        /* قسم قائمة التطبيقات للحذف */
        .manage-section { text-align: right; border-top: 2px dashed #ccc; padding-top: 20px; }
        .app-item { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 10px; border: 1px solid #ddd; margin-bottom: 5px; border-radius: 5px; }
        .app-item span { font-weight: bold; }
        .delete-btn { background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; }
        .delete-btn:hover { background: #cc0000; }
        .cat-tag { font-size: 10px; background: #eee; padding: 2px 5px; border-radius: 3px; margin-right: 5px; }
    </style>
</head>
<body>

    <div class="admin-panel">
        <h1>🔐 لوحة التحكم</h1>

        <div class="field-container">
            <span class="label-text">اسم التطبيق</span>
            <div class="input-row"><input type="text" id="appName" placeholder="اكتب الاسم"></div>
        </div>

        <div class="field-container">
            <span class="label-text">رابط التطبيق</span>
            <div class="input-row">
                <button onclick="document.getElementById('appUrl').focus()">تعديل</button>
                <button onclick="document.getElementById('appUrl').value=''">حذف</button>
                <input type="text" id="appUrl" placeholder="الرابط">
            </div>
        </div>

        <div class="field-container">
            <span class="label-text">رابط الصورة</span>
            <div class="input-row">
                <button onclick="document.getElementById('appImg').focus()">تعديل</button>
                <button onclick="document.getElementById('appImg').value=''">حذف</button>
                <input type="text" id="appImg" placeholder="رابط الصورة">
            </div>
        </div>

        <div class="category-section">
            <label>التثبيت في:</label>
            <select id="category">
                <option value="apps">التطبيقات</option>
                <option value="sat">Sat Softwar</option>
            </select>
        </div>

        <button class="add-btn" onclick="saveData()">➕ إضافة للمتجر</button>

        <div class="manage-section">
            <h3>📦 إدارة التطبيقات الحالية:</h3>
            <div id="currentApps"></div>
        </div>
    </div>

    <script>
        // وظيفة حفظ البيانات
        function saveData() {
            const name = document.getElementById('appName').value;
            const url = document.getElementById('appUrl').value;
            const img = document.getElementById('appImg').value;
            const cat = document.getElementById('category').value;

            if (name && url && img) {
                let store = JSON.parse(localStorage.getItem('aws_store_data')) || [];
                store.push({ name, url, img, cat });
                localStorage.setItem('aws_store_data', JSON.stringify(store));
                
                // مسح الحقول وتحديث القائمة
                document.getElementById('appName').value = "";
                document.getElementById('appUrl').value = "";
                document.getElementById('appImg').value = "";
                renderAppList();
                alert("تمت الإضافة بنجاح!");
            } else {
                alert("يرجى ملء جميع الخانات");
            }
        }

        // وظيفة عرض قائمة التطبيقات الحالية للحذف
        function renderAppList() {
            const container = document.getElementById('currentApps');
            const store = JSON.parse(localStorage.getItem('aws_store_data')) || [];
            container.innerHTML = "";

            store.forEach((item, index) => {
                container.innerHTML += `
                    <div class="app-item">
                        <div>
                            <span class="cat-tag">${item.cat === 'apps' ? 'تطبيقات' : 'Sat'}</span>
                            <span>${item.name}</span>
                        </div>
                        <button class="delete-btn" onclick="deleteApp(${index})">إزالة نهائية</button>
                    </div>
                `;
            });
        }

        // وظيفة الحذف
        function deleteApp(index) {
            if(confirm("هل أنت متأكد من حذف هذا التطبيق من المتجر؟")) {
                let store = JSON.parse(localStorage.getItem('aws_store_data')) || [];
                store.splice(index, 1);
                localStorage.setItem('aws_store_data', JSON.stringify(store));
                renderAppList(); // تحديث القائمة فوراً
            }
        }

        // تشغيل القائمة عند فتح الصفحة
        window.onload = renderAppList;
    </script>
</body>
</html>
