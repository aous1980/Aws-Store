<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم المتقدمة</title>
    <style>
        body { background: #f9f9f9; font-family: Arial; text-align: center; padding: 20px; }
        .admin-container { background: white; max-width: 600px; margin: auto; padding: 20px; border: 1px solid #ccc; border-radius: 10px; }
        .row { display: flex; align-items: center; margin-bottom: 15px; gap: 10px; }
        input, select { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        label { width: 120px; font-weight: bold; text-align: right; }
        button { padding: 8px 15px; cursor: pointer; border-radius: 5px; border: 1px solid #ccc; }
        .btn-edit { background: #fff1c1; }
        .btn-del { background: #ffd1d1; }
        .btn-add { background: #333; color: white; width: 100%; font-size: 18px; margin-top: 15px; height: 45px; }
    </style>
</head>
<body>

    <div class="admin-container">
        <h1>لوحة التحكم</h1>
        
        <div class="row">
            <label>اسم التطبيق:</label>
            <input type="text" id="appName" placeholder="مثلاً: YouTube Mod">
        </div>

        <div class="row">
            <label>رابط التطبيق:</label>
            <input type="text" id="appUrl" placeholder="https://...">
            <button class="btn-del" onclick="document.getElementById('appUrl').value=''">حذف</button>
            <button class="btn-edit" onclick="document.getElementById('appUrl').focus()">تعديل</button>
        </div>

        <div class="row">
            <label>رابط الصورة:</label>
            <input type="text" id="appImg" placeholder="https://...">
            <button class="btn-del" onclick="document.getElementById('appImg').value=''">حذف</button>
            <button class="btn-edit" onclick="document.getElementById('appImg').focus()">تعديل</button>
        </div>

        <div class="row">
            <label>تثبيت في قسم:</label>
            <select id="appCategory">
                <option value="apps">التطبيقات (Apps)</option>
                <option value="sat">Sat Softwar</option>
            </select>
        </div>

        <button class="btn-add" onclick="saveToStore()">إضافة التطبيق الآن</button>
    </div>

    <script>
        function saveToStore() {
            const name = document.getElementById("appName").value;
            const url = document.getElementById("appUrl").value;
            const img = document.getElementById("appImg").value;
            const category = document.getElementById("appCategory").value;

            if(name && url && img) {
                let store = JSON.parse(localStorage.getItem("store_data")) || [];
                store.push({ name, url, img, category });
                localStorage.setItem("store_data", JSON.stringify(store));
                alert("تم التثبيت في قسم: " + (category === 'apps' ? 'التطبيقات' : 'Sat Softwar'));
            } else {
                alert("يرجى ملء كافة البيانات");
            }
        }
    </script>
</body>
</html>
