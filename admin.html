<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;background:#0f172a;color:white;padding:20px}
input{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:none}
button{width:100%;padding:10px;background:#22c55e;border:none;border-radius:10px;font-weight:bold}
.card{background:#1f2937;padding:10px;margin:10px 0;border-radius:10px}
</style>
</head>

<body>

<h2>🔐 Admin Panel</h2>

<input id="name" placeholder="Name">
<input id="image" placeholder="Image URL">
<input id="url" placeholder="URL">
<input id="category" placeholder="Category">
<input id="description" placeholder="Description">
<input id="price" placeholder="Price (optional)">
<input id="phone" placeholder="Phone (optional)">

<button onclick="add()">➕ Add Product</button>

<hr>

<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBcWwHSDX9kWVxbw1DLgGkTJoYFSBsdeuk",
  authDomain: "aws-store-aaf40.firebaseapp.com",
  projectId: "aws-store-aaf40",
  storageBucket: "aws-store-aaf40.firebasestorage.app",
  appId: "1:962301504605:web:96661f5c465b2cfd4331b4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.add = async function(){
  await addDoc(collection(db,"products"),{
    name:name.value,
    image:image.value,
    url:url.value,
    category:category.value,
    description:description.value,
    price:price.value,
    phone:phone.value
  });

  alert("Added!");
  load();
}

async function load(){
  const snap = await getDocs(collection(db,"products"));
  let box = document.getElementById("list");
  box.innerHTML = "";

  snap.forEach(d=>{
    box.innerHTML += `
      <div class="card">
        <b>${d.data().name}</b>
        <button onclick="del('${d.id}')">Delete</button>
      </div>
    `;
  });
}

window.del = async function(id){
  await deleteDoc(doc(db,"products",id));
  load();
}

load();
</script>

</body>
</html>
