<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم Aws Store</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #0b0f12; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; border: 1px solid rgba(0,255,136,0.2); text-align: center; width: 300px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; outline: none; box-sizing: border-box; }
        button { background: #00ff88; color: black; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; }
        #adminPanel { display: none; padding: 20px; width: 90%; max-width: 900px; margin: auto; }
    </style>
</head>
<body>

    <div id="loginSection" class="login-box">
        <h3>تسجيل دخول المدير</h3>
        <input type="password" id="passInput" placeholder="أدخل كلمة المرور">
        <button onclick="checkAuth()">دخول</button>
    </div>

    <div id="adminPanel">
        <h2 style="color:#00ff88">مرحباً بك في لوحة تحكم Aws Store</h2>
        <p>تم تسجيل الدخول بنجاح كمدير.</p>
        <button onclick="location.reload()" style="background:red; color:white; width:auto">تسجيل خروج</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBcWwHSDX9kWVxbw1DLgGkTJoYFSBsdeuk",
            authDomain: "aws-store-aaf40.firebaseapp.com",
            databaseURL: "https://aws-store-aaf40-default-rtdb.firebaseio.com",
            projectId: "aws-store-aaf40",
            appId: "1:962301504605:web:96661f5c465b2cfd4331b4"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function checkAuth() {
            const userInput = document.getElementById('passInput').value;
            const correctPass = "ashd1980"; // الباسوورد الخاص بك

            // التأكد من المطابقة (بدون مسافات)
            if (userInput.trim() === correctPass) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                // يمكنك هنا استدعاء وظائف جلب البيانات لإدارتها
            } else {
                alert("⚠️ كلمة المرور غير صحيحة، حاول مجدداً.");
            }
        }
    </script>
</body>
</html>
