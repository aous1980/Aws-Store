<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم Aws Store</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <style>
        :root { --main-bg: #0b0f12; --card-bg: #161b20; --accent: #00ff88; --text: #ffffff; --danger: #ff4757; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--main-bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--main-bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .panel { width: 100%; max-width: 600px; background: var(--card-bg); padding: 25px; border-radius: 15px; border: 1px solid #2d353b; margin-bottom: 20px; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #2d353b; background: #1c2329; color: #fff; outline: none; box-sizing: border-box; }
        .save-btn { background: var(--accent); color: #000; font-weight: bold; cursor: pointer; border: none; }
        .logout-btn { background: transparent; color: var(--danger); border: 1px solid var(--danger); width: auto; padding: 5px 15px; cursor: pointer; }
        .status-bar { font-size: 13px; text-align: center; margin-bottom: 20px; padding: 8px; border-radius: 8px; background: #1c2329; border: 1px solid #232a31; }
        .item-card { background: #1c2329; padding: 12px 15px; margin: 8px 0; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #2d353b; }
        .edit-mode { background: #ffcc00 !important; color: #000 !important; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="panel" style="max-width: 350px;">
            <h3 style="text-align:center;">🔐 دخول المسؤول</h3>
            <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" value="aous.safaa.hd.1980@gmail.com">
            <input type="password" id="loginPass" placeholder="كلمة المرور">
            <button class="save-btn" onclick="login()">دخول</button>
            <p id="loginError" style="color:red; font-size:12px; text-align:center;"></p>
        </div>
    </div>

    <div style="display:flex; justify-content:space-between; align-items:center; width:100%; max-width:600px; margin-bottom:20px;">
        <h2>🛠️ إدارة المتجر</h2>
        <button class="logout-btn" onclick="logout()">خروج</button>
    </div>

    <div class="panel">
        <div id="connStatus" class="status-bar">جاري فحص الاتصال...</div>
        <input type="text" id="appName" placeholder="اسم التطبيق">
        <input type="text" id="appUrl" placeholder="رابط التحميل">
        <input type="text" id="appImg" placeholder="رابط الأيقونة">
        <input type="text" id="appVer" placeholder="الإصدار">
        <select id="categorySelect"></select>
        <button id="appSubmitBtn" class="save-btn" onclick="saveApp()">🚀 حفظ التطبيق</button>
        <button id="appCancelBtn" style="display:none; background:#444;" onclick="resetAppForm()">إلغاء التعديل</button>
    </div>

    <div style="width:100%; max-width:600px;">
        <h3 style="color:var(--accent);">📦 التطبيقات الحالية</h3>
        <div id="appsListDisplay"></div>
    </div>

    <script>
        // --- إعدادات FIREBASE ---
        // ملاحظة: يجب وضع الـ API KEY الخاص بك هنا لكي يشتغل زر الدخول
        const firebaseConfig = {
            apiKey: "ضع_هنا_الـ_API_KEY_الخاص_بمشروعك", 
            authDomain: "aws-store-aaf40.firebaseapp.com",
            databaseURL: "https://aws-store-aaf40-default-rtdb.firebaseio.com/",
            projectId: "aws-store-aaf40",
            storageBucket: "aws-store-aaf40.appspot.com",
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        // --- نظام تسجيل الدخول ---
        function login() {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            const errorMsg = document.getElementById('loginError');
            
            errorMsg.innerText = "جاري التحقق...";

            auth.signInWithEmailAndPassword(email, pass)
                .catch(err => {
                    errorMsg.innerText = "فشل الدخول: " + err.message;
                });
        }

        function logout() { auth.signOut(); }

        auth.onAuthStateChanged(user => {
            const overlay = document.getElementById('loginOverlay');
            overlay.style.display = user ? 'none' : 'flex';
        });

        // --- إدارة قاعدة البيانات (نفس الكود السابق مع تحسينات) ---
        db.ref(".info/connected").on("value", s => {
            document.getElementById('connStatus').innerHTML = s.val() ? "<span style='color:#00ff88'>● متصل بالسحابة</span>" : "<span style='color:#ff4757'>○ غير متصل</span>";
        });

        // جلب الأقسام
        db.ref('categories').on('value', s => {
            const select = document.getElementById('categorySelect');
            select.innerHTML = "";
            s.forEach(c => {
                select.innerHTML += `<option value="${c.val().name}">${c.val().name}</option>`;
            });
        });

        // حفظ التطبيق
        function saveApp() {
            const name = document.getElementById('appName').value;
            const cat = document.getElementById('categorySelect').value;
            if(!name || !cat) return alert("أكمل البيانات");

            const data = {
                name: name,
                url: document.getElementById('appUrl').value,
                img: document.getElementById('appImg').value,
                ver: document.getElementById('appVer').value || 'v1.0',
                cat: cat
            };

            db.ref('apps').push(data).then(() => {
                alert("تم الحفظ");
                document.getElementById('appName').value = "";
            });
        }

        // عرض التطبيقات
        db.ref('apps').on('value', s => {
            const display = document.getElementById('appsListDisplay');
            display.innerHTML = "";
            s.forEach(c => {
                const item = c.val();
                display.innerHTML += `
                    <div class="item-card">
                        <div><strong>${item.name}</strong></div>
                        <button class="logout-btn" style="border-color:#ff4757; color:#ff4757" onclick="deleteApp('${c.key}')">حذف</button>
                    </div>`;
            });
        });

        function deleteApp(id) {
            if(confirm("هل تريد الحذف؟")) db.ref('apps/'+id).remove();
        }
    </script>
</body>
</html>
