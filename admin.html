<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم Aws Store</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; direction: rtl; }
        .panel { max-width: 500px; margin: auto; background: #fff; padding: 20px; border-radius: 10px; border: 2px solid #000; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .main-btn { width: 100%; padding: 15px; background: #000; color: #fff; border: none; cursor: pointer; font-size: 16px; font-weight: bold; }
        .json-out { background: #222; color: #0f0; padding: 15px; margin-top: 20px; white-space: pre-wrap; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>

<div class="panel">
    <h2>إدارة محتوى المتجر</h2>
    <input type="text" id="name" placeholder="اسم التطبيق أو السوفت وير">
    <input type="text" id="url" placeholder="رابط التحميل">
    <input type="text" id="img" placeholder="رابط الصورة">
    <select id="cat">
        <option value="apps">قسم التطبيقات</option>
        <option value="sat">قسم Sat Softwar</option>
    </select>
    <button class="main-btn" onclick="add()">إضافة للقائمة</button>
    <div id="status" style="margin-top:10px;"></div>

    <h3>الكود المولد (انسخه لملف apps.json):</h3>
    <div class="json-out" id="json">[]</div>
    <button class="main-btn" style="background:blue;" onclick="copy()">نسخ الكود بالكامل</button>
</div>

<script>
    let list = [];
    function add() {
        const name = document.getElementById('name').value;
        const url = document.getElementById('url').value;
        const img = document.getElementById('img').value;
        const cat = document.getElementById('cat').value;
        if(name && url && img) {
            list.push({name, url, img, cat});
            document.getElementById('json').innerText = JSON.stringify(list, null, 2);
            document.getElementById('status').innerHTML = "✅ تمت الإضافة للقائمة المؤقتة";
        }
    }
    function copy() {
        navigator.clipboard.writeText(document.getElementById('json').innerText);
        alert("تم النسخ! اذهب لـ GitHub وافتح ملف apps.json والصقه هناك.");
    }
</script>
</body>
</html>
