<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin V2</title>

<style>
body{font-family:Arial;background:#0f172a;color:white;padding:20px;}

input,select{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:8px;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  font-weight:bold;
  cursor:pointer;
}

.item{
  background:#1f2937;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<h2>🔐 Admin V2</h2>

<input id="name" placeholder="Name">
<input id="image" placeholder="Image URL">
<input id="url" placeholder="URL">

<select id="category">
  <option value="iptv">IPTV</option>
  <option value="cinema">Cinema</option>
  <option value="tools">Tools</option>
  <option value="products">Products</option>
</select>

<input id="desc" placeholder="Description">
<input id="price" placeholder="Price (only products)">

<button onclick="add()">➕ Add / Update</button>

<h3>📦 List</h3>
<div id="list"></div>

<script>
let apps = JSON.parse(localStorage.getItem("apps") || "[]");
let edit = -1;

function save(){
  localStorage.setItem("apps", JSON.stringify(apps));
}

function add(){
  let a = {
    name:name.value,
    image:image.value,
    url:url.value,
    category:category.value,
    description:desc.value,
    price:price.value
  };

  if(edit===-1) apps.push(a);
  else apps[edit]=a;

  save();
  render();
  clear();
}

function render(){
  let list=document.getElementById("list");
  list.innerHTML="";

  apps.forEach((a,i)=>{
    list.innerHTML+=`
      <div class="item">
        <b>${a.name}</b>

        <button onclick="editApp(${i})">Edit</button>
        <button onclick="del(${i})" style="background:red;margin-top:5px">Delete</button>
      </div>
    `;
  });
}

function editApp(i){
  let a=apps[i];

  name.value=a.name;
  image.value=a.image;
  url.value=a.url;
  category.value=a.category;
  desc.value=a.description;
  price.value=a.price;

  edit=i;
}

function del(i){
  apps.splice(i,1);
  save();
  render();
}

function clear(){
  name.value="";
  image.value="";
  url.value="";
  desc.value="";
  price.value="";
}

render();
</script>

</body>
</html>
