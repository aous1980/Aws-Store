<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Admin - Aws Store</title>
</head>

<body style="background:#111;color:#fff;text-align:center;font-family:Arial">

<h1>🔐 لوحة التحكم</h1>

<input id="img" placeholder="رابط الصورة"><br><br>
<input id="url" placeholder="رابط التطبيق"><br><br>

<button onclick="add('apps')">📱 إضافة للتطبيقات</button>
<button onclick="add('sat')">🛰️ إضافة SatSoftware</button>

<script>
function add(type){
  let img = document.getElementById("img").value;
  let url = document.getElementById("url").value;

  let data = JSON.parse(localStorage.getItem(type)) || [];
  data.push({img,url});
  localStorage.setItem(type, JSON.stringify(data));

  alert("تمت الإضافة");
}
</script>

</body>
</html>
