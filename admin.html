<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم - Aws Store</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f0f0; padding: 20px; direction: rtl; }
        .box { max-width: 500px; margin: auto; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 1px solid #000; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .add-btn { width: 100%; padding: 15px; background: #000; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-size: 18px; }
        .item { background: #fff; border: 1px solid #ddd; padding: 10px; margin-top: 10px; border-radius: 5px; display: flex; justify-content: space-between; }
        .json-box { background: #222; color: #27ae60; padding: 15px; border-radius: 5px; margin-top: 20px; white-space: pre-wrap; font-family: monospace; font-size: 12px; text-align: left; max-height: 200px; overflow-y: auto; }
        .copy-btn { background: #27ae60; color: #fff; border: none; padding: 10px; width: 100%; margin-top: 5px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

<div class="box">
    <h2>➕ إضافة تطبيق جديد</h2>
    <input type="text" id="name" placeholder="اسم التطبيق">
    <input type="text" id="url" placeholder="رابط التحميل المباشر">
    <input type="text" id="img" placeholder="رابط صورة اللوجو">
    <select id="cat">
        <option value="apps">قسم التطبيقات (Apps)</option>
        <option value="sat">قسم Sat Softwar</option>
    </select>
    <button class="add-btn" onclick="addApp()">إضافة للقائمة</button>

    <div id="list"></div>

    <h3>الكود النهائي لملف apps.json:</h3>
    <div class="json-box" id="jsonOutput">[]</div>
    <button class="copy-btn" onclick="copyText()">نسخ الكود بالكامل</button>
</div>

<script>
    let apps = [];

    function addApp() {
        const name = document.getElementById('name').value;
        const url = document.getElementById('url').value;
        const img = document.getElementById('img').value;
        const cat = document.getElementById('cat').value;

        if(name && url && img) {
            apps.push({name, url, img, cat});
            updateList();
            document.getElementById('name').value = '';
            document.getElementById('url').value = '';
            document.getElementById('img').value = '';
        } else { alert("املأ الخانات!"); }
    }

    function updateList() {
        const list = document.getElementById('list');
        list.innerHTML = "<h4>القائمة المضافة:</h4>";
        apps.forEach((item, index) => {
            list.innerHTML += `<div class="item">
                <span>${item.name} (${item.cat})</span>
                <button onclick="remove(${index})" style="color:red">حذف</button>
            </div>`;
        });
        document.getElementById('jsonOutput').innerText = JSON.stringify(apps, null, 4);
    }

    function remove(i) { apps.splice(i, 1); updateList(); }

    function copyText() {
        const text = document.getElementById('jsonOutput').innerText;
        navigator.clipboard.writeText(text);
        alert("تم النسخ! اذهب لـ GitHub والصقه في ملف apps.json");
    }
</script>
</body>
</html>
