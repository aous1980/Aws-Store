<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم | Aws Store</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0f12; color: #fff; padding: 20px; text-align: center; }
        .panel { width: 100%; max-width: 600px; background: #161b20; padding: 20px; border-radius: 15px; border: 1px solid #2d353b; margin: auto; }
        .status { font-size: 13px; margin-bottom: 15px; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #2d353b; background: #1c2329; color: #fff; outline: none; box-sizing: border-box; }
        .save-btn { background: #00ff88; color: #000; font-weight: bold; cursor: pointer; border: none; }
        .edit-mode { background: #ffcc00 !important; }
        .item-card { background: #1c2329; padding: 15px; margin: 10px 0; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #2d353b; }
        .btn-sm { padding: 6px 15px; cursor: pointer; border: none; border-radius: 5px; color: #fff; font-size: 12px; margin-left: 5px; }
        .del-btn { background: #ff4757; } .edit-btn { background: #00a2ff; }
    </style>
</head>
<body>

    <div class="panel">
        <h2 id="formTitle">إدارة التطبيقات</h2>
        <div id="connStatus" class="status">جاري الاتصال...</div>
        
        <input type="text" id="appName" placeholder="اسم التطبيق">
        <input type="text" id="appUrl" placeholder="رابط التحميل">
        <input type="text" id="appImg" placeholder="رابط الصورة">
        <input type="text" id="appVer" placeholder="الإصدار">
        
        <select id="categorySelect"></select>

        <button id="submitBtn" class="save-btn" onclick="saveApp()">🚀 حفظ ونشر</button>
        <button id="cancelBtn" style="display:none; background:#444;" onclick="resetForm()">إلغاء</button>

        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
        
        <div style="display:flex; gap:5px;">
            <input type="text" id="catInput" placeholder="اسم قسم جديد">
            <button onclick="addCategory()" style="width:100px; background:#333;">إضافة</button>
        </div>
    </div>

    <div style="width:100%; max-width:600px; margin: 20px auto; text-align: right;">
        <h3>التطبيقات المرفوعة:</h3>
        <div id="appsList"></div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://aws-store-aaf40-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentEditId = null;

        // التحقق من الاتصال
        db.ref(".info/connected").on("value", s => {
            document.getElementById('connStatus').innerHTML = s.val() ? "<span style='color:#00ff88'>● متصل بالسحابة</span>" : "<span style='color:#ff4757'>○ غير متصل</span>";
        });

        // جلب الأقسام
        db.ref('categories').on('value', s => {
            const select = document.getElementById('categorySelect');
            select.innerHTML = "";
            s.forEach(c => {
                select.innerHTML += `<option value="${c.val().name}">${c.val().name}</option>`;
            });
        });

        function addCategory() {
            const name = document.getElementById('catInput').value.trim();
            if(name) db.ref('categories').push({name}).then(() => document.getElementById('catInput').value = "");
        }

        // حفظ وتعديل التطبيقات
        function saveApp() {
            const data = {
                name: document.getElementById('appName').value,
                url: document.getElementById('appUrl').value,
                img: document.getElementById('appImg').value,
                ver: document.getElementById('appVer').value || 'v1.0',
                cat: document.getElementById('categorySelect').value,
                order: Date.now()
            };

            if(!data.name || !data.cat) return alert("أكمل البيانات");

            const ref = currentEditId ? db.ref('apps/' + currentEditId) : db.ref('apps').push();
            
            ref.set(data).then(() => {
                alert("تم الحفظ بنجاح!");
                resetForm();
            }).catch(e => alert("خطأ: " + e.message));
        }

        // عرض القائمة وتفعيل زر التعديل
        db.ref('apps').orderByChild('order').on('value', s => {
            const list = document.getElementById('appsList');
            list.innerHTML = "";
            s.forEach(c => {
                const item = c.val();
                list.innerHTML += `
                    <div class="item-card">
                        <div><b>${item.name}</b> <small>(${item.cat})</small></div>
                        <div>
                            <button class="btn-sm edit-btn" onclick="editApp('${c.key}', '${item.name}', '${item.url}', '${item.img}', '${item.ver}', '${item.cat}')">تعديل</button>
                            <button class="btn-sm del-btn" onclick="deleteApp('${c.key}')">حذف</button>
                        </div>
                    </div>`;
            });
        });

        function editApp(id, name, url, img, ver, cat) {
            currentEditId = id;
            document.getElementById('appName').value = name;
            document.getElementById('appUrl').value = url;
            document.getElementById('appImg').value = img;
            document.getElementById('appVer').value = ver;
            document.getElementById('categorySelect').value = cat;

            document.getElementById('formTitle').innerText = "📝 تعديل تطبيق";
            document.getElementById('submitBtn').innerText = "تحديث الآن";
            document.getElementById('submitBtn').classList.add('edit-mode');
            document.getElementById('cancelBtn').style.display = "block";
            window.scrollTo(0,0);
        }

        function resetForm() {
            currentEditId = null;
            document.querySelectorAll('input').forEach(i => i.value = "");
            document.getElementById('formTitle').innerText = "إدارة التطبيقات";
            document.getElementById('submitBtn').innerText = "🚀 حفظ ونشر";
            document.getElementById('submitBtn').classList.remove('edit-mode');
            document.getElementById('cancelBtn').style.display = "none";
        }

        function deleteApp(id) { if(confirm("حذف نهائي؟")) db.ref('apps/' + id).remove(); }
    </script>
</body>
</html>
