<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aws Store - التحديث السحابي التلقائي</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f2f5; padding: 20px; direction: rtl; text-align: center; }
        .config-box { background: #fff; padding: 15px; border-radius: 10px; border: 1px solid #000; margin-bottom: 20px; max-width: 500px; margin-inline: auto; }
        .admin-panel { max-width: 500px; margin: auto; background: #fff; padding: 20px; border-radius: 15px; border: 2px solid #000; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .save-btn { width: 100%; padding: 15px; background: #27ae60; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; }
        .status { margin-top: 15px; padding: 10px; border-radius: 5px; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="config-box">
    <h3>⚙️ إعدادات الربط مع GitHub</h3>
    <input type="password" id="ghToken" placeholder="أدخل GitHub Token الخاص بك">
    <small>يتم حفظ التوكن في متصفحك فقط لأغراض الأمان.</small>
</div>

<div class="admin-panel">
    <h2>➕ إضافة وتحديث تلقائي</h2>
    <input type="text" id="appName" placeholder="اسم التطبيق">
    <input type="text" id="appUrl" placeholder="رابط التحميل">
    <input type="text" id="appImg" placeholder="رابط الصورة">
    <select id="appCat">
        <option value="apps">تطبيقات (Apps)</option>
        <option value="sat">Sat Softwar</option>
    </select>
    <button class="save-btn" onclick="processUpdate()">🚀 حفظ وتحديث جيت هاب فوراً</button>
    <div id="statusMsg" class="status"></div>
</div>

<script>
    // إعدادات المستودع الخاصة بك
    const OWNER = "aous1980";
    const REPO = "Aws-Store";
    const FILE_PATH = "apps.json";

    // تحميل التوكن المحفوظ إن وجد
    document.getElementById('ghToken').value = localStorage.getItem('gh_token') || '';

    async function processUpdate() {
        const token = document.getElementById('ghToken').value;
        const name = document.getElementById('appName').value;
        const url = document.getElementById('appUrl').value;
        const img = document.getElementById('appImg').value;
        const cat = document.getElementById('appCat').value;
        const status = document.getElementById('statusMsg');

        if (!token || !name || !url) {
            alert("يرجى ملء البيانات والتوكن!");
            return;
        }

        // حفظ التوكن محلياً للاستخدام القادم
        localStorage.setItem('gh_token', token);
        
        showStatus("⏳ جاري الاتصال بـ GitHub...", "#3498db");

        try {
            // 1. جلب محتوى الملف الحالي و الـ SHA (ضروري للتحديث في جيت هاب)
            const getUrl = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`;
            const response = await fetch(getUrl, {
                headers: { "Authorization": `token ${token}` }
            });

            if (!response.ok) throw new Error("فشل جلب البيانات من جيت هاب");

            const fileData = await response.json();
            const currentContent = JSON.parse(atob(fileData.content)); // تحويل من Base64

            // 2. إضافة التطبيق الجديد للقائمة
            currentContent.push({ name, url, img, cat });

            // 3. رفع الملف المحدث إلى GitHub
            const updatedBase64 = btoa(unescape(encodeURIComponent(JSON.stringify(currentContent, null, 2))));
            
            const putResponse = await fetch(getUrl, {
                method: "PUT",
                headers: {
                    "Authorization": `token ${token}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: `إضافة تطبيق جديد: ${name}`,
                    content: updatedBase64,
                    sha: fileData.sha // مهم جداً لإتمام التحديث
                })
            });

            if (putResponse.ok) {
                showStatus("✅ تم التحديث بنجاح! المتجر سيتحدث الآن في كل الأجهزة.", "#27ae60");
                clearInputs();
            } else {
                throw new Error("فشل عملية الرفع");
            }

        } catch (error) {
            showStatus("❌ خطأ: " + error.message, "#e74c3c");
        }
    }

    function showStatus(msg, color) {
        const s = document.getElementById('statusMsg');
        s.style.display = "block";
        s.style.backgroundColor = color;
        s.style.color = "#fff";
        s.innerText = msg;
    }

    function clearInputs() {
        document.getElementById('appName').value = "";
        document.getElementById('appUrl').value = "";
        document.getElementById('appImg').value = "";
    }
</script>
</body>
</html>
