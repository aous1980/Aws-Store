<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم - Aws Store</title>
    <style>
        body { background: #fff; font-family: Arial; text-align: center; padding: 20px; }
        .admin-box { max-width: 600px; margin: auto; border: 1px solid #ccc; padding: 20px; border-radius: 5px; }
        .input-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        input { flex-grow: 1; padding: 8px; margin: 0 10px; border: 1px solid #ddd; }
        label { min-width: 100px; font-weight: bold; }
        button { cursor: pointer; padding: 5px 15px; }
        .btn-main { background: #333; color: #fff; width: 100%; padding: 10px; margin-top: 20px; font-size: 18px; }
        .btn-del { background: #f0f0f0; border: 1px solid #ccc; }
        .btn-edit { background: #f0f0f0; border: 1px solid #ccc; }
    </style>
</head>
<body>

    <div class="admin-box">
        <h1>لوحة التحكم</h1>

        <div class="input-row">
            <label>اسم التطبيق</label>
            <input type="text" id="appName">
        </div>

        <div class="input-row">
            <button class="btn-edit">تعديل</button>
            <button class="btn-del" onclick="document.getElementById('appUrl').value=''">حذف</button>
            <input type="text" id="appUrl" placeholder="رابط التطبيق">
        </div>

        <div class="input-row">
            <button class="btn-edit">تعديل</button>
            <button class="btn-del" onclick="document.getElementById('appImg').value=''">حذف</button>
            <input type="text" id="appImg" placeholder="رابط صورة التطبيق">
        </div>

        <button class="btn-main" onclick="saveData()">إضافة إلى المتجر</button>
    </div>

    <script>
        function saveData() {
            let name = document.getElementById("appName").value;
            let url = document.getElementById("appUrl").value;
            let img = document.getElementById("appImg").value;

            if(name && url && img) {
                let store = JSON.parse(localStorage.getItem("store")) || [];
                store.push({ name, url, img });
                localStorage.setItem("store", JSON.stringify(store));
                alert("تم الحفظ بنجاح! اذهب لصفحة المتجر لمشاهدته.");
            } else {
                alert("يرجى إكمال البيانات");
            }
        }
    </script>
</body>
</html>
