<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 إدارة متجر Aws Store</title>
    <style>
        :root { --primary: #2563eb; --dark: #1e293b; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        
        /* تصميم الكروت */
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { color: var(--dark); border-right: 4px solid var(--primary); padding-right: 10px; margin-top: 0; }

        /* الفورم */
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .input-group { display: flex; flex-direction: column; }
        label { margin-bottom: 5px; font-weight: 600; font-size: 14px; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }
        
        .btn { cursor: pointer; border: none; padding: 12px 20px; border-radius: 6px; font-weight: bold; transition: 0.3s; }
        .btn-add { background: var(--primary); color: white; width: 100%; margin-top: 15px; }
        .btn-add:hover { background: #1d4ed8; }

        /* القائمة */
        .app-list { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .app-item { display: flex; align-items: center; justify-content: space-between; background: #fff; padding: 10px; border-radius: 8px; border: 1px solid #eee; }
        .app-info { display: flex; align-items: center; gap: 15px; }
        .app-info img { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; }
        
        .controls { display: flex; gap: 5px; }
        .btn-sm { padding: 5px 10px; font-size: 12px; }
        .edit { background: #ffca28; }
        .del { background: #ef4444; color: white; }

        /* Responsive Mobile */
        @media (max-width: 600px) {
            .app-item { flex-direction: column; text-align: center; }
            .controls { margin-top: 10px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2 id="formTitle">إضافة تطبيق جديد</h2>
        <div class="form-grid">
            <div class="input-group">
                <label>اسم التطبيق</label>
                <input type="text" id="appName" placeholder="مثلاً: WhatsApp Pro">
            </div>
            <div class="input-group">
                <label>القسم</label>
                <select id="appCat">
                    <option value="apps">تطبيقات</option>
                    <option value="sat">Sat Softwar</option>
                </select>
            </div>
            <div class="input-group" style="grid-column: span 2;">
                <label>رابط التحميل</label>
                <input type="url" id="appUrl" placeholder="https://...">
            </div>
            <div class="input-group" style="grid-column: span 2;">
                <label>رابط الأيقونة</label>
                <input type="url" id="appImg" placeholder="https://...">
            </div>
        </div>
        <button class="btn btn-add" onclick="saveData()" id="saveBtn">حفظ التطبيق</button>
        <button class="btn" id="cancelBtn" style="display:none; background:#ccc; width:100%; margin-top:5px;" onclick="resetForm()">إلغاء التعديل</button>
    </div>

    <div class="card">
        <h2>📦 التطبيقات المضافة</h2>
        <div id="appList" class="app-list"></div>
    </div>
</div>

<script>
    const STORAGE_KEY = "aws_store_data";
    let editIndex = -1;

    function saveData() {
        const name = document.getElementById('appName').value;
        const cat = document.getElementById('appCat').value;
        const url = document.getElementById('appUrl').value;
        const img = document.getElementById('appImg').value;

        if(!name || !url || !img) return alert("يرجى ملء كافة الحقول");

        let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        const appObj = { name, cat, url, img };

        if(editIndex === -1) {
            data.push(appObj);
        } else {
            data[editIndex] = appObj;
        }

        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        resetForm();
        render();
    }

    function render() {
        const list = document.getElementById('appList');
        let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        list.innerHTML = data.length === 0 ? "<p>لا توجد تطبيقات حالياً</p>" : "";

        data.forEach((item, index) => {
            list.innerHTML += `
                <div class="app-item">
                    <div class="app-info">
                        <img src="${item.img}" onerror="this.src='https://via.placeholder.com/50'">
                        <div>
                            <strong>${item.name}</strong><br>
                            <small>${item.cat}</small>
                        </div>
                    </div>
                    <div class="controls">
                        <button class="btn btn-sm" onclick="move(${index}, -1)">🔼</button>
                        <button class="btn btn-sm" onclick="move(${index}, 1)">🔽</button>
                        <button class="btn btn-sm edit" onclick="startEdit(${index})">تعديل</button>
                        <button class="btn btn-sm del" onclick="deleteItem(${index})">حذف</button>
                    </div>
                </div>
            `;
        });
    }

    function deleteItem(index) {
        if(confirm("هل أنت متأكد؟")) {
            let data = JSON.parse(localStorage.getItem(STORAGE_KEY));
            data.splice(index, 1);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            render();
        }
    }

    function startEdit(index) {
        let data = JSON.parse(localStorage.getItem(STORAGE_KEY));
        const item = data[index];
        document.getElementById('appName').value = item.name;
        document.getElementById('appCat').value = item.cat;
        document.getElementById('appUrl').value = item.url;
        document.getElementById('appImg').value = item.img;
        editIndex = index;
        document.getElementById('saveBtn').innerText = "تحديث البيانات";
        document.getElementById('cancelBtn').style.display = "block";
    }

    function move(index, step) {
        let data = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if(index + step >= 0 && index + step < data.length) {
            [data[index], data[index+step]] = [data[index+step], data[index]];
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            render();
        }
    }

    function resetForm() {
        document.querySelectorAll('input').forEach(i => i.value = "");
        editIndex = -1;
        document.getElementById('saveBtn').innerText = "حفظ التطبيق";
        document.getElementById('cancelBtn').style.display = "none";
    }

    window.onload = render;
</script>
</body>
</html>
