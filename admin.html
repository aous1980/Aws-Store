<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مُولد بيانات المتجر - Aws Store</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; text-align: center; }
        .box { max-width: 500px; margin: auto; background: #fff; padding: 20px; border: 2px solid #000; border-radius: 10px; }
        input, select { width: 95%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; }
        .btn { padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 5px; }
        .add-btn { background: #000; color: #fff; width: 100%; }
        .json-output { background: #eee; padding: 10px; margin-top: 20px; border: 1px dashed #666; font-family: monospace; font-size: 12px; text-align: left; overflow-x: auto; white-space: pre-wrap; }
        .item { display: flex; justify-content: space-between; background: #fff; border: 1px solid #ddd; padding: 10px; margin-top: 5px; }
    </style>
</head>
<body>

<div class="box">
    <h2>إدارة تطبيقات المتجر</h2>
    <input type="text" id="name" placeholder="اسم التطبيق">
    <input type="text" id="url" placeholder="رابط التحميل">
    <input type="text" id="img" placeholder="رابط الصورة">
    <select id="cat">
        <option value="apps">التطبيقات (Apps)</option>
        <option value="sat">Sat Softwar</option>
    </select>
    <button class="btn add-btn" onclick="addItem()">إضافة للقائمة</button>

    <div id="list" style="margin-top:20px;"></div>

    <hr>
    <h3>انسخ الكود أدناه وضعه في ملف apps.json:</h3>
    <div class="json-output" id="jsonBox">[]</div>
    <button class="btn" style="background:blue; color:#fff;" onclick="copyJSON()">نسخ الكود بالكامل</button>
</div>

<script>
    let currentData = [];

    function addItem() {
        const name = document.getElementById('name').value;
        const url = document.getElementById('url').value;
        const img = document.getElementById('img').value;
        const cat = document.getElementById('cat').value;

        if(name && url && img) {
            currentData.push({name, url, img, cat});
            updateUI();
            document.getElementById('name').value = '';
            document.getElementById('url').value = '';
            document.getElementById('img').value = '';
        }
    }

    function updateUI() {
        const list = document.getElementById('list');
        list.innerHTML = "";
        currentData.forEach((item, index) => {
            list.innerHTML += `<div class="item">
                <span>${item.name}</span>
                <button onclick="removeItem(${index})" style="color:red">حذف</button>
            </div>`;
        });
        document.getElementById('jsonBox').innerText = JSON.stringify(currentData, null, 4);
    }

    function removeItem(index) {
        currentData.splice(index, 1);
        updateUI();
    }

    function copyJSON() {
        const text = document.getElementById('jsonBox').innerText;
        navigator.clipboard.writeText(text);
        alert("تم نسخ الكود! اذهب لملف apps.json في جيت هاب والصقه هناك.");
    }
</script>
</body>
</html>
