<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AWS Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;margin:0;background:#0f172a;color:white;}
header{padding:20px;text-align:center;background:#111827;font-size:22px;font-weight:bold;}
.container{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:15px;padding:15px;}
.card{background:#1f2937;padding:10px;border-radius:15px;text-align:center;cursor:pointer}
.card img{width:100%;height:120px;object-fit:cover;border-radius:10px}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);justify-content:center;align-items:center}
.modal-content{background:#1f2937;padding:20px;border-radius:12px;width:300px;text-align:center}
button{width:100%;padding:10px;border:none;border-radius:10px;background:#22c55e;font-weight:bold}
</style>
</head>

<body>

<header>🚀 AWS Store</header>

<div class="container" id="apps"></div>

<div class="modal" id="modal">
  <div class="modal-content">
    <img id="img" style="width:100%;border-radius:10px">
    <h3 id="name"></h3>
    <p id="desc"></p>
    <div id="price"></div>
    <a id="btnLink"><button id="btn">Action</button></a>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let products = [];

async function loadData(){
  const snap = await getDocs(collection(db,"products"));
  products = snap.docs.map(doc => ({id:doc.id,...doc.data()}));
  render();
}

function render(){
  let box = document.getElementById("apps");
  box.innerHTML = "";
  products.forEach((p,i)=>{
    box.innerHTML += `
      <div class="card" onclick="openApp(${i})">
        <img src="${p.image}">
        <h3>${p.name}</h3>
      </div>`;
  });
}

window.openApp = function(i){
  let p = products[i];

  document.getElementById("img").src = p.image;
  document.getElementById("name").innerText = p.name;
  document.getElementById("desc").innerText = p.description;

  let btn = document.getElementById("btn");
  let link = document.getElementById("btnLink");

  if(p.category === "products"){
    btn.innerText = "🛒 Order Now";
    link.href = "https://wa.me/" + p.phone + "?text=" + encodeURIComponent("I want " + p.name);
    document.getElementById("price").innerText = p.price;
  } else {
    btn.innerText = "Download";
    link.href = p.url;
    document.getElementById("price").innerText = "";
  }

  document.getElementById("modal").style.display="flex";
}

document.getElementById("modal").onclick = ()=> {
  document.getElementById("modal").style.display="none";
}

loadData();
</script>

</body>
</html>
