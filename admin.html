<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Admin - Aws Store</title>

<style>
body{
  background:#111;
  color:#fff;
  font-family:Arial;
  text-align:center;
}

input{
  width:280px;
  padding:10px;
  margin:6px;
  border:none;
  border-radius:5px;
  outline:none;
}

button{
  padding:10px 15px;
  background:#00c3ff;
  border:none;
  border-radius:5px;
  cursor:pointer;
  margin:3px;
}

.card{
  background:#222;
  margin:10px auto;
  padding:10px;
  border-radius:10px;
  width:300px;
}
img{
  width:100px;
  border-radius:5px;
}
</style>
</head>

<body>

<h1>🔐 لوحة التحكم</h1>

<input id="name" placeholder="اسم التطبيق"><br>
<input id="img" placeholder="رابط الصورة"><br>
<input id="url" placeholder="رابط التطبيق"><br>

<br>

<button onclick="add()">➕ إضافة</button>

<hr>

<div id="list"></div>

<script>

// تحميل البيانات
function load(){
  let data = JSON.parse(localStorage.getItem("store")) || [];
  let box = document.getElementById("list");
  box.innerHTML = "";

  data.forEach((item,i)=>{
    box.innerHTML += `
      <div class="card">
        <h3>${item.name}</h3>
        <img src="${item.img}"><br><br>

        <a href="${item.url}" target="_blank">فتح التطبيق</a><br><br>

        <button onclick="edit(${i})">✏️ تعديل</button>
        <button onclick="del(${i})" style="background:red">🗑️ حذف</button>
      </div>
    `;
  });
}

// إضافة
function add(){

  let name = document.getElementById("name").value;
  let img = document.getElementById("img").value;
  let url = document.getElementById("url").value;

  if(name.trim() === "" || img.trim() === "" || url.trim() === ""){
    alert("❌ املأ كل الحقول");
    return;
  }

  let data = JSON.parse(localStorage.getItem("store")) || [];

  data.push({
    name:name.trim(),
    img:img.trim(),
    url:url.trim()
  });

  localStorage.setItem("store", JSON.stringify(data));

  document.getElementById("name").value = "";
  document.getElementById("img").value = "";
  document.getElementById("url").value = "";

  load();
}

// حذف
function del(i){
  let data = JSON.parse(localStorage.getItem("store")) || [];
  data.splice(i,1);
  localStorage.setItem("store", JSON.stringify(data));
  load();
}

// ✏️ تعديل (صورة + رابط التطبيق)
function edit(i){
  let data = JSON.parse(localStorage.getItem("store")) || [];

  let newName = prompt("اسم التطبيق:", data[i].name);
  if(newName === null) return;

  let newImg = prompt("رابط الصورة:", data[i].img);
  if(newImg === null) return;

  let newUrl = prompt("رابط التطبيق:", data[i].url);
  if(newUrl === null) return;

  if(newName.trim() === "" || newImg.trim() === "" || newUrl.trim() === ""){
    alert("❌ لا يمكن ترك الحقول فارغة");
    return;
  }

  data[i] = {
    name:newName.trim(),
    img:newImg.trim(),
    url:newUrl.trim()
  };

  localStorage.setItem("store", JSON.stringify(data));

  load();
}

load();

</script>

</body>
</html>
