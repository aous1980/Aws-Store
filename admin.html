<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 لوحة التحكم المتقدمة - Aws Store</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        .admin-panel { width: 95%; max-width: 550px; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 2px solid #000; text-align: center; margin-top: 10px; }
        h1 { font-size: 22px; margin-bottom: 20px; border-bottom: 2px solid #000; padding-bottom: 10px; }

        .field-container { margin-bottom: 15px; text-align: right; }
        .label-text { display: block; font-size: 16px; margin-bottom: 5px; font-weight: bold; }
        
        .input-row { display: flex; border: 2px solid #000; border-radius: 8px; overflow: hidden; }
        .input-row input, .input-row select { flex: 1; border: none; padding: 12px; outline: none; text-align: center; font-size: 16px; width: 100%; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .add-btn { background: #000; color: #fff; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 18px; flex: 2; font-weight: bold; }
        .cancel-btn { background: #888; color: #fff; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 18px; flex: 1; display: none; }

        /* منطقة استخراج الكود */
        .json-section { margin-top: 30px; background: #222; color: #0f0; padding: 15px; border-radius: 10px; text-align: right; }
        .json-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; color: #fff; }
        #jsonCode { white-space: pre-wrap; font-family: monospace; font-size: 12px; max-height: 150px; overflow-y: auto; direction: ltr; text-align: left; background: #000; padding: 10px; border-radius: 5px; }
        .copy-btn { background: #27ae60; color: #fff; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }

        .manage-list { width: 100%; margin-top: 30px; text-align: right; }
        .app-item { background: #fff; border: 1px solid #000; padding: 12px; margin-bottom: 10px; border-radius: 10px; display: flex; flex-direction: column; gap: 8px; }
        .app-data { font-weight: bold; font-size: 14px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .app-controls { display: flex; justify-content: space-between; align-items: center; }
        .move-btns button { background: #eee; border: 1px solid #000; padding: 5px 12px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .action-btns button { border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-right: 5px; font-size: 13px; }
        .edit-btn { background: #ffc107; color: #000; }
        .del-btn { background: #ff4757; color: #fff; }
    </style>
</head>
<body>

    <div class="admin-panel">
        <h1 id="panelTitle">إضافة تطبيق جديد</h1>

        <div class="field-container">
            <span class="label-text">اسم التطبيق</span>
            <div class="input-row"><input type="text" id="appName" placeholder="اكتب الاسم"></div>
        </div>

        <div class="field-container">
            <span class="label-text">رابط التحميل</span>
            <div class="input-row"><input type="text" id="appUrl" placeholder="https://..."></div>
        </div>

        <div class="field-container">
            <span class="label-text">رابط الصورة</span>
            <div class="input-row"><input type="text" id="appImg" placeholder="https://..."></div>
        </div>

        <div class="field-container">
            <span class="label-text">القسم</span>
            <div class="input-row">
                <select id="category">
                    <option value="apps">التطبيقات (Apps)</option>
                    <option value="sat">Sat Softwar</option>
                </select>
            </div>
        </div>

        <div class="btn-group">
            <button class="add-btn" id="btnSave">➕ حفظ في القائمة</button>
            <button class="cancel-btn" id="btnCancel" onclick="resetForm()">إلغاء</button>
        </div>

        <div class="json-section">
            <div class="json-header">
                <span>كود GitHub (apps.json)</span>
                <small style="color: #aaa;">انسخ هذا الكود لمزامنة الموبايل</small>
            </div>
            <div id="jsonCode">[]</div>
            <button class="copy-btn" onclick="copyJSON()">📋 نسخ الكود وتحديث جيت هاب</button>
        </div>

        <div class="manage-list">
            <h3>📦 ترتيب وإدارة التطبيقات:</h3>
            <div id="statusList"></div>
        </div>
    </div>

    <script>
        const DB_KEY = "aws_store_online_data"; // مفتاح مختلف لضمان النظافة
        let editIndex = -1;

        const btnSave = document.getElementById('btnSave');
        const btnCancel = document.getElementById('btnCancel');
        const panelTitle = document.getElementById('panelTitle');
        const jsonCodeDiv = document.getElementById('jsonCode');

        // تحميل البيانات عند البداية
        function loadData() {
            return JSON.parse(localStorage.getItem(DB_KEY)) || [];
        }

        function saveData(data) {
            localStorage.setItem(DB_KEY, JSON.stringify(data));
            updateJSONView(data);
        }

        function updateJSONView(data) {
            jsonCodeDiv.innerText = JSON.stringify(data, null, 4);
        }

        btnSave.addEventListener('click', function() {
            const name = document.getElementById('appName').value.trim();
            const url = document.getElementById('appUrl').value.trim();
            const img = document.getElementById('appImg').value.trim();
            const cat = document.getElementById('category').value;

            if (name && url && img) {
                let data = loadData();

                if (editIndex === -1) {
                    data.push({ name, url, img, cat });
                } else {
                    data[editIndex] = { name, url, img, cat };
                }

                saveData(data);
                resetForm();
                renderList();
            } else {
                alert("⚠️ يرجى ملء كافة الخانات!");
            }
        });

        function renderList() {
            const listDiv = document.getElementById('statusList');
            let data = loadData();
            listDiv.innerHTML = data.length === 0 ? "<p style='color:gray; text-align:center;'>القائمة فارغة.</p>" : "";

            data.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'app-item';
                div.innerHTML = `
                    <div class="app-data">${index + 1}. ${item.name} <small style="color:blue">[${item.cat}]</small></div>
                    <div class="app-controls">
                        <div class="move-btns">
                            <button onclick="moveItem(${index}, -1)">🔼</button>
                            <button onclick="moveItem(${index}, 1)">🔽</button>
                        </div>
                        <div class="action-btns">
                            <button class="edit-btn" onclick="startEdit(${index})">تعديل</button>
                            <button class="del-btn" onclick="deleteItem(${index})">حذف</button>
                        </div>
                    </div>
                `;
                listDiv.appendChild(div);
            });
            updateJSONView(data);
        }

        window.startEdit = function(index) {
            let data = loadData();
            const item = data[index];
            document.getElementById('appName').value = item.name;
            document.getElementById('appUrl').value = item.url;
            document.getElementById('appImg').value = item.img;
            document.getElementById('category').value = item.cat;
            editIndex = index;
            panelTitle.innerText = "📝 تعديل: " + item.name;
            btnSave.innerText = "💾 تحديث في القائمة";
            btnCancel.style.display = "block";
            window.scrollTo(0, 0);
        };

        window.moveItem = function(index, direction) {
            let data = loadData();
            let newIndex = index + direction;
            if (newIndex >= 0 && newIndex < data.length) {
                [data[index], data[target = newIndex]] = [data[newIndex], data[index]];
                saveData(data);
                renderList();
            }
        };

        window.deleteItem = function(index) {
            if (confirm("حذف التطبيق نهائياً؟")) {
                let data = loadData();
                data.splice(index, 1);
                saveData(data);
                renderList();
            }
        };

        window.resetForm = function() {
            document.getElementById('appName').value = "";
            document.getElementById('appUrl').value = "";
            document.getElementById('appImg').value = "";
            editIndex = -1;
            panelTitle.innerText = "إضافة تطبيق جديد";
            btnSave.innerText = "➕ حفظ في القائمة";
            btnCancel.style.display = "none";
        };

        window.copyJSON = function() {
            const text = jsonCodeDiv.innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert("✅ تم نسخ الكود! اذهب الآن لملف apps.json في جيت هاب والصقه هناك لكي يظهر في الموبايل.");
            });
        };

        window.onload = renderList;
    </script>
</body>
</html>
