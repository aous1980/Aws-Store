<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>🔐 لوحة التحكم - Aws Store</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #fff; display: flex; flex-direction: column; align-items: center; padding-top: 40px; }
        .admin-panel { width: 450px; text-align: center; }
        h1 { font-size: 28px; font-weight: bold; margin-bottom: 40px; text-decoration: underline; }

        .field-container { margin-bottom: 25px; }
        .label-text { display: block; text-align: center; font-size: 20px; margin-bottom: 10px; font-weight: bold; }
        
        .input-row { display: flex; border: 2px solid #000; overflow: hidden; border-radius: 5px; }
        .input-row input { flex: 1; border: none; padding: 12px; font-size: 16px; outline: none; text-align: center; }
        .input-row button { border: none; background: #eee; padding: 0 15px; cursor: pointer; border-right: 2px solid #000; font-weight: bold; }
        .input-row button:last-child { border-right: none; border-left: 2px solid #000; }

        .category-section { margin: 30px 0; display: flex; align-items: center; justify-content: center; gap: 15px; }
        .category-section select { font-size: 22px; font-weight: bold; border: none; border-bottom: 2px solid #000; cursor: pointer; background: transparent; }

        .add-btn { background: none; border: none; cursor: pointer; margin-top: 20px; transition: 0.2s; }
        .add-btn:hover { transform: scale(1.1); }
        .add-btn .icon { font-size: 65px; display: block; line-height: 1; }
        .add-btn .text { font-size: 24px; font-weight: bold; display: block; }

        .manage-list { width: 100%; margin-top: 40px; border-top: 2px dashed #ccc; padding-top: 20px; text-align: right; }
        .app-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .del-x { color: red; font-weight: bold; cursor: pointer; border: 1px solid red; padding: 2px 8px; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="admin-panel">
        <h1>لوحة التحكم</h1>

        <div class="field-container">
            <span class="label-text">اسم التطبيق</span>
            <div class="input-row"><input type="text" id="appName" placeholder="اكتب الاسم"></div>
        </div>

        <div class="field-container">
            <span class="label-text">رابط التطبيق</span>
            <div class="input-row">
                <button onclick="document.getElementById('appUrl').focus()">تعديل</button>
                <button onclick="document.getElementById('appUrl').value=''">حذف</button>
                <input type="text" id="appUrl" placeholder="الرابط">
            </div>
        </div>

        <div class="field-container">
            <span class="label-text">رابط صورة التطبيق</span>
            <div class="input-row">
                <button onclick="document.getElementById('appImg').focus()">تعديل</button>
                <button onclick="document.getElementById('appImg').value=''">حذف</button>
                <input type="text" id="appImg" placeholder="رابط الصورة">
            </div>
        </div>

        <div class="category-section">
            <label>زر اختيار</label>
            <select id="category">
                <option value="apps">التطبيقات</option>
                <option value="sat">Sat Softwar</option>
            </select>
        </div>

        <button class="add-btn" id="finalAddBtn">
            <span class="icon">➕</span>
            <span class="text">إضافة</span>
        </button>

        <div class="manage-list">
            <h3>التطبيقات المثبتة حالياً:</h3>
            <div id="statusList"></div>
        </div>
    </div>
