<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Admin - Aws Store</title>
</head>

<body style="background:#111;color:#fff;text-align:center;font-family:Arial">

<h1>🔐 لوحة التحكم</h1>

<input id="img" placeholder="رابط الصورة"><br><br>
<input id="url" placeholder="رابط التحميل"><br><br>

<select id="type">
  <option value="apps">تطبيقات</option>
  <option value="sat">SatSoftware</option>
</select>

<br><br>

<button onclick="addItem()">➕ إضافة</button>

<script>

async function addItem(){
  let img = document.getElementById("img").value;
  let url = document.getElementById("url").value;
  let type = document.getElementById("type").value;

  let res = await fetch("apps.json");
  let data = await res.json();

  data.push({type,img,url});

  await fetch("apps.json", {
    method: "PUT",
    body: JSON.stringify(data)
  });

  alert("تمت الإضافة (ملاحظة: GitHub يحتاج رفع يدوي للملف)");
}

</script>

</body>
</html>
