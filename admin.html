<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body{font-family:Arial;background:#0f172a;color:white;padding:20px;}
input,select{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:8px;
}
button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  font-weight:bold;
}
.item{
  background:#1f2937;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<h2>🔐 Admin Panel</h2>

<input id="name" placeholder="Name">
<input id="image" placeholder="Image URL">
<input id="url" placeholder="URL">

<select id="category">
  <option value="iptv">IPTV</option>
  <option value="cinema">Cinema</option>
  <option value="tools">Tools</option>
  <option value="sat_software">SAT Software</option>
  <option value="products">Products</option>
</select>

<input id="desc" placeholder="Description">
<input id="price" placeholder="Price (only products)">

<button onclick="add()">➕ Add</button>

<h3>📦 List</h3>
<div id="list"></div>

<script>
let apps = JSON.parse(localStorage.getItem("apps") || "[]");

function save(){
  localStorage.setItem("apps", JSON.stringify(apps));
}

function add(){
  apps.push({
    name:name.value,
    image:image.value,
    url:url.value,
    category:category.value,
    description:desc.value,
    price:price.value
  });

  save();
  render();
}

function render(){
  let list = document.getElementById("list");
  list.innerHTML = "";

  apps.forEach((a,i)=>{
    list.innerHTML += `
      <div class="item">
        <b>${a.name}</b> (${a.category})
        <button onclick="del(${i})" style="background:red;margin-top:5px">Delete</button>
      </div>
    `;
  });
}

function del(i){
  apps.splice(i,1);
  save();
  render();
}

render();
</script>

</body>
</html>
