<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Admin - Aws Store</title>
</head>

<body style="background:#111;color:#fff;text-align:center;font-family:Arial">

<h1>🔐 لوحة التحكم</h1>

<input id="img" placeholder="رابط الصورة"><br><br>
<input id="url" placeholder="رابط التحميل"><br><br>

<select id="type">
  <option value="apps">📱 تطبيقات</option>
  <option value="sat">🛰️ SatSoftware</option>
</select>

<br><br>

<button onclick="add()">➕ إضافة</button>

<script>

function add(){
  let img = document.getElementById("img").value;
  let url = document.getElementById("url").value;
  let type = document.getElementById("type").value;

  let data = JSON.parse(localStorage.getItem("store")) || [];

  data.push({img,url,type});

  localStorage.setItem("store", JSON.stringify(data));

  alert("تمت الإضافة بنجاح");

  document.getElementById("img").value = "";
  document.getElementById("url").value = "";
}

</script>

</body>
</html>
