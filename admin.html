<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Admin - Aws Store</title>

<style>
body{
  background:#111;
  color:#fff;
  font-family:Arial;
  text-align:center;
}

input, select{
  width:260px;
  padding:10px;
  margin:6px;
  border:none;
  border-radius:5px;
  outline:none;
}

button{
  padding:10px 20px;
  background:#00c3ff;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.card{
  background:#222;
  margin:10px;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<h1>🔐 لوحة التحكم</h1>

<!-- الاسم -->
<input id="name" placeholder="اسم التطبيق"><br>

<!-- 🔥 خيار التطبيقات والسوفتوير -->
<select id="type">
  <option value="apps">📱 التطبيقات</option>
  <option value="sat">🛰️ السوفتوير</option>
</select>

<br>

<input id="label1" placeholder="اسم زر 1"><br>
<input id="url1" placeholder="رابط 1"><br>

<input id="label2" placeholder="اسم زر 2 (اختياري)"><br>
<input id="url2" placeholder="رابط 2"><br>

<br>

<button onclick="add()">➕ إضافة</button>

<hr>

<div id="list"></div>

<script>

function load(){
  let data = JSON.parse(localStorage.getItem("store")) || [];
  let box = document.getElementById("list");
  box.innerHTML = "";

  data.forEach((item,i)=>{
    box.innerHTML += `
      <div class="card">
        <h3>${item.name}</h3>
        <div>${item.type === "apps" ? "📱 تطبيق" : "🛰️ سوفتوير"}</div>

        <button onclick="del(${i})" style="background:red;color:#fff">حذف</button>
      </div>
    `;
  });
}

function add(){

  let name = document.getElementById("name").value;
  let type = document.getElementById("type").value;

  if(name.trim() === ""){
    alert("❌ اكتب اسم التطبيق");
    return;
  }

  let label1 = document.getElementById("label1").value;
  let url1 = document.getElementById("url1").value;

  let label2 = document.getElementById("label2").value;
  let url2 = document.getElementById("url2").value;

  let links = [];

  if(label1 && url1){
    links.push({label:label1,url:url1});
  }

  if(label2 && url2){
    links.push({label:label2,url:url2});
  }

  let data = JSON.parse(localStorage.getItem("store")) || [];

  data.push({
    name:name.trim(),
    type:type,
    links:links
  });

  localStorage.setItem("store", JSON.stringify(data));

  document.getElementById("name").value = "";
  document.getElementById("label1").value = "";
  document.getElementById("url1").value = "";
  document.getElementById("label2").value = "";
  document.getElementById("url2").value = "";

  load();
}

function del(i){
  let data = JSON.parse(localStorage.getItem("store")) || [];
  data.splice(i,1);
  localStorage.setItem("store", JSON.stringify(data));
  load();
}

load();

</script>

</body>
</html>
