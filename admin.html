<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>🔐 لوحة التحكم سحابية - Aws Store</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .admin-panel { width: 100%; max-width: 500px; background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 2px solid #000; text-align: center; }
        h1 { font-size: 26px; margin-bottom: 30px; border-bottom: 2px solid #000; padding-bottom: 10px; }
        .field-container { margin-bottom: 20px; text-align: right; }
        .label-text { display: block; font-size: 18px; margin-bottom: 8px; font-weight: bold; }
        .input-row { display: flex; border: 2px solid #000; border-radius: 8px; overflow: hidden; }
        .input-row input { flex: 1; border: none; padding: 12px; outline: none; text-align: center; font-size: 16px; }
        .category-section { margin: 25px 0; font-weight: bold; text-align: right; }
        select { padding: 10px; font-size: 16px; width: 100%; border: 2px solid #000; border-radius: 8px; margin-top: 5px; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .add-btn { background: #000; color: #fff; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 18px; flex: 2; font-weight: bold; }
        .add-btn:disabled { background: #888; }
        .manage-list { width: 100%; margin-top: 40px; text-align: right; }
        .app-item { background: #fff; border: 1px solid #000; padding: 15px; margin-bottom: 10px; border-radius: 10px; display: flex; flex-direction: column; gap: 10px; }
        .app-data { font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 5px; display: flex; align-items: center; gap: 10px; }
        .app-data img { width: 40px; height: 40px; border-radius: 5px; object-fit: cover; }
        .app-controls { display: flex; justify-content: space-between; align-items: center; }
        .move-btns button { background: #eee; border: 1px solid #000; padding: 5px 10px; cursor: pointer; border-radius: 4px; }
        .action-btns button { border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-right: 5px; }
        .edit-btn { background: #ffc107; }
        .del-btn { background: #ff4757; color: #fff; }
    </style>
</head>
<body>

    <div class="admin-panel">
        <h1 id="panelTitle">إضافة تطبيق (Cloud)</h1>

        <div class="field-container">
            <span class="label-text">اسم التطبيق</span>
            <div class="input-row"><input type="text" id="appName" placeholder="اكتب الاسم"></div>
        </div>

        <div class="field-container">
            <span class="label-text">رابط التحميل</span>
            <div class="input-row"><input type="text" id="appUrl" placeholder="https://..."></div>
        </div>

        <div class="field-container">
            <span class="label-text">رابط الصورة</span>
            <div class="input-row"><input type="text" id="appImg" placeholder="https://..."></div>
        </div>

        <div class="category-section">
            <label>اختر القسم:</label>
            <select id="category">
                <option value="apps">التطبيقات (Apps)</option>
                <option value="sat">Sat Softwar</option>
            </select>
        </div>

        <div class="btn-group">
            <button class="add-btn" id="btnSave">➕ حفظ في السحابة</button>
        </div>

        <div class="manage-list">
            <h3>📦 التطبيقات الحالية:</h3>
            <div id="statusList">جاري جلب البيانات...</div>
        </div>
    </div>

    <script>
        // --- إعدادات GITHUB ---
        const GITHUB_TOKEN = 'ضع_التوكن_هنا'; 
        const REPO_OWNER = 'اسم_حسابك';
        const REPO_NAME = 'اسم_المستودع';
        const FILE_PATH = 'data.json';
        const API_URL = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;

        let editIndex = -1;
        let currentSha = "";
        let allData = [];

        // معالجة النصوص العربية للتشفير (Base64 UTF-8)
        function utoa(str) { return btoa(unescape(encodeURIComponent(str))); }
        function atou(str) { return decodeURIComponent(escape(atob(str))); }

        // جلب البيانات من السيرفر
        async function loadData() {
            try {
                const res = await fetch(API_URL, {
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Cache-Control': 'no-cache' }
                });
                if (res.ok) {
                    const fileData = await res.json();
                    currentSha = fileData.sha;
                    allData = JSON.parse(atou(fileData.content));
                    renderList();
                }
            } catch (e) { document.getElementById('statusList').innerText = "خطأ في الاتصال!"; }
        }

        // حفظ البيانات للسيرفر
        async function saveToServer() {
            const btn = document.getElementById('btnSave');
            btn.disabled = true;
            btn.innerText = "⏳ جاري الرفع...";

            try {
                const res = await fetch(API_URL, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: "Update Store Data",
                        content: utoa(JSON.stringify(allData, null, 2)),
                        sha: currentSha
                    })
                });

                if (res.ok) {
                    alert("✅ تم الحفظ بنجاح!");
                    location.reload();
                } else {
                    alert("❌ فشل الحفظ! تأكد من التوكن أو SHA");
                }
            } catch (e) { alert("خطأ تقني!"); }
            btn.disabled = false;
        }

        function renderList() {
            const listDiv = document.getElementById('statusList');
            listDiv.innerHTML = allData.length === 0 ? "القائمة فارغة" : "";

            allData.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'app-item';
                div.innerHTML = `
                    <div class="app-data">
                        <img src="${item.img}" onerror="this.src='https://via.placeholder.com/40'">
                        <span>${item.name} (${item.cat})</span>
                    </div>
                    <div class="app-controls">
                        <div class="move-btns">
                            <button onclick="moveItem(${index}, -1)">🔼</button>
                            <button onclick="moveItem(${index}, 1)">🔽</button>
                        </div>
                        <div class="action-btns">
                            <button class="edit-btn" onclick="startEdit(${index})">📝</button>
                            <button class="del-btn" onclick="deleteItem(${index})">🗑️</button>
                        </div>
                    </div>
                `;
                listDiv.appendChild(div);
            });
        }

        document.getElementById('btnSave').onclick = async () => {
            const name = document.getElementById('appName').value;
            const url = document.getElementById('appUrl').value;
            const img = document.getElementById('appImg').value;
            const cat = document.getElementById('category').value;

            if(!name || !url) return alert("اكمل البيانات");

            if (editIndex === -1) {
                allData.push({ name, url, img, cat });
            } else {
                allData[editIndex] = { name, url, img, cat };
            }
            await saveToServer();
        };

        window.startEdit = (i) => {
            editIndex = i;
            const item = allData[i];
            document.getElementById('appName').value = item.name;
            document.getElementById('appUrl').value = item.url;
            document.getElementById('appImg').value = item.img;
            document.getElementById('category').value = item.cat;
            document.getElementById('panelTitle').innerText = "تعديل: " + item.name;
            window.scrollTo(0,0);
        };

        window.deleteItem = async (i) => {
            if(confirm("حذف نهائي؟")) {
                allData.splice(i,
