<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم Aws Store</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0b0f12; color: white; direction: rtl; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .panel { background: #161b20; padding: 20px; border-radius: 15px; border: 1px solid #bc13fe; margin-bottom: 20px; }
        h2 { color: #bc13fe; margin-top: 0; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #2d353b; background: #1c2329; color: white; box-sizing: border-box; }
        button { background: #bc13fe; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        button:hover { background: #9a0dcf; }
        .app-item { background: #1c2329; padding: 15px; margin: 10px 0; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #2d353b; }
        .del-btn { background: #ff4757; width: auto; padding: 8px 15px; }
        .loader { text-align: center; padding: 20px; color: #bc13fe; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <h2>إضافة تطبيق جديد</h2>
        <input type="text" id="appName" placeholder="اسم التطبيق">
        <input type="text" id="appUrl" placeholder="رابط التحميل (URL)">
        <input type="text" id="appImg" placeholder="رابط صورة الأيقونة">
        <input type="text" id="appVer" placeholder="الإصدار (مثل v2.0)">
        <input type="text" id="appCode" placeholder="كود التفعيل (اختياري)">
        <textarea id="appNotes" rows="3" placeholder="شرح طريقة التحديث أو ملاحظات (اختياري)"></textarea>
        
        <label>القسم:</label>
        <select id="categorySelect"></select>
        <button onclick="saveApp()">إضافة التطبيق للمتجر</button>
    </div>

    <div class="panel">
        <h2>إدارة الأقسام</h2>
        <input type="text" id="newCatName" placeholder="اسم القسم الجديد">
        <button onclick="addCategory()" style="background: #2ed573;">إضافة قسم</button>
        <div id="catList" style="margin-top:15px;"></div>
    </div>

    <div class="panel">
        <h2>التطبيقات المضافة</h2>
        <div id="appList"><p class="loader">جاري جلب البيانات...</p></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBcWwHSDX9kWVxbw1DLgGkTJoYFSBsdeuk",
        authDomain: "aws-store-aaf40.firebaseapp.com",
        databaseURL: "https://aws-store-aaf40-default-rtdb.firebaseio.com",
        projectId: "aws-store-aaf40",
        appId: "1:962301504605:web:96661f5c465b2cfd4331b4"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // جلب الأقسام والتطبيقات وتحديث القوائم
    db.ref().on('value', snap => {
        const data = snap.val() || {};
        
        // تحديث قائمة الأقسام في الـ Select
        const catSelect = document.getElementById('categorySelect');
        const catListDiv = document.getElementById('catList');
        catSelect.innerHTML = "";
        catListDiv.innerHTML = "";
        
        if (data.categories) {
            Object.keys(data.categories).forEach(id => {
                const cat = data.categories[id];
                catSelect.innerHTML += `<option value="${cat.name}">${cat.name}</option>`;
                catListDiv.innerHTML += `
                    <div class="app-item">
                        <span>${cat.name}</span>
                        <button class="del-btn" onclick="deleteItem('categories/${id}')">حذف</button>
                    </div>`;
            });
        }

        // تحديث قائمة التطبيقات
        const appListDiv = document.getElementById('appList');
        appListDiv.innerHTML = "";
        if (data.apps) {
            Object.keys(data.apps).forEach(id => {
                const app = data.apps[id];
                appListDiv.innerHTML += `
                    <div class="app-item">
                        <div>
                            <strong>${app.name}</strong> <small>(${app.cat})</small>
                        </div>
                        <button class="del-btn" onclick="deleteItem('apps/${id}')">حذف</button>
                    </div>`;
            });
        } else {
            appListDiv.innerHTML = "لا توجد تطبيقات حالياً.";
        }
    });

    function saveApp() {
        const name = document.getElementById('appName').value;
        const url = document.getElementById('appUrl').value;
        const img = document.getElementById('appImg').value;
        const ver = document.getElementById('appVer').value;
        const cat = document.getElementById('categorySelect').value;
        const code = document.getElementById('appCode').value;
        const notes = document.getElementById('appNotes').value;

        if(!name || !url || !cat) return alert("يرجى ملء الاسم والرابط والقسم!");

        const newAppRef = db.ref('apps').push();
        newAppRef.set({
            name, url, img, ver, cat, 
            code: code || "", 
            notes: notes || ""
        }).then(() => {
            alert("تمت الإضافة!");
            // مسح الخانات بعد الإضافة
            document.getElementById('appName').value = "";
            document.getElementById('appUrl').value = "";
            document.getElementById('appCode').value = "";
            document.getElementById('appNotes').value = "";
        });
    }

    function addCategory() {
        const name = document.getElementById('newCatName').value;
        if(!name) return;
        db.ref('categories').push({ name }).then(() => {
            document.getElementById('newCatName').value = "";
        });
    }

    function deleteItem(path) {
        if(confirm("هل أنت متأكد من الحذف؟")) {
            db.ref(path).remove();
        }
    }
</script>

</body>
</html>
