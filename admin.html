<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم Aws Store | إصلاح الخانات</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --bg: #0b1014;
            --accent: #00ff88;
            --text: #ffffff;
            --input-bg: #161b22;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 20px; direction: rtl; }
        .container { max-width: 600px; margin: auto; background: rgba(255,255,255,0.05); padding: 25px; border-radius: 20px; border: 1px solid var(--accent); }
        
        .field { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--accent); font-weight: bold; }
        input, select, textarea { 
            width: 100%; padding: 12px; border-radius: 10px; 
            border: 1px solid rgba(255,255,255,0.1); 
            background: var(--input-bg); color: white; 
            box-sizing: border-box; font-size: 1rem;
        }

        /* تمييز خانة الجيميل بلون مختلف لسهولة العثور عليها */
        #appGmail {
            border: 1px solid var(--00d2ff);
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
        }

        button { 
            background: var(--accent); color: #000; border: none; padding: 15px; 
            border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; 
            font-size: 1.1rem; transition: 0.3s;
        }
        button:hover { transform: scale(1.02); filter: brightness(1.2); }
        
        #loginSection { display: flex; justify-content: center; align-items: center; height: 80vh; }
        #adminDashboard { display: none; }
    </style>
</head>
<body>

    <div id="loginSection">
        <div class="container" style="max-width: 350px;">
            <h2 style="text-align: center;">قفل الأمان</h2>
            <input type="password" id="passInput" placeholder="كلمة المرور">
            <button onclick="checkAuth()">دخول</button>
        </div>
    </div>

    <div id="adminDashboard" class="container">
        <h2 style="text-align: center; color: var(--accent);">إضافة تطبيق جديد</h2>
        <hr style="opacity: 0.1; margin-bottom: 20px;">

        <div class="field">
            <label>اسم التطبيق:</label>
            <input type="text" id="appName" placeholder="مثال: Aws TV">
        </div>

        <div class="field">
            <label>رابط الأيقونة:</label>
            <input type="text" id="appImg" placeholder="رابط مباشر للصورة">
        </div>

        <div class="field">
            <label>رابط التحميل:</label>
            <input type="text" id="appUrl" placeholder="رابط ملف APK">
        </div>

        <div class="field">
            <label>رقم الإصدار:</label>
            <input type="text" id="appVer" placeholder="V 1.0.0">
        </div>

        <div class="field">
            <label>القسم:</label>
            <select id="appCat"></select>
        </div>

        <div class="field">
            <label style="color: #00d2ff;">البريد الإلكتروني (Gmail):</label>
            <input type="email" id="appGmail" placeholder="username@gmail.com">
        </div>

        <div class="field">
            <label>ملاحظات التحديث:</label>
            <textarea id="appNotes" rows="3" placeholder="ما الجديد في هذا التحديث؟"></textarea>
        </div>

        <button onclick="saveApp()">نشر التطبيق الآن ✅</button>
        <button onclick="location.reload()" style="background:none; color:#ff4444; border:1px solid #ff4444; margin-top:15px; font-size: 0.9rem;">خروج</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBcWwHSDX9kWVxbw1DLgGkTJoYFSBsdeuk",
            authDomain: "aws-store-aaf40.firebaseapp.com",
            databaseURL: "https://aws-store-aaf40-default-rtdb.firebaseio.com",
            projectId: "aws-store-aaf40",
            appId: "1:962301504605:web:96661f5c465b2cfd4331b4"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function checkAuth() {
            if (document.getElementById('passInput').value.trim() === "ashd1980") {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('adminDashboard').style.display = 'block';
                loadCategories();
            } else { alert("الباسوورد خطأ!"); }
        }

        function loadCategories() {
            db.ref('categories').on('value', snap => {
                const sel = document.getElementById('appCat');
                sel.innerHTML = "";
                if (snap.exists()) {
                    Object.values(snap.val()).forEach(c => {
                        sel.innerHTML += `<option value="${c.name}">${c.name}</option>`;
                    });
                }
            });
        }

        function saveApp() {
            const data = {
                name: document.getElementById('appName').value,
                img: document.getElementById('appImg').value,
                url: document.getElementById('appUrl').value,
                ver: document.getElementById('appVer').value,
                cat: document.getElementById('appCat').value,
                gmail: document.getElementById('appGmail').value, // هنا يتم سحب قيمة الجيميل
                notes: document.getElementById('appNotes').value
            };

            if (data.name && data.url) {
                db.ref('apps').push(data).then(() => {
                    alert("تم النشر بنجاح!");
                    document.querySelectorAll('input').forEach(i => i.value = "");
                    document.getElementById('appNotes').value = "";
                });
            } else { alert("يرجى إكمال الحقول الأساسية!"); }
        }
    </script>
</body>
</html>
