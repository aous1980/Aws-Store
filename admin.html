<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة Aws Store | التحكم السحابي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0b0f12; color: white; direction: rtl; margin: 0; padding: 20px; }
        #loginOverlay { position: fixed; inset: 0; background: #0b0f12; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #161b20; padding: 40px; border-radius: 20px; border: 1px solid #bc13fe; text-align: center; width: 350px; box-shadow: 0 0 30px rgba(188, 19, 254, 0.2); }
        #adminContent { display: none; }
        .container { max-width: 850px; margin: auto; }
        .panel { background: #161b20; padding: 25px; border-radius: 15px; border: 1px solid #bc13fe; margin-bottom: 20px; position: relative; }
        .cloud-status { position: absolute; top: 15px; left: 20px; font-size: 11px; color: #2ed573; display: flex; align-items: center; gap: 5px; }
        .dot { width: 8px; height: 8px; background: #2ed573; border-radius: 50%; box-shadow: 0 0 8px #2ed573; }
        h2 { color: #bc13fe; border-bottom: 2px solid #bc13fe; display: inline-block; padding-bottom: 5px; margin-bottom: 20px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #2d353b; background: #1c2329; color: white; box-sizing: border-box; }
        .btn-main { background: #bc13fe; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-edit { background: #f1c40f; color: #000; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-left: 5px; }
        .btn-del { background: #ff4757; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
        .app-item { background: #1c2329; padding: 15px; margin: 10px 0; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #2d353b; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <img src="https://i.ibb.co/MxWwN7d8/aws-stor.png" width="80" style="border-radius:15px; margin-bottom:20px;">
        <h3>تسجيل دخول الإدارة</h3>
        <input type="email" id="emailInput" placeholder="البريد الإلكتروني">
        <input type="password" id="passInput" placeholder="كلمة المرور">
        <button class="btn-main" onclick="login()">دخول للسحابة</button>
        <p id="errorMsg" style="color: #ff4757; font-size: 13px; margin-top: 10px; display: none;"></p>
    </div>
</div>

<div id="adminContent" class="container">
    <div class="panel">
        <div class="cloud-status"><div class="dot"></div> متصل بـ Firebase</div>
        <h2 id="appTitle">إضافة تطبيق جديد</h2>
        <input type="hidden" id="editAppKey">
        <input type="text" id="appName" placeholder="اسم التطبيق">
        <input type="text" id="appUrl" placeholder="رابط التحميل">
        <input type="text" id="appImg" placeholder="رابط الأيقونة">
        <input type="text" id="appVer" placeholder="الإصدار">
        <textarea id="appNotes" rows="3" placeholder="اكتب هنا ملاحظات التحديث (ستظهر في المتجر)..."></textarea>
        <label>القسم:</label>
        <select id="categorySelect"></select>
        <button class="btn-main" id="appBtn" onclick="saveApp()">حفظ وإرسال</button>
        <button id="appCancel" onclick="resetApp()" style="display:none; background:#444; margin-top:10px;" class="btn-main">إلغاء</button>
    </div>

    <div class="panel">
        <h2 id="catTitle">إدارة الأقسام</h2>
        <input type="hidden" id="editCatKey">
        <div style="display: flex; gap: 10px;">
            <input type="text" id="newCatName" placeholder="اسم القسم" style="margin:0;">
            <button onclick="saveCat()" id="catBtn" style="background: #2ed573; width: 120px;" class="btn-main">إضافة</button>
        </div>
        <button id="catCancel" onclick="resetCat()" style="display:none; background:#444; margin-top:10px;" class="btn-main">إلغاء التعديل</button>
        <div id="catList" style="margin-top:20px;"></div>
    </div>

    <div class="panel" style="text-align: center;">
        <h2>التطبيقات المضافة</h2>
        <div id="appList"></div>
        <button onclick="logout()" style="background: #444; margin-top: 40px; font-size:12px; width: auto; padding: 10px 30px;" class="btn-main">تسجيل الخروج الآمن</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBcWwHSDX9kWVxbw1DLgGkTJoYFSBsdeuk",
        authDomain: "aws-store-aaf40.firebaseapp.com",
        databaseURL: "https://aws-store-aaf40-default-rtdb.firebaseio.com",
        projectId: "aws-store-aaf40",
        appId: "1:962301504605:web:96661f5c465b2cfd4331b4"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('adminContent').style.display = 'block';
            syncData();
        } else {
            document.getElementById('loginOverlay').style.display = 'flex';
            document.getElementById('adminContent').style.display = 'none';
        }
    });

    function login() {
        const email = document.getElementById('emailInput').value;
        const pass = document.getElementById('passInput').value;
        auth.signInWithEmailAndPassword(email, pass).catch(err => {
            const errDiv = document.getElementById('errorMsg');
            errDiv.innerText = "خطأ: " + err.message;
            errDiv.style.display = 'block';
        });
    }

    function logout() { auth.signOut(); }

    function syncData() {
        db.ref().on('value', snap => {
            const data = snap.val() || {};
            const select = document.getElementById('categorySelect');
            const catList = document.getElementById('catList');
            const appList = document.getElementById('appList');
            
            select.innerHTML = ""; catList.innerHTML = ""; appList.innerHTML = "";
            
            if(data.categories) {
                Object.keys(data.categories).forEach(id => {
                    const name = data.categories[id].name;
                    select.innerHTML += `<option value="${name}">${name}</option>`;
                    catList.innerHTML += `<div class="app-item"><span>📂 ${name}</span><div><button class="btn-edit" onclick="editCat('${id}', '${name}')">تعديل</button><button class="btn-del" onclick="deleteItem('categories/${id}')">حذف</button></div></div>`;
                });
            }
            if(data.apps) {
                Object.keys(data.apps).forEach(id => {
                    const app = data.apps[id];
                    appList.innerHTML += `<div class="app-item"><span>${app.name}</span><div><button class="btn-edit" onclick="editApp('${id}', ${JSON.stringify(app).replace(/"/g, '&quot;')})">تعديل</button><button class="btn-del" onclick="deleteItem('apps/${id}')">حذف</button></div></div>`;
                });
            }
        });
    }

    // منطق الأقسام
    function saveCat() {
        const key = document.getElementById('editCatKey').value;
        const name = document.getElementById('newCatName').value;
        if(!name) return;
        if(key) db.ref('categories/' + key).update({name}).then(() => resetCat());
        else db.ref('categories').push({name}).then(() => document.getElementById('newCatName').value = "");
    }

    function editCat(id, name) {
        document.getElementById('editCatKey').value = id;
        document.getElementById('newCatName').value = name;
        document.getElementById('catTitle').innerText = "تعديل القسم";
        document.getElementById('catBtn').innerText = "تحديث";
        document.getElementById('catBtn').style.background = "#f1c40f";
        document.getElementById('catCancel').style.display = "block";
    }

    function resetCat() {
        document.getElementById('editCatKey').value = "";
        document.getElementById('newCatName').value = "";
        document.getElementById('catTitle').innerText = "إدارة الأقسام";
        document.getElementById('catBtn').innerText = "إضافة";
        document.getElementById('catBtn').style.background = "#2ed573";
        document.getElementById('catCancel').style.display = "none";
    }

    // منطق التطبيقات
    function saveApp() {
        const key = document.getElementById('editAppKey').value;
        const appData = {
            name: document.getElementById('appName').value,
            url: document.getElementById('appUrl').value,
            img: document.getElementById('appImg').value,
            ver: document.getElementById('appVer').value,
            cat: document.getElementById('categorySelect').value,
            notes: document.getElementById('appNotes').value || ""
        };
        if(!appData.name || !appData.url) return alert("البيانات ناقصة!");
        if(key) db.ref('apps/' + key).update(appData).then(() => resetApp());
        else db.ref('apps').push(appData).then(() => resetApp());
    }
