<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Admin - Aws Store</title>

<style>
body{
  background:#111;
  color:#fff;
  font-family:Arial;
  text-align:center;
}

h1{color:#00c3ff}

input, select{
  width:250px;
  padding:10px;
  margin:5px;
  border:none;
  border-radius:5px;
}

button{
  padding:10px;
  margin:5px;
  background:#00c3ff;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.card{
  background:#1e1e1e;
  margin:10px auto;
  padding:10px;
  border-radius:10px;
  width:220px;
}
</style>

</head>

<body>

<h1>🔐 لوحة التحكم - Aws Store</h1>

<input id="img" placeholder="رابط الصورة"><br>
<input id="url" placeholder="رابط التحميل"><br>

<select id="type">
  <option value="apps">📱 تطبيقات</option>
  <option value="sat">🛰️ SatSoftware</option>
</select>

<br>

<button onclick="add()">➕ إضافة</button>

<hr>

<h2>📦 المنتجات</h2>
<div id="list"></div>

<script>

// تحميل البيانات
function load(){
  let data = JSON.parse(localStorage.getItem("store")) || [];
  let box = document.getElementById("list");
  box.innerHTML = "";

  data.forEach((item,index)=>{
    box.innerHTML += `
      <div class="card">
        <img src="${item.img}" width="100"><br><br>

        <a href="${item.url}" target="_blank" style="color:#00c3ff">
          فتح الرابط
        </a><br><br>

        <button onclick="edit(${index})">✏️ تعديل</button>
        <button onclick="del(${index})" style="background:red">🗑️ حذف</button>
      </div>
    `;
  });
}

// إضافة منتج
function add(){
  let img = document.getElementById("img").value;
  let url = document.getElementById("url").value;
  let type = document.getElementById("type").value;

  if(img === "" || url === ""){
    alert("❌ املأ الحقول");
    return;
  }

  let data = JSON.parse(localStorage.getItem("store")) || [];

  data.push({img,url,type});

  localStorage.setItem("store", JSON.stringify(data));

  document.getElementById("img").value = "";
  document.getElementById("url").value = "";

  load();
}

// حذف منتج
function del(i){
  let data = JSON.parse(localStorage.getItem("store")) || [];

  data.splice(i,1);

  localStorage.setItem("store", JSON.stringify(data));

  load();
}

// تعديل منتج
function edit(i){
  let data = JSON.parse(localStorage.getItem("store")) || [];

  let newImg = prompt("✏️ عدل رابط الصورة:", data[i].img);
  if(newImg === null) return;

  let newUrl = prompt("✏️ عدل رابط التحميل:", data[i].url);
  if(newUrl === null) return;

  if(newImg.trim() === "" || newUrl.trim() === ""){
    alert("❌ لا يمكن ترك الحقول فارغة");
    return;
  }

  data[i].img = newImg.trim();
  data[i].url = newUrl.trim();

  localStorage.setItem("store", JSON.stringify(data));

  load();
}

// تشغيل
load();

</script>

</body>
</html>
