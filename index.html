<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aws Store - المتجر العالمي</title>
    <style>
        body { background: #111; color: #fff; font-family: Arial, sans-serif; text-align: center; margin: 0; padding: 10px; }
        .filter-bar { position: sticky; top: 0; background: #111; padding: 15px; z-index: 1000; display: flex; justify-content: center; gap: 10px; border-bottom: 1px solid #333; }
        .filter-btn { background: #222; color: #fff; border: 1px solid #444; padding: 8px 18px; border-radius: 20px; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .filter-btn.active { background: #fff; color: #000; font-weight: bold; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 20px; }
        .card { background: #1e1e1e; border: 1px solid #333; border-radius: 12px; width: 160px; padding: 12px; transition: 0.3s; }
        .card img { width: 100%; height: 100px; border-radius: 8px; object-fit: cover; }
        .card h3 { font-size: 15px; margin: 12px 0; height: 36px; overflow: hidden; }
        .btn-down { background: #fff; color: #000; text-decoration: none; padding: 8px; width: 100%; display: block; border-radius: 6px; font-weight: bold; font-size: 13px; }
        @media (max-width: 480px) { .card { width: 42%; } }
    </style>
</head>
<body>

    <div class="filter-bar">
        <button class="filter-btn active" onclick="filterApps('all', this)">الكل</button>
        <button class="filter-btn" onclick="filterApps('apps', this)">التطبيقات</button>
        <button class="filter-btn" onclick="filterApps('sat', this)">Sat Softwar</button>
    </div>

    <div id="main_container" class="container">جاري جلب التطبيقات...</div>

    <script>
        // رابط ملف البيانات الخاص بك على GitHub
        const JSON_URL = "https://raw.githubusercontent.com/aous1980/Aws-Store/main/apps.json";

        async function loadStore(category = 'all') {
            try {
                const response = await fetch(JSON_URL + '?t=' + new Date().getTime());
                const data = await response.json();
                const container = document.getElementById("main_container");
                container.innerHTML = "";

                const filtered = category === 'all' ? data : data.filter(item => item.cat === category);

                if (filtered.length === 0) {
                    container.innerHTML = "<p style='color:#666'>لا توجد ملفات في هذا القسم</p>";
                    return;
                }

                filtered.forEach(item => {
                    container.innerHTML += `
                        <div class="card">
                            <img src="${item.img}" onerror="this.src='https://via.placeholder.com/150'">
                            <h3>${item.name}</h3>
                            <a href="${item.url}" class="btn-down" target="_blank">Download</a>
                        </div>`;
                });
            } catch (e) {
                document.getElementById("main_container").innerHTML = "فشل الاتصال بالسيرفر";
            }
        }

        function filterApps(category, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            loadStore(category);
        }

        window.onload = () => loadStore('all');
    </script>
</body>
</html>
