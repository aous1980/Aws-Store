<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Aws Store</title>

<style>
body{
  background:#111;
  color:#fff;
  font-family:Arial;
  text-align:center;
}

h1{color:#00c3ff}

.icons{
  display:flex;
  justify-content:center;
  gap:20px;
  margin:20px;
}

.icon{
  background:#1e1e1e;
  padding:15px 25px;
  border-radius:10px;
  cursor:pointer;
  font-size:18px;
}

.icon:hover{
  background:#00c3ff;
}

.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

.card{
  background:#1e1e1e;
  margin:10px;
  padding:10px;
  border-radius:10px;
  width:180px;
}

.card img{
  width:100%;
  border-radius:8px;
}

button{
  background:#00c3ff;
  border:none;
  padding:8px;
  border-radius:5px;
}

a{text-decoration:none;color:#fff}
</style>
</head>

<body>

<h1>🛒 Aws Store</h1>

<!-- الأيقونات -->
<div class="icons">
  <div class="icon" onclick="show('apps')">📱 التطبيقات</div>
  <div class="icon" onclick="show('sat')">🛰️ السوفتوير</div>
</div>

<!-- الأقسام -->
<h2 id="title">📱 التطبيقات</h2>

<div id="apps" class="container"></div>
<div id="sat" class="container" style="display:none"></div>

<script>

function load(){
  let data = JSON.parse(localStorage.getItem("store")) || [];

  let apps = document.getElementById("apps");
  let sat = document.getElementById("sat");

  apps.innerHTML = "";
  sat.innerHTML = "";

  data.forEach(item=>{
    let box = `
      <div class="card">
        <img src="${item.img}">
        <a href="${item.url}" target="_blank">
          <button>تحميل</button>
        </a>
      </div>
    `;

    if(item.type === "apps") apps.innerHTML += box;
    if(item.type === "sat") sat.innerHTML += box;
  });
}

function show(type){
  document.getElementById("apps").style.display = type === "apps" ? "flex" : "none";
  document.getElementById("sat").style.display = type === "sat" ? "flex" : "none";

  document.getElementById("title").innerText =
    type === "apps" ? "📱 التطبيقات" : "🛰️ السوفتوير";
}

load();

</script>

</body>
</html>
