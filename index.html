<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aws Store | المتجر الرسمي</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --main-bg: #0b0f12;
            --accent: #00ff88; 
            --accent-blue: #00d2ff;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
        }

        body {
            background: radial-gradient(circle at center, #16221f 0%, #0b0f12 100%);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 20px 0;
        }

        header img {
            width: 90px;
            filter: drop-shadow(0 0 15px var(--accent));
            border-radius: 20px;
        }

        /* شريط البحث وكود الداونلودر المحدث */
        .search-container {
            max-width: 650px;
            margin: 20px auto;
            display: flex;
            gap: 12px;
            padding: 0 15px;
            align-items: center;
        }

        .search-box {
            flex: 2;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 14px;
            border-radius: 15px;
            color: white;
            outline: none;
            backdrop-filter: blur(10px);
        }

        .downloader-badge {
            flex: 1;
            background: rgba(0, 210, 255, 0.1);
            border: 1px solid var(--accent-blue);
            padding: 12px;
            border-radius: 15px;
            color: var(--accent-blue);
            text-align: center;
            font-weight: bold;
            font-size: 0.9rem;
            white-space: nowrap;
        }

        .quick-nav {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .nav-item {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-item:hover {
            background: var(--accent);
            color: #000;
        }

        .category-title {
            color: var(--accent);
            border-right: 4px solid var(--accent);
            padding-right: 15px;
            margin: 40px 0 20px;
        }

        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .app-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 22px;
            padding: 22px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s;
        }

        .app-card:hover { transform: translateY(-5px); border-color: var(--accent); }

        .app-icon { width: 85px; height: 85px; border-radius: 18px; margin-bottom: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.3); }

        /* صندوق ملاحظات التحديث */
        .app-notes {
            font-size: 0.85rem;
            color: #ccc;
            background: rgba(0,0,0,0.3);
            padding: 12px;
            border-radius: 12px;
            margin: 15px 0;
            width: 100%;
            border-right: 3px solid var(--accent-blue);
            text-align: right;
            line-height: 1.4;
        }

        .download-btn {
            background: linear-gradient(135deg, var(--accent), var(--accent-blue));
            color: #000;
            text-decoration: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            width: 100%;
            margin-top: auto;
            transition: 0.2s;
        }

        .download-btn:hover { transform: scale(1.02); filter: brightness(1.1); }
    </style>
</head>
<body>

    <header>
        <img src="https://i.ibb.co/MxWwN7d8/aws-stor.png" alt="Logo">
        <h1>AWS STORE</h1>
    </header>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-box" placeholder="ابحث عن تطبيق..." oninput="filterApps()">
        <div class="downloader-badge">كود المتجر: 4131623</div> 
    </div>

    <div id="quickNav" class="quick-nav"></div>
    <div id="categoriesContainer"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBcWwHSDX9kWVxbw1DLgGkTJoYFSBsdeuk",
            authDomain: "aws-store-aaf40.firebaseapp.com",
            databaseURL: "https://aws-store-aaf40-default-rtdb.firebaseio.com",
            projectId: "aws-store-aaf40",
            appId: "1:962301504605:web:96661f5c465b2cfd4331b4"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let localApps = {};
        let localCats = {};

        db.ref().on('value', snap => {
            const data = snap.val() || {};
            localApps = data.apps || {};
            localCats = data.categories || {};
            
            renderNav();
            displayContent();
        });

        function renderNav() {
            const nav = document.getElementById('quickNav');
            nav.innerHTML = '<div class="nav-item" onclick="displayContent(\'all\')">الكل</div>';
            Object.values(localCats).forEach(c => {
                nav.innerHTML += `<div class="nav-item" onclick="displayContent('${c.name}')">${c.name}</div>`;
            });
        }

        function displayContent(filter = 'all', search = '') {
            const container = document.getElementById('categoriesContainer');
            container.innerHTML = "";

            Object.values(localCats).forEach(cat => {
                if (filter !== 'all' && filter !== cat.name) return;

                let appsHtml = "";
                Object.values(localApps).forEach(app => {
                    const matchSearch = app.name.toLowerCase().includes(search.toLowerCase());
                    if (app.cat === cat.name && matchSearch) {
                        appsHtml += `
                            <div class="app-card">
                                <img src="${app.img}" class="app-icon" onerror="this.src='https://i.ibb.co/F4px49v/default-icon.png'">
                                <div style="font-weight:bold; font-size:1.1rem;">${app.name}</div>
                                <div style="color:var(--accent-blue); font-size:0.8rem; margin: 4px 0;">إصدار ${app.ver}</div>
                                
                                ${app.notes ? `<div class="app-notes">📝 ملاحظات التحديث:<br>${app.notes}</div>` : ''}
                                
                                <a href="${app.url}" class="download-btn" target="_blank">تحميل الآن</a>
                            </div>
                        `;
                    }
                });

                if (appsHtml !== "") {
                    container.innerHTML += `
                        <h2 class="category-title">📂 ${cat.name}</h2>
                        <div class="apps-grid">${appsHtml}</div>
                    `;
                }
            });
        }

        function filterApps() {
            const term = document.getElementById('searchInput').value;
            displayContent('all', term);
        }
    </script>
</body>
</html>
