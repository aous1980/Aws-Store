<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Aws Store</title>
    <style>
        body { background: #111; color: #fff; font-family: Arial; text-align: center; padding: 20px; }
        .section-title { background: #fff; color: #000; padding: 10px; display: inline-block; min-width: 200px; margin: 20px 0; font-weight: bold; border-radius: 5px; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-bottom: 50px; min-height: 50px; }
        .card { background: #1e1e1e; border-radius: 10px; width: 200px; padding: 15px; border: 1px solid #333; }
        .card img { width: 100%; height: 120px; border-radius: 8px; object-fit: cover; background: #333; }
        .btn-down { background: #fff; color: #000; padding: 8px 20px; text-decoration: none; display: inline-block; margin-top: 10px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="section-title">التطبيقات</div>
    <div id="apps_container" class="container"></div>

    <div class="section-title">Sat Softwar</div>
    <div id="sat_container" class="container"></div>

    <script>
        function loadStore() {
            // ملاحظة: "aws_store_data" يجب أن يكون مطابقاً لما في لوحة التحكم
            const data = JSON.parse(localStorage.getItem("aws_store_data")) || [];
            const appsBox = document.getElementById("apps_container");
            const satBox = document.getElementById("sat_container");

            // مسح المحتوى القديم قبل العرض الجديد
            appsBox.innerHTML = "";
            satBox.innerHTML = "";

            if (data.length === 0) {
                console.log("لا توجد بيانات مخزنة حالياً.");
                return;
            }

            data.forEach(item => {
                const cardHTML = `
                    <div class="card">
                        <img src="${item.img}" onerror="this.src='https://via.placeholder.com/150?text=No+Image'">
                        <h3>${item.name}</h3>
                        <a href="${item.url}" class="btn-down" target="_blank">downloade</a>
                    </div>
                `;

                if(item.cat === "apps") {
                    appsBox.innerHTML += cardHTML;
                } else {
                    satBox.innerHTML += cardHTML;
                }
            });
        }
        
        // تشغيل الوظيفة عند فتح الصفحة
        window.onload = loadStore;
    </script>
</body>
</html>
