<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aws Store - المتجر الذكي</title>
    <style>
        /* إعدادات التصميم العام */
        :root {
            --bg-color: #111;
            --card-bg: #1e1e1e;
            --text-color: #fff;
            --accent-color: #ffffff;
            --secondary-text: #888;
        }

        body { 
            background: var(--bg-color); 
            color: var(--text-color); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0;
            padding: 0;
            text-align: center; 
        }

        header {
            padding: 40px 20px;
            background: linear-gradient(to bottom, #222, #111);
        }

        h1 { margin: 0; font-size: 2.5rem; letter-spacing: 2px; }

        /* عناوين الأقسام */
        .section-title { 
            background: var(--accent-color); 
            color: #000; 
            padding: 10px 30px; 
            display: inline-block; 
            margin: 40px 0 20px; 
            font-weight: bold; 
            border-radius: 50px;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(255,255,255,0.2);
        }

        /* حاوية المتجر المتجاوبة */
        .container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 25px; 
            padding: 20px; 
            max-width: 1200px;
            margin: 0 auto;
        }

        /* تصميم البطاقة */
        .card { 
            background: var(--card-bg); 
            border: 1px solid #333; 
            border-radius: 20px; 
            padding: 20px; 
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: #555;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card img { 
            width: 100%; 
            height: 160px; 
            border-radius: 15px; 
            object-fit: cover; 
            background: #222;
            margin-bottom: 15px;
        }

        .card h3 { 
            font-size: 20px; 
            margin: 10px 0; 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .device { 
            font-size: 13px; 
            color: var(--secondary-text); 
            margin-bottom: 20px; 
            display: block;
        }

        /* زر التحميل */
        .btn-down { 
            background: var(--accent-color); 
            color: #000; 
            text-decoration: none; 
            padding: 12px 0; 
            width: 100%; 
            display: block; 
            border-radius: 10px; 
            font-weight: bold; 
            transition: 0.2s;
        }

        .btn-down:hover {
            background: #ddd;
            transform: scale(1.02);
        }

        /* حالة التحميل */
        #loader {
            padding: 50px;
            font-size: 1.2rem;
            color: var(--secondary-text);
        }

        /* للموبايل الصغير جداً */
        @media (max-width: 480px) {
            .container {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 15px;
                padding: 10px;
            }
            .card { padding: 12px; }
            .card img { height: 120px; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Aws Store</h1>
        <p style="color: #666;">متجرك المتكامل للتطبيقات والبرامج</p>
    </header>

    <div id="loader">⏳ جاري تحميل أحدث البيانات...</div>

    <div id="apps_section" style="display: none;">
        <div class="section-title">📱 التطبيقات المميزة</div>
        <div id="apps_box" class="container"></div>
    </div>

    <div id="sat_section" style="display: none;">
        <div class="section-title">🛰️ Sat Software</div>
        <div id="sat_box" class="container"></div>
    </div>

    <script>
        // --- إعدادات الجلب من GitHub ---
        const REPO_OWNER = 'اسم_حسابك'; // ضع اسم حسابك هنا
        const REPO_NAME = 'اسم_المستودع'; // ضع اسم المستودع هنا
        const FILE_PATH = 'data.json';
        
        // رابط ملف الـ Raw (للقراءة العامة بدون توكن)
        const DATA_URL = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/${FILE_PATH}`;

        async function loadStore() {
            try {
                // إضافة متغير عشوائي للرابط لمنع "الكاش" (التخزين المؤقت) وضمان جلب أحدث البيانات
                const response = await fetch(`${DATA_URL}?t=${new Date().getTime()}`);
                
                if (!response.ok) throw new Error("File not found");

                const data = await response.json();
                
                renderCards(data);
                document.getElementById('loader').style.display = 'none';
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('loader').innerHTML = "❌ فشل تحميل البيانات. تأكد من إعدادات GitHub.";
            }
        }

        function renderCards(items) {
            const appsBox = document.getElementById("apps_box");
            const satBox = document.getElementById("sat_box");
            
            let hasApps = false;
            let hasSat = false;

            items.forEach(item => {
                const cardHTML = `
                    <div class="card">
                        <img src="${item.img}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/300x180?text=No+Image'">
                        <h3>${item.name}</h3>
                        <span class="device">متوافق مع جميع الأنظمة</span>
                        <a href="${item.url}" class="btn-down" target="_blank">تحميل مباشر</a>
                    </div>
                `;

                if (item.cat === "apps") {
                    appsBox.innerHTML += cardHTML;
                    hasApps = true;
                } else {
                    satBox.innerHTML += cardHTML;
                    hasSat = true;
                }
            });

            // إظهار الأقسام التي تحتوي على بيانات فقط
            if(hasApps) document.getElementById('apps_section').style.display = 'block';
            if(hasSat) document.getElementById('sat_section').style.display = 'block';
        }

        // تشغيل الجلب عند فتح الصفحة
        window.onload = loadStore;
    </script>
</body>
</html>
