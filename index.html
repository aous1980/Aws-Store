<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Aws Store</title>
</head>

<body style="background:#111;color:#fff;text-align:center;font-family:Arial">

<h1>🛒 Aws Store</h1>

<h2>لوحة التحكم</h2>

<input id="img" placeholder="رابط الصورة"><br><br>
<input id="url" placeholder="رابط التطبيق"><br><br>

<button onclick="addApp()">إضافة للتطبيقات</button>
<button onclick="addSat()">إضافة لـ SatSoftware</button>

<hr>

<h2>📱 التطبيقات</h2>
<div id="apps"></div>

<h2>🛰️ SatSoftware</h2>
<div id="sat"></div>

<script>
function createItem(img, url) {
  return `
    <div style="margin:10px">
      <img src="${img}" width="150"><br>
      <a href="${url}" target="_blank">تحميل</a>
    </div>
  `;
}

function addApp() {
  let img = document.getElementById("img").value;
  let url = document.getElementById("url").value;
  document.getElementById("apps").innerHTML += createItem(img, url);
}

function addSat() {
  let img = document.getElementById("img").value;
  let url = document.getElementById("url").value;
  document.getElementById("sat").innerHTML += createItem(img, url);
}
</script>

</body>
</html>
