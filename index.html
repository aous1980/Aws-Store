<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Aws Store</title>

<style>
body{
  background:#111;
  color:#fff;
  font-family:Arial;
  text-align:center;
}

.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

.card{
  background:#1e1e1e;
  margin:10px;
  padding:15px;
  border-radius:10px;
  width:220px;
}

img{
  width:100%;
  border-radius:8px;
}

button{
  background:#00c3ff;
  border:none;
  padding:6px;
  margin-top:5px;
  border-radius:5px;
}
</style>
</head>

<body>

<h1>🛒 Aws Store</h1>

<div id="list" class="container"></div>

<script>

function load(){
  let data = JSON.parse(localStorage.getItem("store")) || [];
  let box = document.getElementById("list");
  box.innerHTML = "";

  data.forEach(item=>{
    box.innerHTML += `
      <div class="card">
        <img src="${item.img}">
        <h3>${item.name}</h3>

        <a href="${item.url}" target="_blank">
          <button>تحميل</button>
        </a>
      </div>
    `;
  });
}

load();

</script>

</body>
</html>
