<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aws Store | المتجر العالمي</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f3f4f6; margin: 0; padding-bottom: 50px; }
        header { background: #111; color: #fff; padding: 30px; text-align: center; }
        .container { max-width: 1200px; margin: auto; padding: 15px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); } }
        .card { background: #fff; border-radius: 20px; padding: 15px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card img { width: 75px; height: 75px; border-radius: 18px; object-fit: cover; }
        .btn-dl { background: #2563eb; color: #fff; text-decoration: none; padding: 10px; border-radius: 12px; display: block; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<header><h1>AWS STORE</h1></header>

<div class="container">
    <div id="appsGrid" class="grid"></div>
</div>

<script>
    // استبدل هذه القيم ببيانات مشروعك من Firebase (نفس التي في اللوحة)
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        databaseURL: "https://YOUR_PROJECT.firebaseio.com",
        projectId: "YOUR_PROJECT",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // سحب البيانات حياً من السحاب
    db.ref('apps').on('value', (snap) => {
        const grid = document.getElementById('appsGrid');
        grid.innerHTML = "";
        snap.forEach((child) => {
            const item = child.val();
            grid.innerHTML += `
                <div class="card">
                    <img src="${item.img}">
                    <h3>${item.name}</h3>
                    <a href="${item.url}" class="btn-dl" target="_blank">تحميل</a>
                </div>`;
        });
    });
</script>
</body>
</html>
