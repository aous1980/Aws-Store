<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Aws Store</title>
    <style>
        body { background: #111; color: #fff; font-family: Arial; text-align: center; padding: 20px; margin: 0; }
        .section-title { background: #fff; color: #000; padding: 10px; display: inline-block; min-width: 200px; margin: 25px 0; font-weight: bold; border-radius: 4px; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; min-height: 50px; padding: 10px; }
        .card { background: #1e1e1e; border: 1px solid #333; border-radius: 12px; width: 210px; padding: 15px; }
        .card img { width: 100%; height: 120px; border-radius: 8px; object-fit: cover; background: #222; }
        .card h3 { font-size: 18px; margin: 12px 0; }
        .card .device-name { font-size: 12px; color: #888; margin-bottom: 10px; }
        .btn-down { background: #fff; color: #000; text-decoration: none; padding: 8px 0; width: 100%; display: block; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="section-title">التطبيقات</div>
    <div id="apps_container" class="container"></div>

    <div class="section-title">Sat Softwar</div>
    <div id="sat_container" class="container"></div>

    <script>
        function loadStore() {
            const data = JSON.parse(localStorage.getItem("aws_store_data")) || [];
            const appsBox = document.getElementById("apps_container");
            const satBox = document.getElementById("sat_container");

            appsBox.innerHTML = "";
            satBox.innerHTML = "";

            data.forEach(item => {
                const cardHTML = `
                    <div class="card">
                        <img src="${item.img}" onerror="this.src='https://via.placeholder.com/150?text=No+Image'">
                        <h3>${item.name}</h3>
                        <div class="device-name">اسم الجهاز</div>
                        <a href="${item.url}" class="btn-down" target="_blank">downloade</a>
                    </div>
                `;

                if(item.cat === "apps") {
                    appsBox.innerHTML += cardHTML;
                } else {
                    satBox.innerHTML += cardHTML;
                }
            });
        }
        window.onload = loadStore;
    </script>
</body>
</html>
