<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Aws Store</title>

<style>
body{
  background:#111;
  color:#fff;
  font-family:Arial;
  text-align:center;
}

h1{color:#00c3ff}

.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

.card{
  background:#1e1e1e;
  margin:10px;
  padding:15px;
  border-radius:10px;
  width:220px;
}

h3{margin:5px 0}

.small{
  color:#aaa;
  font-size:13px;
}

button{
  background:#00c3ff;
  border:none;
  padding:6px;
  margin:3px;
  border-radius:5px;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>🛒 Aws Store</h1>

<div id="list" class="container"></div>

<script>

function load(){
  let data = JSON.parse(localStorage.getItem("store")) || [];
  let box = document.getElementById("list");
  box.innerHTML = "";

  data.forEach(item=>{

    let links = "";

    if(item.links){
      item.links.forEach(l=>{
        links += `
          <a href="${l.url}" target="_blank">
            <button>${l.label}</button>
          </a>
        `;
      });
    }

    box.innerHTML += `
      <div class="card">
        <h3>${item.name}</h3>
        <div class="small">${item.version}</div>
        <br>
        ${links}
      </div>
    `;
  });
}

load();

</script>

</body>
</html>
