<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Admin - Aws Store</title>
</head>

<body style="background:#111;color:#fff;font-family:Arial;text-align:center">

<h1>🔐 لوحة التحكم</h1>

<input id="img" placeholder="رابط الصورة"><br><br>
<input id="url" placeholder="رابط التحميل"><br><br>

<select id="type">
  <option value="apps">📱 تطبيقات</option>
  <option value="sat">🛰️ SatSoftware</option>
</select>

<br><br>

<button onclick="add()">➕ إضافة</button>

<hr>

<h2>📦 المنتجات</h2>
<div id="list"></div>

<script>

// تحميل المنتجات
function load(){
  let data = JSON.parse(localStorage.getItem("store")) || [];
  let box = document.getElementById("list");
  box.innerHTML = "";

  data.forEach((item,index)=>{
    box.innerHTML += `
      <div style="margin:10px;padding:10px;background:#222">
        <img src="${item.img}" width="80"><br>
        <a href="${item.url}" target="_blank" style="color:#00c3ff">فتح</a><br><br>

        <button onclick="edit(${index})">✏️ تعديل</button>
        <button onclick="del(${index})" style="background:red;color:#fff">🗑️ حذف</button>
      </div>
    `;
  });
}

// إضافة
function add(){
  let img = document.getElementById("img").value;
  let url = document.getElementById("url").value;
  let type = document.getElementById("type").value;

  let data = JSON.parse(localStorage.getItem("store")) || [];

  data.push({img,url,type});

  localStorage.setItem("store", JSON.stringify(data));

  document.getElementById("img").value = "";
  document.getElementById("url").value = "";

  load();
}

// حذف
function del(i){
  let data = JSON.parse(localStorage.getItem("store")) || [];

  data.splice(i,1);

  localStorage.setItem("store", JSON.stringify(data));

  load();
}

// ✏️ تعديل (مهم جداً)
function edit(i){
  let data = JSON.parse(localStorage.getItem("store")) || [];

  let newImg = prompt("رابط الصورة الجديد:", data[i].img);
  if(newImg === null) return;

  let newUrl = prompt("رابط التحميل الجديد:", data[i].url);
  if(newUrl === null) return;

  if(newImg.trim() === "" || newUrl.trim() === ""){
    alert("❌ لا يمكن ترك الحقول فارغة");
    return;
  }

  data[i].img = newImg.trim();
  data[i].url = newUrl.trim();

  localStorage.setItem("store", JSON.stringify(data));

  load();
}

load();

</script>

</body>
</html>
