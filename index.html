<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aws Store | Ultra Edition</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.0/vanilla-tilt.min.js"></script>

    <style>
        :root {
            --main-bg: #0b0f12;
            --accent: #00ff88; 
            --accent-blue: #00d2ff;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
        }

        body {
            background: radial-gradient(circle at center, #1a2a26 0%, #0b0f12 100%);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header { text-align: center; padding: 30px 0; }
        header img {
            width: 100px;
            filter: drop-shadow(0 0 20px var(--accent));
            border-radius: 25px;
            transition: 0.5s;
        }
        header img:hover { transform: rotate(360deg) scale(1.1); }

        /* شريط البحث والداونلودر */
        .top-bar {
            max-width: 700px;
            margin: 0 auto 30px;
            display: flex;
            gap: 15px;
            padding: 0 15px;
        }

        .search-box {
            flex: 2;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 15px 20px;
            border-radius: 18px;
            color: white;
            outline: none;
            backdrop-filter: blur(15px);
            transition: 0.3s;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.02);
        }

        .search-box:focus {
            border-color: var(--accent);
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.15);
        }

        .downloader-badge {
            flex: 1;
            background: linear-gradient(135deg, rgba(0, 210, 255, 0.1), rgba(0, 255, 136, 0.1));
            border: 1px solid var(--accent-blue);
            padding: 12px;
            border-radius: 18px;
            color: var(--accent-blue);
            text-align: center;
            font-weight: bold;
            font-size: 0.85rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .quick-nav {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        .nav-item {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.4s;
            font-weight: 500;
        }

        .nav-item:hover, .nav-item.active {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
        }

        /* شبكة التطبيقات */
        #categoriesContainer { max-width: 1200px; margin: auto; }
        .category-title {
            color: var(--accent);
            border-right: 5px solid var(--accent);
            padding-right: 15px;
            margin: 50px 0 25px;
            font-size: 1.5rem;
            text-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
        }

        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 30px;
        }

        /* بطاقة التطبيق المطورة - Tilt Effect */
        .app-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 25px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform-style: preserve-3d;
            transform: perspective(1000px);
            transition: border 0.3s;
        }

        .app-card:hover { border-color: var(--accent); }

        .app-icon {
            width: 90px;
            height: 90px;
            border-radius: 22px;
            margin-bottom: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            transform: translateZ(30px); /* يبرز الأيقونة للأمام */
        }

        .app-name {
            font-weight: bold;
            font-size: 1.2rem;
            transform: translateZ(20px);
        }

        .app-ver {
            color: var(--accent-blue);
            font-size: 0.85rem;
            margin: 5px 0;
            transform: translateZ(15px);
        }

        .app-notes {
            font-size: 0.85rem;
            color: #bbb;
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 15px;
            margin: 15px 0;
            width: 100%;
            border-right: 4px solid var(--accent-blue);
            text-align: right;
            line-height: 1.5;
            transform: translateZ(10px);
        }

        .download-btn {
            background: linear-gradient(45deg, var(--accent), var(--accent-blue));
            color: #000;
            text-decoration: none;
            padding: 14px;
            border-radius: 15px;
            font-weight: bold;
            width: 100%;
            margin-top: auto;
            transform: translateZ(25px);
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .download-btn:hover {
            filter: brightness(1.2);
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.4);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <img src="https://i.ibb.co/MxWwN7d8/aws-stor.png" alt="Logo">
        <h1 style="letter-spacing: 3px;">AWS STORE</h1>
    </header>

    <div class="top-bar">
        <input type="text" id="searchInput" class="search-box" placeholder="ابحث عن تطبيقك المفضل..." oninput="filterApps()">
        <div class="downloader-badge">
            <span style="font-size: 0.7rem; opacity: 0.8;">كود تطبيق Downloader</span>
            <span style="font-size: 1.1rem; letter-spacing: 1px;">4131623</span>
        </div> 
    </div>

    <div id="quickNav" class="quick-nav"></div>
    <div id="categoriesContainer"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBcWwHSDX9kWVxbw1DLgGkTJoYFSBsdeuk",
            authDomain: "aws-store-aaf40.firebaseapp.com",
            databaseURL: "https://aws-store-aaf40-default-rtdb.firebaseio.com",
            projectId: "aws-store-aaf40",
            appId: "1:962301504605:web:96661f5c465b2cfd4331b4"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let localApps = {};
        let localCats = {};

        db.ref().on('value', snap => {
            const data = snap.val() || {};
            localApps = data.apps || {};
            localCats = data.categories || {};
            renderNav();
            displayContent();
        });

        function renderNav() {
            const nav = document.getElementById('quickNav');
            nav.innerHTML = '<div class="nav-item active" id="nav-all" onclick="changeCat(\'all\')">الكل</div>';
            Object.values(localCats).forEach(c => {
                nav.innerHTML += `<div class="nav-item" id="nav-${c.name}" onclick="changeCat('${c.name}')">${c.name}</div>`;
            });
        }

        function changeCat(catName) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('nav-' + (catName === 'all' ? 'all' : catName)).classList.add('active');
            displayContent(catName);
        }

        function displayContent(filter = 'all', search = '') {
            const container = document.getElementById('categoriesContainer');
            container.innerHTML = "";

            Object.values(localCats).forEach(cat => {
                if (filter !== 'all' && filter !== cat.name) return;

                let appsHtml = "";
                Object.values(localApps).forEach(app => {
                    if (app.cat === cat.name && app.name.toLowerCase().includes(search.toLowerCase())) {
                        appsHtml += `
                            <div class="app-card" data-tilt data-tilt-max="10" data-tilt-speed="400" data-tilt-glare data-tilt-max-glare="0.1">
                                <img src="${app.img}" class="app-icon" onerror="this.src='https://i.ibb.co/F4px49v/default-icon.png'">
                                <div class="app-name">${app.name}</div>
                                <div class="app-ver">إصدار ${app.ver}</div>
                                ${app.notes ? `<div class="app-notes">📑 ملاحظات التحديث:<br>${app.notes}</div>` : ''}
                                <a href="${app.url}" class="download-btn" target="_blank">تحميل سريع</a>
                            </div>
                        `;
                    }
                });

                if (appsHtml !== "") {
                    container.innerHTML += `
                        <h2 class="category-title" style="animation: fadeInUp 0.5s ease">📂 ${cat.name}</h2>
                        <div class="apps-grid">${appsHtml}</div>
                    `;
                }
            });
            // إعادة تفعيل تأثير Tilt للعناصر الجديدة
            VanillaTilt.init(document.querySelectorAll(".app-card"));
        }

        function filterApps() {
            const term = document.getElementById('searchInput').value;
            displayContent('all', term);
        }
    </script>
</body>
</html>
