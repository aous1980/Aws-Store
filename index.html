<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aws Store | المتجر المتكامل</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { 
            --accent: #bc13fe; 
            --accent-glow: rgba(188, 19, 254, 0.4);
            --bg-dark: #0b0f12;
            --card-bg: rgba(15, 15, 25, 0.75); /* زجاجي داكن */
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body.light-mode {
            --bg-dark: #f0f2f5;
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-main: #1a1a1a;
            --text-dim: #555555;
            --glass-border: rgba(0, 0, 0, 0.1);
        }

        body { 
            background-color: var(--bg-dark);
            /* --- إعادة صورة الخلفية هنا --- */
            background-image: url('https://cdn.pixground.com/storage/v1/render/image/public/wallpapers/7ce9c239-012c-4b86-a145-21e8edf7be29/p88gGVju6l.jpg?width=1280&quality=85&height=1080&resize=contain');
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            background-size: cover;
            /* ---------------------------- */
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            min-height: 100vh;
            transition: background 0.5s ease, color 0.3s ease;
        }

        /* الطبقة الشفافة فوق الخلفية لضمان قراءة النصوص */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); /* تظليل خفيف */
            z-index: -1;
        }
        body.light-mode .bg-overlay { background: rgba(255, 255, 255, 0.2); }

        .top-actions {
            position: fixed; top: 20px; left: 20px;
            display: flex; gap: 10px; z-index: 2000;
        }

        .action-btn {
            background: var(--card-bg); border: 1px solid var(--glass-border);
            width: 45px; height: 45px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(10px); color: var(--text-main); font-size: 18px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .header { padding: 60px 20px 20px; text-align: center; }
        .header img { width: 110px; border-radius: 25px; filter: drop-shadow(0 0 15px var(--accent-glow)); }

        .sticky-nav {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(11, 15, 18, 0.8); backdrop-filter: blur(20px);
            padding: 15px 0; border-bottom: 1px solid var(--glass-border);
        }
        body.light-mode .sticky-nav { background: rgba(255, 255, 255, 0.8); }

        .search-wrapper { max-width: 500px; margin: 0 auto 15px; padding: 0 20px; }
        .search-input {
            width: 100%; padding: 12px 25px; border-radius: 50px;
            border: 1px solid var(--accent); background: rgba(0,0,0,0.3);
            color: #fff; outline: none; text-align: center;
        }
        body.light-mode .search-input { background: #fff; color: #000; }

        .categories-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 5px 20px; scrollbar-width: none; }
        .categories-scroll::-webkit-scrollbar { display: none; }

        .cat-chip {
            padding: 8px 22px; border-radius: 50px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border); white-space: nowrap; cursor: pointer;
            color: var(--text-main); backdrop-filter: blur(5px);
        }
        .cat-chip.active { background: var(--accent); color: white; border-color: var(--accent); }

        .main-container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        .apps-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }

        .app-card {
            background: var(--card-bg); border: 1px solid var(--glass-border);
            border-radius: 24px; padding: 18px; text-align: center; transition: 0.3s;
            backdrop-filter: blur(10px);
        }
        .app-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .app-icon { width: 75px; height: 75px; border-radius: 20px; object-fit: cover; margin-bottom: 10px; }

        .download-btn {
            display: block; background: linear-gradient(45deg, var(--accent), #6a11cb);
            color: white; text-decoration: none; padding: 10px; border-radius: 12px;
            font-weight: bold; margin-top: 10px; font-size: 14px;
        }

        #loader { position: fixed; inset: 0; background: var(--bg-dark); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--accent-glow); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body id="mainBody">

    <div class="bg-overlay"></div>
    <div id="loader"><div class="spinner"></div></div>

    <div class="top-actions">
        <button class="action-btn" onclick="toggleTheme()">🌓</button>
        <button class="action-btn" onclick="shareStore()">🔗</button>
    </div>

    <header class="header">
        <img src="https://i.ibb.co/MxWwN7d8/aws-stor.png" alt="Logo">
        <h1>Aws Store</h1>
    </header>

    <nav class="sticky-nav">
        <div class="search-wrapper">
            <input type="text" id="searchInput" class="search-input" placeholder="ابحث عن تطبيق..." oninput="renderApps()">
        </div>
        <div class="categories-scroll" id="categoryNav"></div>
    </nav>

    <main class="main-container" id="contentArea"></main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBcWwHSDX9kWVxbw1DLgGkTJoYFSBsdeuk",
            authDomain: "aws-store-aaf40.firebaseapp.com",
            databaseURL: "https://aws-store-aaf40-default-rtdb.firebaseio.com",
            projectId: "aws-store-aaf40",
            appId: "1:962301504605:web:96661f5c465b2cfd4331b4"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let state = { apps: [], categories: [], activeCategory: "الكل" };

        db.ref().on('value', snap => {
            const data = snap.val() || {};
            state.apps = data.apps ? Object.values(data.apps) : [];
            state.categories = data.categories ? Object.values(data.categories) : [];
            document.getElementById('loader').style.display = 'none';
            renderCategories(); renderApps();
        });

        function renderCategories() {
            const nav = document.getElementById('categoryNav');
            let html = `<div class="cat-chip ${state.activeCategory === 'الكل' ? 'active' : ''}" onclick="setCategory('الكل')">الكل</div>`;
            state.categories.forEach(cat => {
                html += `<div class="cat-chip ${state.activeCategory === cat.name ? 'active' : ''}" onclick="setCategory('${cat.name}')">${cat.name}</div>`;
            });
            nav.innerHTML = html;
        }

        function setCategory(catName) {
            state.activeCategory = catName;
            renderCategories(); renderApps();
        }

        function renderApps() {
            const container = document.getElementById('contentArea');
            const search = document.getElementById('searchInput').value.toLowerCase();
            container.innerHTML = "";
            const cats = state.activeCategory === "الكل" ? state.categories : state.categories.filter(c => c.name === state.activeCategory);

            cats.forEach(cat => {
                const filtered = state.apps.filter(app => app.cat === cat.name && app.name.toLowerCase().includes(search));
                if (filtered.length > 0) {
                    let html = `<h3 style="border-right:4px solid var(--accent); padding-right:10px; margin:30px 0 15px;">${cat.name}</h3><div class="apps-grid">`;
                    filtered.forEach(app => {
                        html += `
                            <div class="app-card">
                                <img class="app-icon" src="${app.img}" onerror="this.src='https://via.placeholder.com/80'">
                                <div style="font-weight:bold; font-size:14px; margin-bottom:5px;">${app.name}</div>
                                <div style="font-size:11px; opacity:0.7;">v ${app.ver || '1.0'}</div>
                                <a href="${app.url}" class="download-btn" target="_blank">📥 تحميل</a>
                            </div>`;
                    });
                    html += `</div>`;
                    container.innerHTML += html;
                }
            });
        }

        function toggleTheme() { document.body.classList.toggle('light-mode'); }
        function shareStore() {
            if (navigator.share) {
                navigator.share({ title: 'Aws Store', url: window.location.href });
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert("تم نسخ الرابط!");
            }
        }
    </script>
</body>
</html>
