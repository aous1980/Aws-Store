<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Aws Store</title>
</head>

<body style="background:#111;color:#fff;font-family:Arial;text-align:center">

<h1>🛒 Aws Store</h1>

<h2>📱 التطبيقات</h2>
<div id="apps"></div>

<h2>🛰️ SatSoftware</h2>
<div id="sat"></div>

<script>
let data = JSON.parse(localStorage.getItem("store")) || [];

let apps = document.getElementById("apps");
let sat = document.getElementById("sat");

apps.innerHTML = "";
sat.innerHTML = "";

data.forEach(item=>{
  let box = `
    <div style="margin:10px">
      <img src="${item.img}" width="120"><br>
      <a href="${item.url}" target="_blank">تحميل</a>
    </div>
  `;

  if(item.type === "apps") apps.innerHTML += box;
  if(item.type === "sat") sat.innerHTML += box;
});
</script>

</body>
</html>
