<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Aws Store</title>

<style>
body{background:#111;color:#fff;font-family:Arial;text-align:center}
h1{color:#00c3ff}
.container{display:flex;flex-wrap:wrap;justify-content:center}
.card{background:#1e1e1e;margin:10px;padding:10px;border-radius:10px;width:180px}
.card img{width:100%;border-radius:8px}
button{background:#00c3ff;border:none;padding:8px;border-radius:5px}
a{text-decoration:none;color:#fff}
</style>
</head>

<body>

<h1>🛒 Aws Store</h1>

<h2>📱 التطبيقات</h2>
<div id="apps" class="container"></div>

<h2>🛰️ SatSoftware</h2>
<div id="sat" class="container"></div>

<script>

function load(){
  let data = JSON.parse(localStorage.getItem("store")) || [];

  let appsBox = document.getElementById("apps");
  let satBox = document.getElementById("sat");

  appsBox.innerHTML = "";
  satBox.innerHTML = "";

  data.forEach(item=>{
    let card = `
      <div class="card">
        <img src="${item.img}">
        <a href="${item.url}" target="_blank">
          <button>تحميل</button>
        </a>
      </div>
    `;

    if(item.type === "apps"){
      appsBox.innerHTML += card;
    }

    if(item.type === "sat"){
      satBox.innerHTML += card;
    }
  });
}

load();

</script>

</body>
</html>
