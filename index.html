<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AWS Store</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#0f172a;
  color:white;
}

header{
  padding:20px;
  text-align:center;
  background:#111827;
  font-size:22px;
  font-weight:bold;
}

#search{
  width:90%;
  padding:12px;
  margin:10px auto;
  display:block;
  border-radius:10px;
  border:none;
  font-size:16px;
}

.filters{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
  margin:10px;
}

.filter-btn{
  background:#1f2937;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:10px;
  cursor:pointer;
}

.filter-btn:hover{
  background:#374151;
}

.container{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:15px;
  padding:15px;
}

.card{
  background:#1f2937;
  padding:10px;
  border-radius:15px;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
}

.card img{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:10px;
}

.card h3{
  font-size:14px;
  margin:10px 0;
}

button{
  background:#22c55e;
  border:none;
  padding:8px;
  width:100%;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  background:#16a34a;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:#1f2937;
  padding:20px;
  border-radius:15px;
  width:85%;
  max-width:350px;
  text-align:center;
}

.modal-content img{
  width:100%;
  border-radius:10px;
}

.close{
  float:right;
  cursor:pointer;
  font-size:18px;
}

.desc{
  font-size:13px;
  opacity:0.8;
  margin:5px 0;
}
</style>
</head>

<body>

<header>🚀 AWS Store</header>

<input type="text" id="search" placeholder="Search apps..." onkeyup="applyFilters()" />

<div class="filters">
  <button class="filter-btn" onclick="setCategory('all')">All</button>
  <button class="filter-btn" onclick="setCategory('iptv')">IPTV</button>
  <button class="filter-btn" onclick="setCategory('cinema')">Cinema</button>
  <button class="filter-btn" onclick="setCategory('tools')">Tools</button>
  <button class="filter-btn" onclick="setCategory('sat_software')">SAT & Software</button>
  <button class="filter-btn" onclick="setCategory('products')">Products</button>
</div>

<div class="container" id="apps"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✖</span>
    <img id="mimg" />
    <h3 id="mname"></h3>
    <p class="desc" id="mdesc"></p>
    <a id="mlink" href="#" target="_blank">
      <button>Download / Open</button>
    </a>
  </div>
</div>

<script>
let appsData = [];
let currentCategory = 'all';

fetch('apps.json')
.then(res => res.json())
.then(data => {
  appsData = data;
  displayApps(appsData);
});

function displayApps(data){
  let container = document.getElementById('apps');
  container.innerHTML = '';

  data.forEach((app, index) => {
    container.innerHTML += `
      <div class="card" onclick="openModal(${index})">
        <img src="${app.image}" />
        <h3>${app.name}</h3>
      </div>
    `;
  });
}

function openModal(i){
  let app = appsData[i];

  document.getElementById('mimg').src = app.image;
  document.getElementById('mname').innerText = app.name;
  document.getElementById('mdesc').innerText = app.description || "No description";
  document.getElementById('mlink').href = app.url;

  document.getElementById('modal').style.display = "flex";
}

function closeModal(){
  document.getElementById('modal').style.display = "none";
}

function setCategory(cat){
  currentCategory = cat;
  applyFilters();
}

function applyFilters(){
  let value = document.getElementById('search').value.toLowerCase();

  let filtered = appsData.filter(app => {
    let matchName = app.name.toLowerCase().includes(value);
    let matchCat = currentCategory === 'all' || app.category === currentCategory;
    return matchName && matchCat;
  });

  displayApps(filtered);
}
</script>

</body>
</html>
