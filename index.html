<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>متجر التطبيقات - Sat Softwar</title>
    <style>
        body { background: #111; color: #fff; font-family: Arial; text-align: center; margin: 0; padding: 20px; }
        h1 { color: #fff; font-size: 32px; margin-bottom: 5px; }
        .subtitle { color: #aaa; margin-bottom: 30px; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .card { 
            background: #1e1e1e; 
            border: 1px solid #333; 
            border-radius: 10px; 
            width: 220px; 
            padding: 15px; 
            transition: 0.3s;
        }
        .card:hover { transform: scale(1.03); }
        .card img { width: 100%; border-radius: 8px; height: 130px; object-fit: cover; }
        .card h3 { font-size: 18px; margin: 15px 0; }
        .download-btn { 
            background: #fff; 
            color: #000; 
            text-decoration: none; 
            padding: 8px 25px; 
            border-radius: 5px; 
            display: inline-block;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h1>التطبيقات</h1>
    <p class="subtitle">Sat Softwar</p>

    <div id="list" class="container"></div>

    <script>
        function loadItems() {
            let data = JSON.parse(localStorage.getItem("store")) || [];
            let box = document.getElementById("list");
            box.innerHTML = "";

            data.forEach(item => {
                box.innerHTML += `
                    <div class="card">
                        <img src="${item.img}" onerror="this.src='https://via.placeholder.com/150'">
                        <h3>${item.name}</h3>
                        <p style="font-size:12px; color:#777;">اسم الجهاز</p>
                        <a href="${item.url}" class="download-btn" target="_blank">downloade</a>
                    </div>
                `;
            });
        }
        loadItems();
    </script>
</body>
</html>
