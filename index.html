<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS Store</title>

<style>
body{font-family:Arial;margin:0;background:#0f172a;color:white;}
header{padding:20px;text-align:center;background:#111827;font-size:22px;font-weight:bold;}

.container{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:15px;
  padding:15px;
}

.card{
  background:#1f2937;
  padding:10px;
  border-radius:15px;
  text-align:center;
  cursor:pointer;
}

.card img{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:10px;
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:#1f2937;
  padding:20px;
  border-radius:12px;
  width:300px;
  text-align:center;
}
button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  font-weight:bold;
}
</style>
</head>

<body>

<header>🚀 AWS Store</header>

<div style="text-align:center;margin:10px;">
<a href="admin.html" style="color:#60a5fa">⚙ Admin Panel</a>
</div>

<div class="container" id="box"></div>

<!-- Modal -->
<div class="modal" id="modal">
  <div class="modal-content">
    <img id="img" style="width:100%;border-radius:10px">
    <h3 id="name"></h3>
    <p id="desc"></p>
    <div id="price"></div>
    <a id="link"><button id="btn">Action</button></a>
  </div>
</div>

<script>
let apps = JSON.parse(localStorage.getItem("apps") || "[]");

function render(){
  let box = document.getElementById("box");
  box.innerHTML = "";
  apps.forEach((a,i)=>{
    box.innerHTML += `
      <div class="card" onclick="openApp(${i})">
        <img src="${a.image}">
        <h3>${a.name}</h3>
      </div>
    `;
  });
}

function openApp(i){
  let a = apps[i];

  document.getElementById("img").src = a.image;
  document.getElementById("name").innerText = a.name;
  document.getElementById("desc").innerText = a.description || "";

  let phone = "9647730492020";

  if(a.category === "products"){
    document.getElementById("price").innerText = "Price: " + a.price;
    document.getElementById("btn").innerText = "🛒 Order Now";
    document.getElementById("link").href =
      "https://wa.me/" + phone + "?text=" +
      encodeURIComponent("I want " + a.name + " - " + a.price);
  }else{
    document.getElementById("price").innerText = "";
    document.getElementById("btn").innerText = "Download";
    document.getElementById("link").href = a.url;
  }

  document.getElementById("modal").style.display="flex";
}

document.getElementById("modal").onclick = ()=> {
  document.getElementById("modal").style.display="none";
}

render();
</script>

</body>
</html>
