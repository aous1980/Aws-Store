<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aws Store | المتجر المتكامل</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { 
            --accent: #bc13fe; 
            --accent-glow: rgba(188, 19, 254, 0.5);
            --text: #ffffff; 
            --glass-bg: rgba(15, 15, 25, 0.7);
        }
        
        body { 
            background: #0b0f12 url('https://cdn.pixground.com/storage/v1/render/image/public/wallpapers/7ce9c239-012c-4b86-a145-21e8edf7be29/p88gGVju6l.jpg?width=1280&quality=85&height=1080&resize=contain') no-repeat center center fixed;
            background-size: cover;
            color: var(--text); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }
        
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: -1;
        }

        /* الهيدر */
        .header-brand { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 40px 10px 20px; 
        }
        .header-brand img { 
            width: 140px; 
            filter: drop-shadow(0 0 15px var(--accent-glow));
            margin-bottom: 10px;
            transition: 0.5s;
        }
        .header-brand:hover img { transform: scale(1.05) rotate(-3deg); }
        .header-brand h1 { 
            font-size: 28px; 
            color: #fff; 
            text-shadow: 0 0 10px var(--accent);
            margin: 0;
        }

        /* بار البحث وكود الداونلودر */
        .top-bar { 
            position: sticky; 
            top: 0; 
            background: rgba(10, 10, 20, 0.6); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 1000; 
            padding: 15px 10px; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); 
        }
        .search-container { max-width: 600px; margin: auto; text-align: center; }
        .search-box input { 
            width: 100%; 
            padding: 14px 25px; 
            border-radius: 50px; 
            border: 1px solid rgba(188, 19, 254, 0.3); 
            background: rgba(0, 0, 0, 0.5); 
            color: #fff; 
            outline: none; 
            box-sizing: border-box; 
            transition: 0.3s;
            text-align: center;
            font-size: 16px;
        }
        .search-box input:focus { 
            border-color: var(--accent); 
            box-shadow: 0 0 20px var(--accent-glow);
        }

        /* تنسيق الكود المطلوب */
        .downloader-info {
            margin-top: 10px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            background: rgba(188, 19, 254, 0.1);
            display: inline-block;
            padding: 5px 20px;
            border-radius: 20px;
            border: 1px solid rgba(188, 19, 254, 0.2);
            backdrop-filter: blur(5px);
        }
        .downloader-info span {
            color: var(--accent);
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 0 8px var(--accent-glow);
            margin-right: 5px;
        }

        /* الأقسام */
        .categories-nav {
            display: flex; gap: 10px; overflow-x: auto; padding: 15px 5px; 
            max-width: 800px; margin: auto; scrollbar-width: none;
        }
        .categories-nav::-webkit-scrollbar { display: none; }

        .cat-btn { 
            background: rgba(255, 255, 255, 0.05); color: #eee; 
            border: 1px solid rgba(255, 255, 255, 0.1); padding: 8px 20px; 
            border-radius: 50px; cursor: pointer; transition: 0.3s;
            white-space: nowrap;
        }
        .cat-btn:hover { background: rgba(188, 19, 254, 0.2); }
        .cat-btn.active { 
            background: var(--accent); color: #fff; border-color: var(--accent);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        /* البطاقات */
        .container { max-width: 1200px; margin: auto; padding: 20px; flex: 1; width: 100%; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        
        .section-title { 
            color: #fff; font-size: 20px; margin: 30px 0 15px; 
            border-right: 4px solid var(--accent); padding-right: 12px; 
        }

        .app-card { 
            background: var(--glass-bg); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 22px; 
            padding: 18px; 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }
        .app-card:hover { transform: translateY(-8px); border-color: var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

        .app-ver { 
            position: absolute; left: 15px; top: 15px; 
            color: #fff; background: var(--accent); 
            padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: bold;
        }

        .card-body img { width: 70px; height: 70px; border-radius: 18px; object-fit: cover; transition: 0.3s; }
        .app-card:hover .card-body img { transform: scale(1.05); }

        .btn-group { display: flex; gap: 8px; margin-top: 10px; }
        .btn {
            flex: 1; padding: 10px; border-radius: 12px; text-decoration: none; 
            text-align: center; font-weight: bold; font-size: 14px; transition: 0.3s;
        }
        .btn-dl { background: linear-gradient(45deg, var(--accent), #4facfe); color: #fff; box-shadow: 0 4px 10px rgba(188, 19, 254, 0.3); }
        .btn-sub { background: rgba(255, 255, 255, 0.08); color: #fff; border: 1px solid rgba(255,255,255,0.1); }
        .btn:active { transform: scale(0.94); }

        footer { text-align: center; padding: 40px; background: rgba(0, 0, 0, 0.5); border-top: 1px solid rgba(255, 255, 255, 0.1); }
        footer strong { color: var(--accent); }

        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="header-brand">
        <img src="https://i.ibb.co/MxWwN7d8/aws-stor.png" alt="Aws Store Logo">
        <h1>Aws Store</h1>
    </div>

    <div class="top-bar">
        <div class="search-container">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="ابحث عن السحر..." oninput="renderAll()">
            </div>
            <div class="downloader-info">كود الداونلودر: <span>4131623</span></div>
        </div>

        <div class="categories-nav" id="catNav">
            <button class="cat-btn active" onclick="filterByCat('الكل', this)">الكل</button>
        </div>
    </div>

    <div class="container" id="storeContainer"></div>

    <footer>
        <p>جميع الحقوق محفوظة &copy; 2026 <strong>Aws Store</strong></p>
        <p style="opacity:0.6; font-size: 11px; margin-top: 5px;">Digital Experience by AWS</p>
    </footer>

    <script>
        const firebaseConfig = { databaseURL: "https://aws-store-aaf40-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allApps = []; let allCats = []; let currentFilter = "الكل";

        db.ref().on('value', snap => {
            const data = snap.val(); if (!data) return;
            allApps = data.apps ? Object.values(data.apps) : [];
            allCats = data.categories ? Object.values(data.categories) : [];
            updateCatNav(); renderAll();
        });

        function updateCatNav() {
            const nav = document.getElementById('catNav');
            const currentActive = currentFilter;
            nav.innerHTML = `<button class="cat-btn ${currentActive === 'الكل' ? 'active' : ''}" onclick="filterByCat('الكل', this)">الكل</button>`;
            allCats.forEach(cat => {
                nav.innerHTML += `<button class="cat-btn ${currentActive === cat.name ? 'active' : ''}" onclick="filterByCat('${cat.name}', this)">${cat.name}</button>`;
            });
        }

        function filterByCat(catName, btn) {
            currentFilter = catName;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active'); renderAll();
        }

        function renderAll() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const container = document.getElementById('storeContainer');
            container.innerHTML = "";
            const targetCats = currentFilter === "الكل" ? allCats : allCats.filter(c => c.name === currentFilter);
            
            targetCats.forEach(cat => {
                const filteredApps = allApps.filter(app => app.cat === cat.name && app.name.toLowerCase().includes(query));
                if (filteredApps.length > 0) {
                    let sectionHTML = `<div class="section"><div class="section-title">${cat.name}</div><div class="grid">`;
                    filteredApps.forEach(app => {
                        sectionHTML += `
                            <div class="app-card">
                                <span class="app-ver">${app.ver || 'v1.0'}</span>
                                <div class="card-body" style="display:flex; gap:15px; align-items:center; margin-bottom:15px;">
                                    <img src="${app.img}" onerror="this.src='https://via.placeholder.com/80/252525/ffffff?text=App'">
                                    <div>
                                        <p style="font-size:16px; font-weight:bold; margin:0;">${app.name}</p>
                                        <p style="font-size:12px; color:rgba(255,255,255,0.5); margin:0;">${app.cat}</p>
                                    </div>
                                </div>
                                <div class="btn-group">
                                    <a href="${app.url}" class="btn btn-dl">📥 تحميل</a>
                                    <a href="#" class="btn btn-sub">المشغل</a>
                                </div>
                            </div>`;
                    });
                    sectionHTML += `</div></div>`; container.innerHTML += sectionHTML;
                }
            });
        }
    </script>
</body>
</html>
