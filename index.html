<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS Store</title>

<style>
body{font-family:Arial;margin:0;background:#0f172a;color:white;}
header{padding:20px;text-align:center;background:#111827;font-size:22px;font-weight:bold;}

.container{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:15px;
  padding:15px;
}

.card{
  background:#1f2937;
  padding:10px;
  border-radius:15px;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{transform:scale(1.05);}

.card img{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:10px;
}

button{
  background:#22c55e;
  border:none;
  padding:8px;
  width:100%;
  border-radius:10px;
  font-weight:bold;
}

.modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:#1f2937;
  padding:20px;
  border-radius:12px;
  width:300px;
  text-align:center;
}
</style>
</head>

<body>

<header>🚀 AWS Store</header>

<div style="text-align:center;margin:10px;">
<a href="admin.html" style="color:#60a5fa">⚙ Admin Panel</a>
</div>

<div class="container" id="apps"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <img id="img" style="width:100%;border-radius:10px">
    <h3 id="name"></h3>
    <p id="desc"></p>
    <div id="price"></div>
    <a id="btnLink"><button id="btn">Action</button></a>
  </div>
</div>

<script>
let apps = [];

/* 🔥 Load from LocalStorage OR fallback to apps.json */
let localData = localStorage.getItem("apps");

if(localData && localData !== "[]"){
  apps = JSON.parse(localData);
  render();
}else{
  fetch('apps.json')
  .then(res => res.json())
  .then(data => {
    apps = data;
    render();
  });
}

function render(){
  let box = document.getElementById("apps");
  box.innerHTML = "";

  apps.forEach((app,i)=>{
    box.innerHTML += `
      <div class="card" onclick="openApp(${i})">
        <img src="${app.image}">
        <h3>${app.name}</h3>
      </div>
    `;
  });
}

function openApp(i){
  let app = apps[i];

  document.getElementById("img").src = app.image;
  document.getElementById("name").innerText = app.name;
  document.getElementById("desc").innerText = app.description || "";

  let btn = document.getElementById("btn");
  let link = document.getElementById("btnLink");

  if(app.category === "products"){
    document.getElementById("price").innerText = app.price ? "Price: " + app.price : "";

    btn.innerText = "🛒 Order Now";

    let msg = "Hello, I want " + app.name + " - Price: " + (app.price || "");
    link.href = "https://wa.me/" + app.phone + "?text=" + encodeURIComponent(msg);

  }else{
    document.getElementById("price").innerText = "";

    btn.innerText = "Download";
    link.href = app.url;
  }

  document.getElementById("modal").style.display="flex";
}

document.getElementById("modal").onclick = ()=>{
  document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
