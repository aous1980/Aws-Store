<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aws Store | Pro Edition</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.0/vanilla-tilt.min.js"></script>

    <style>
        :root {
            --main-bg: #0b0f12;
            --accent: #00ff88; 
            --accent-blue: #00d2ff;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
        }

        body {
            background: radial-gradient(circle at center, #1a2a26 0%, #0b0f12 100%);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            scroll-behavior: smooth;
        }

        header { text-align: center; padding: 20px 0; }
        header img { width: 85px; filter: drop-shadow(0 0 20px var(--accent)); border-radius: 22px; }

        .top-bar {
            max-width: 700px;
            margin: 0 auto 25px;
            display: flex;
            gap: 12px;
            padding: 0 10px;
        }

        .search-box {
            flex: 2;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 14px;
            border-radius: 15px;
            color: white;
            outline: none;
            backdrop-filter: blur(15px);
        }

        .downloader-badge {
            flex: 1;
            background: rgba(0, 210, 255, 0.1);
            border: 1px solid var(--accent-blue);
            padding: 10px;
            border-radius: 15px;
            color: var(--accent-blue);
            text-align: center;
            font-weight: bold;
            font-size: 0.8rem;
        }

        .quick-nav {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .nav-item {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-item:hover, .nav-item.active { background: var(--accent); color: #000; }

        #categoriesContainer { max-width: 1200px; margin: auto; }
        .category-title {
            color: var(--accent);
            border-right: 4px solid var(--accent);
            padding-right: 12px;
            margin: 40px 0 20px;
            font-size: 1.3rem;
        }

        /* تنسيق الشبكة الذكي */
        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        /* الجوال: تحويل الشبكة لشريط تمرير عرضي */
        @media (max-width: 768px) {
            .apps-grid {
                display: flex;
                overflow-x: auto;
                padding-bottom: 15px;
                gap: 15px;
                scroll-snap-type: x mandatory;
            }
            .app-card {
                min-width: 260px;
                scroll-snap-align: center;
            }
            /* إخفاء شريط التمرير القبيح */
            .apps-grid::-webkit-scrollbar { display: none; }
        }

        .app-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s;
        }

        .app-card:hover { border-color: var(--accent); }

        .app-icon { width: 85px; height: 85px; border-radius: 20px; margin-bottom: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); }

        .app-notes {
            font-size: 0.8rem;
            color: #bbb;
            background: rgba(0,0,0,0.3);
            padding: 12px;
            border-radius: 12px;
            margin: 12px 0;
            width: 100%;
            border-right: 3px solid var(--accent-blue);
            text-align: right;
        }

        .download-btn {
            background: linear-gradient(45deg, var(--accent), var(--accent-blue));
            color: #000;
            text-decoration: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            width: 100%;
            margin-top: auto;
        }

        /* زر الصعود للأعلى */
        #scrollTop {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 50px;
            height: 50px;
            background: var(--accent);
            color: black;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: none;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 0 20px var(--accent);
            z-index: 1000;
        }
    </style>
</head>
<body>

    <header>
        <img src="https://i.ibb.co/MxWwN7d8/aws-stor.png" alt="Logo">
        <h1>AWS STORE</h1>
    </header>

    <div class="top-bar">
        <input type="text" id="searchInput" class="search-box" placeholder="ابحث عن تطبيق..." oninput="filterApps()">
        <div class="downloader-badge">كود المتجر: 4131623</div> 
    </div>

    <div id="quickNav" class="quick-nav"></div>
    <div id="categoriesContainer"></div>
    <button id="scrollTop" onclick="window.scrollTo(0,0)">↑</button>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBcWwHSDX9kWVxbw1DLgGkTJoYFSBsdeuk",
            authDomain: "aws-store-aaf40.firebaseapp.com",
            databaseURL: "https://aws-store-aaf40-default-rtdb.firebaseio.com",
            projectId: "aws-store-aaf40",
            appId: "1:962301504605:web:96661f5c465b2cfd4331b4"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let localApps = {}, localCats = {};

        db.ref().on('value', snap => {
            const data = snap.val() || {};
            localApps = data.apps || {};
            localCats = data.categories || {};
            renderNav();
            displayContent();
        });

        function renderNav() {
            const nav = document.getElementById('quickNav');
            nav.innerHTML = '<div class="nav-item active" id="nav-all" onclick="changeCat(\'all\')">الكل</div>';
            Object.values(localCats).forEach(c => {
                nav.innerHTML += `<div class="nav-item" id="nav-${c.name}" onclick="changeCat('${c.name}')">${c.name}</div>`;
            });
        }

        function changeCat(catName) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('nav-' + (catName === 'all' ? 'all' : catName)).classList.add('active');
            displayContent(catName);
        }

        function displayContent(filter = 'all', search = '') {
            const container = document.getElementById('categoriesContainer');
            container.innerHTML = "";

            Object.values(localCats).forEach(cat => {
                if (filter !== 'all' && filter !== cat.name) return;

                let appsHtml = "";
                Object.values(localApps).forEach(app => {
                    if (app.cat === cat.name && app.name.toLowerCase().includes(search.toLowerCase())) {
                        appsHtml += `
                            <div class="app-card" data-tilt data-tilt-max="8">
                                <img src="${app.img}" class="app-icon" onerror="this.src='https://i.ibb.co/F4px49v/default-icon.png'">
                                <div style="font-weight:bold">${app.name}</div>
                                <div style="color:var(--accent-blue); font-size:0.8rem; margin:5px 0;">V ${app.ver}</div>
                                ${app.notes ? `<div class="app-notes">📝 ${app.notes}</div>` : ''}
                                <a href="${app.url}" class="download-btn" target="_blank">تحميل</a>
                            </div>
                        `;
                    }
                });

                if (appsHtml !== "") {
                    container.innerHTML += `
                        <h2 class="category-title">📂 ${cat.name}</h2>
                        <div class="apps-grid">${appsHtml}</div>
                    `;
                }
            });
            VanillaTilt.init(document.querySelectorAll(".app-card"));
        }

        function filterApps() {
            displayContent('all', document.getElementById('searchInput').value);
        }

        // إظهار وإخفاء زر الصعود
        window.onscroll = function() {
            const btn = document.getElementById("scrollTop");
            btn.style.display = (document.body.scrollTop > 400 || document.documentElement.scrollTop > 400) ? "block" : "none";
        };
    </script>
</body>
</html>
