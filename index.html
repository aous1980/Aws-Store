<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aws Store | استعادة البيانات</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.0/vanilla-tilt.min.js"></script>

    <style>
        :root {
            --main-bg: #0b0f12;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-color: #ffffff;
            --accent: #00ff88; 
            --accent-blue: #00d2ff;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: linear-gradient(-45deg, #0b0f12, #1a2a24, #0b0f12, #111d2b);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0; padding: 20px; min-height: 100vh;
            direction: rtl;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        header { text-align: center; padding: 30px 0; }
        header img { width: 90px; filter: drop-shadow(0 0 15px var(--accent)); border-radius: 20px; }

        .quick-nav { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .nav-item { background: var(--card-bg); border: 1px solid var(--glass-border); padding: 8px 18px; border-radius: 20px; cursor: pointer; color: white; transition: 0.3s; }
        .nav-item.active { background: var(--accent); color: #000; font-weight: bold; }

        .apps-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; max-width: 1200px; margin: auto; }
        .app-card { 
            background: var(--card-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 25px; 
            padding: 20px; text-align: center; transition: 0.4s; position: relative;
        }
        .app-icon { width: 80px; height: 80px; border-radius: 20px; margin-bottom: 15px; background: #fff; padding: 5px; object-fit: contain; }

        .btn-group { display: flex; flex-direction: column; gap: 8px; width: 100%; margin-top: 15px; }
        .download-btn { background: linear-gradient(45deg, var(--accent), var(--accent-blue)); color: #000; text-decoration: none; padding: 10px; border-radius: 12px; font-weight: bold; }
        .wa-btn { background: #25d366; color: #fff; text-decoration: none; padding: 10px; border-radius: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <img src="https://i.ibb.co/MxWwN7d8/aws-stor.png" alt="Logo">
        <h1 style="margin-top: 10px;">AWS STORE</h1>
        <p style="opacity: 0.7;">جاري استعادة جميع الإضافات...</p>
    </header>

    <div id="quickNav" class="quick-nav"></div>
    <div id="mainDisplay" class="apps-grid"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBcWwHSDX9kWVxbw1DLgGkTJoYFSBsdeuk",
            databaseURL: "https://aws-store-aaf40-default-rtdb.firebaseio.com",
            projectId: "aws-store-aaf40"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentCat = 'الكل';

        // دالة العرض الرئيسية
        function loadData() {
            db.ref().on('value', snap => {
                const data = snap.val() || {};
                const apps = data.apps || {};
                const cats = data.categories || {};
                
                // تحديث القائمة العلوية
                const nav = document.getElementById('quickNav');
                nav.innerHTML = `<div class="nav-item ${currentCat==='الكل'?'active':''}" onclick="setFilter('الكل')">الكل</div>`;
                Object.values(cats).forEach(c => {
                    nav.innerHTML += `<div class="nav-item ${currentCat===c.name?'active':''}" onclick="setFilter('${c.name}')">${c.name}</div>`;
                });

                // عرض المنتجات
                const display = document.getElementById('mainDisplay');
                display.innerHTML = "";
                
                Object.values(apps).forEach(app => {
                    if(currentCat === 'الكل' || app.cat === currentCat) {
                        const hasUrl = app.url && app.url !== "#" && app.url !== "";
                        display.innerHTML += `
                            <div class="app-card" data-tilt>
                                <img src="${app.img || 'https://via.placeholder.com/100'}" class="app-icon">
                                <div style="font-weight:bold; font-size: 1.1rem;">${app.name}</div>
                                <div style="color:var(--accent-blue); font-size:0.8rem; margin:5px 0;">${app.ver || ''}</div>
                                <div class="btn-group">
                                    ${hasUrl ? `<a href="${app.url}" class="download-btn">⬇ تحميل</a>` : ''}
                                    <a href="https://wa.me/9647700000000?text=طلب: ${app.name}" class="wa-btn">💬 طلب واتساب</a>
                                </div>
                            </div>`;
                    }
                });
                VanillaTilt.init(document.querySelectorAll(".app-card"));
            });
        }

        function setFilter(name) { currentCat = name; loadData(); }
        
        loadData();
    </script>
</body>
</html>
