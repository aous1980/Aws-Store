<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aws Store | المتجر</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; }
        
        header { background: #0f172a; color: white; padding: 40px 20px; text-align: center; clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%); }
        header h1 { margin: 0; font-size: 32px; letter-spacing: 2px; }

        .container { max-width: 1100px; margin: -30px auto 0; padding: 0 15px; }

        .section-title { font-size: 22px; font-weight: 700; margin: 40px 0 20px; border-right: 5px solid var(--primary); padding-right: 12px; display: flex; align-items: center; }

        .apps-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; }

        @media (max-width: 600px) { .apps-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; } }

        .app-card { background: white; border-radius: 22px; padding: 15px; text-align: center; text-decoration: none; color: inherit; transition: 0.3s; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; display: flex; flex-direction: column; align-items: center; }
        .app-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }

        .app-card img { width: 85px; height: 85px; border-radius: 20%; object-fit: cover; margin-bottom: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); background: #eee; }
        .app-card h3 { font-size: 15px; margin: 5px 0; font-weight: 700; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .app-card span { font-size: 12px; color: #64748b; margin-bottom: 12px; }

        .dl-btn { background: #f1f5f9; color: var(--primary); width: 100%; padding: 8px 0; border-radius: 50px; font-size: 12px; font-weight: 700; transition: 0.3s; }
        .app-card:hover .dl-btn { background: var(--primary); color: white; }

        .empty { text-align: center; padding: 100px 0; color: #94a3b8; }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <h1>AWS STORE</h1>
    <p>تطبيقاتك المفضلة في مكان واحد</p>
</header>

<div class="container">
    <div id="satSection" class="hidden">
        <div class="section-title">Sat Softwar</div>
        <div id="satGrid" class="apps-grid"></div>
    </div>

    <div id="appsSection" class="hidden">
        <div class="section-title">التطبيقات العامة</div>
        <div id="appsGrid" class="apps-grid"></div>
    </div>

    <div id="emptyMsg" class="empty hidden">لا توجد تطبيقات متاحة حالياً.</div>
</div>

<script>
    const DB_KEY = "aws_store_db";
    function render() {
        const data = JSON.parse(localStorage.getItem(DB_KEY)) || [];
        if (data.length === 0) { document.getElementById('emptyMsg').classList.remove('hidden'); return; }

        data.forEach(item => {
            const card = `
                <a href="${item.url}" target="_blank" class="app-card">
                    <img src="${item.img}" onerror="this.src='https://via.placeholder.com/100?text=App'">
                    <h3>${item.name}</h3>
                    <span>${item.cat === 'sat' ? 'Software' : 'Application'}</span>
                    <div class="dl-btn">تحميل</div>
                </a>`;
            if (item.cat === 'sat') {
                document.getElementById('satSection').classList.remove('hidden');
                document.getElementById('satGrid').innerHTML += card;
            } else {
                document.getElementById('appsSection').classList.remove('hidden');
                document.getElementById('appsGrid').innerHTML += card;
            }
        });
    }
    window.onload = render;
</script>
</body>
</html>
