<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aws Store | المتجر المتكامل</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>

    <style>
        :root {
            --main-bg: #0b0f12;
            --accent: #00ff88; 
            --accent-blue: #00d2ff;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
        }

        body {
            background: radial-gradient(circle at center, #16221f 0%, #0b0f12 100%);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 20px 0;
            animation: fadeInDown 0.8s ease;
        }

        header img {
            width: 90px;
            filter: drop-shadow(0 0 15px var(--accent));
            border-radius: 20px;
            margin-bottom: 10px;
        }

        /* شريط البحث وكود الداونلودر */
        .search-container {
            max-width: 650px;
            margin: 0 auto 25px;
            display: flex;
            gap: 12px;
            padding: 0 15px;
            align-items: center;
        }

        .search-box {
            flex: 2;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 14px 20px;
            border-radius: 15px;
            color: white;
            outline: none;
            backdrop-filter: blur(10px);
            transition: 0.3s;
            font-size: 15px;
        }

        .search-box:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }

        .downloader-badge {
            flex: 0.8;
            background: rgba(0, 210, 255, 0.1);
            border: 1px solid var(--accent-blue);
            padding: 12px;
            border-radius: 15px;
            color: var(--accent-blue);
            text-align: center;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.1);
        }

        /* الأقسام السريعة */
        .quick-nav {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 35px;
        }

        .nav-item {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 10px 22px;
            border-radius: 25px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.3s;
            backdrop-filter: blur(5px);
        }

        .nav-item:hover {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent);
        }

        /* شبكة التطبيقات */
        #categoriesContainer { max-width: 1100px; margin: auto; }
        .category-title {
            color: var(--accent);
            border-right: 4px solid var(--accent);
            padding-right: 15px;
            margin: 45px 0 25px;
            font-size: 1.4rem;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.2);
        }
