<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Aws Store - المتجر</title>
    <style>
        body { background: #111; color: #fff; font-family: Arial, sans-serif; text-align: center; padding: 20px; }
        .section-title { background: #fff; color: #000; padding: 10px 40px; display: inline-block; margin: 30px 0; font-weight: bold; border-radius: 5px; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 10px; }
        .card { background: #1e1e1e; border: 1px solid #333; border-radius: 15px; width: 220px; padding: 15px; }
        .card img { width: 100%; height: 130px; border-radius: 10px; object-fit: cover; background: #222; }
        .card h3 { font-size: 19px; margin: 15px 0 5px; }
        .device { font-size: 12px; color: #777; margin-bottom: 15px; }
        .btn-down { background: #fff; color: #000; text-decoration: none; padding: 10px 0; width: 100%; display: block; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="section-title">التطبيقات</div>
    <div id="apps_box" class="container"></div>

    <div class="section-title">Sat Softwar</div>
    <div id="sat_box" class="container"></div>

    <script>
        const DB_NAME = "aws_store_v1";

        function loadStoreData() {
            const data = JSON.parse(localStorage.getItem(DB_NAME)) || [];
            const appsContainer = document.getElementById("apps_box");
            const satContainer = document.getElementById("sat_box");

            appsContainer.innerHTML = "";
            satContainer.innerHTML = "";

            data.forEach(item => {
                const cardHTML = `
                    <div class="card">
                        <img src="${item.img}" onerror="this.src='https://via.placeholder.com/150'">
                        <h3>${item.name}</h3>
                        <div class="device">اسم الجهاز</div>
                        <a href="${item.url}" class="btn-down" target="_blank">downloade</a>
                    </div>
                `;

                if(item.cat === "apps") {
                    appsContainer.innerHTML += cardHTML;
                } else {
                    satContainer.innerHTML += cardHTML;
                }
            });
        }
        
        window.onload = loadStoreData;
    </script>
</body>
</html>
