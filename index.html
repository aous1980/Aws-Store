    <style>
        :root { 
            --accent: #bc13fe; 
            --accent-glow: rgba(188, 19, 254, 0.5);
            --text: #ffffff; 
            --glass-bg: rgba(15, 15, 25, 0.7);
            --body-bg: #0b0f12;
            --card-border: rgba(255, 255, 255, 0.08);
        }

        body.light-mode {
            --text: #1a1a1a;
            --glass-bg: rgba(255, 255, 255, 0.8);
            --body-bg: #f0f2f5;
            --card-border: rgba(0, 0, 0, 0.1);
        }
        
        body { 
            background: var(--body-bg) url('https://cdn.pixground.com/storage/v1/render/image/public/wallpapers/7ce9c239-012c-4b86-a145-21e8edf7be29/p88gGVju6l.jpg?width=1280&quality=85&height=1080&resize=contain') no-repeat center center fixed;
            background-size: cover;
            color: var(--text); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            transition: background 0.5s ease, color 0.3s ease;
        }
        
        body::before {
            content: "";
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.3); z-index: -1;
        }
        body.light-mode::before { background: rgba(255, 255, 255, 0.4); }

        .top-controls {
            position: absolute; left: 20px; top: 30px; display: flex; gap: 10px; z-index: 2000;
        }
        .icon-btn {
            background: var(--glass-bg); border: 1px solid var(--card-border);
            width: 45px; height: 45px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(10px); transition: 0.3s; color: var(--text); font-size: 18px;
        }
        .icon-btn:hover { transform: scale(1.1); border-color: var(--accent); }

        .header-brand { display: flex; flex-direction: column; align-items: center; padding: 40px 10px 20px; }
        .header-brand img { width: 130px; filter: drop-shadow(0 0 15px var(--accent-glow)); margin-bottom: 10px; }
        .header-brand h1 { font-size: 28px; text-shadow: 0 0 10px var(--accent); margin: 0; }

        .top-bar { 
            position: sticky; top: 0; background: rgba(10, 10, 20, 0.6); backdrop-filter: blur(20px);
            z-index: 1000; padding: 15px 10px; border-bottom: 1px solid var(--card-border); 
        }
        body.light-mode .top-bar { background: rgba(255, 255, 255, 0.6); }

        .search-container { max-width: 600px; margin: auto; text-align: center; }
        .search-box input { 
            width: 100%; padding: 14px 25px; border-radius: 50px; border: 1px solid rgba(188, 19, 254, 0.3); 
            background: rgba(0, 0, 0, 0.5); color: #fff; outline: none; text-align: center; transition: 0.3s;
        }
        body.light-mode .search-box input { background: #fff; color: #000; }
        .search-box input:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

        .downloader-info { margin-top: 10px; font-size: 14px; background: rgba(188, 19, 254, 0.15); display: inline-block; padding: 5px 20px; border-radius: 20px; border: 1px solid rgba(188, 19, 254, 0.2); }
        .downloader-info span { color: var(--accent); font-weight: bold; text-shadow: 0 0 5px var(--accent-glow); }

        .categories-nav::-webkit-scrollbar { display: none; }
