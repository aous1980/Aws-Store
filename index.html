<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Store</title>

<style>
body{font-family:Arial;background:#f4f4f4;padding:20px}
.card{background:#fff;padding:10px;margin:10px 0;border-radius:10px}
img{max-width:100%}
</style>
</head>

<body>

<h2>🛒 المتجر</h2>

<div id="list"></div>

<script>

// 🔥 نفس المفتاح تماماً
let products = JSON.parse(localStorage.getItem("products") || "[]");

let list = document.getElementById("list");

// ⚠️ إذا لا يوجد منتجات
if(products.length === 0){
list.innerHTML = "🛒 لا توجد منتجات حالياً";
}

products.forEach((p)=>{
list.innerHTML += `
<div class="card">
<b>${p.name}</b><br>
<img src="${p.image}"><br>
<a href="${p.url}" target="_blank">تحميل</a><br>
IPTV: ${p.iptv}<br>
السعر: ${p.price}<br>
واتساب: ${p.phone}<br>
<p>${p.desc}</p>
</div>
`;
});

</script>

</body>
</html>
