<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aws Store | المتجر المتجاوب</title>
    <style>
        /* إعدادات تضمن ظهور العناصر على الشاشات الصغيرة */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background-color: #f0f2f5; 
            margin: 0; 
            padding: 0;
            display: block; /* لضمان عدم الاختفاء */
        }

        header { 
            background: #1a1a1a; 
            color: white; 
            padding: 25px 10px; 
            text-align: center; 
            width: 100%;
        }

        .container { 
            width: 100%; 
            max-width: 1200px; 
            margin: auto; 
            padding: 15px; 
        }

        .sec-title { 
            font-size: 20px; 
            color: #333; 
            margin: 20px 5px; 
            border-right: 4px solid #2563eb; 
            padding-right: 10px;
        }

        /* شبكة مرنة جداً للموبايل */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); /* يعرض عنصرين بجانب بعض في الموبايل */
            gap: 12px; 
        }

        /* في الحاسبة يعرض 4 أو أكثر */
        @media (min-width: 768px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
        }

        .card { 
            background: white; 
            border-radius: 15px; 
            padding: 15px; 
            text-align: center; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: 1px solid #ddd;
        }

        .card img { 
            width: 70px; 
            height: 70px; 
            border-radius: 15px; 
            object-fit: cover;
            background: #eee;
        }

        .card h3 { 
            font-size: 14px; 
            margin: 10px 0; 
            color: #000;
            height: 35px; /* لتوحيد الارتفاع */
            overflow: hidden;
        }

        .btn-dl { 
            background: #2563eb; 
            color: white; 
            text-decoration: none; 
            padding: 10px 5px; 
            border-radius: 10px; 
            display: block; 
            font-size: 13px; 
            font-weight: bold;
        }

        /* إذا كان المتجر فارغاً */
        #empty { text-align: center; padding: 50px; color: #888; display: none; }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0; font-size: 24px;">AWS STORE</h1>
</header>

<div class="container">
    <div id="satSection" style="display:none">
        <div class="sec-title">Sat Softwar</div>
        <div id="satGrid" class="grid"></div>
    </div>

    <div id="appsSection" style="display:none">
        <div class="sec-title">التطبيقات</div>
        <div id="appsGrid" class="grid"></div>
    </div>

    <div id="empty">لا توجد تطبيقات، أضفها من لوحة التحكم أولاً.</div>
</div>

<script>
    // التأكد من أن الكود يعمل حتى لو تأخر تحميل الصفحة
    function loadData() {
        const DB = "aws_store_db";
        const data = JSON.parse(localStorage.getItem(DB)) || [];
        
        if (data.length === 0) {
            document.getElementById('empty').style.display = 'block';
            return;
        }

        data.forEach(item => {
            const cardHTML = `
                <div class="card">
                    <img src="${item.img}" onerror="this.src='https://via.placeholder.com/70?text=App'">
                    <h3>${item.name}</h3>
                    <a href="${item.url}" class="btn-dl" target="_blank">تحميل</a>
                </div>`;
            
            if(item.cat === 'sat') {
                document.getElementById('satSection').style.display = 'block';
                document.getElementById('satGrid').innerHTML += cardHTML;
            } else {
                document.getElementById('appsSection').style.display = 'block';
                document.getElementById('appsGrid').innerHTML += cardHTML;
            }
        });
    }

    window.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
