<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aws Store | المتجر المتكامل</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #000; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        header { background: var(--primary); color: #fff; padding: 20px; text-align: center; sticky; top: 0; z-index: 100; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        .section { margin-bottom: 40px; }
        .section-title { border-right: 5px solid var(--primary); padding-right: 15px; margin-bottom: 20px; font-size: 22px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .card { background: #fff; border-radius: 18px; padding: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .card img { width: 70px; height: 70px; border-radius: 15px; object-fit: cover; }
        .dl-btn { display: block; background: var(--primary); color: #fff; text-decoration: none; padding: 10px; border-radius: 8px; margin-top: 10px; font-weight: bold; font-size: 13px; }
        @media (max-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <header><h1>Aws Store 🔐</h1></header>
    <div class="container" id="mainContainer">
        </div>

    <script>
        const firebaseConfig = { databaseURL: "https://aws-store-aaf40-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref();

        db.on('value', (snapshot) => {
            const container = document.getElementById('mainContainer');
            container.innerHTML = "";
            const data = snapshot.val();
            const apps = data.apps || {};
            const categories = data.categories || {};

            Object.values(categories).forEach(cat => {
                let sectionHTML = `
                    <div class="section">
                        <h2 class="section-title">${cat.name}</h2>
                        <div class="grid">`;
                
                let hasApps = false;
                Object.values(apps).forEach(app => {
                    if(app.cat === cat.name) {
                        hasApps = true;
                        sectionHTML += `
                            <div class="card">
                                <img src="${app.img}" onerror="this.src='https://via.placeholder.com/70'">
                                <h3>${app.name}</h3>
                                <a href="${app.url}" target="_blank" class="dl-btn">تـحـمـيـل</a>
                            </div>`;
                    }
                });

                if(!hasApps) sectionHTML += "<p style='color:gray;'>لا توجد تطبيقات في هذا القسم حالياً.</p>";
                
                sectionHTML += `</div></div>`;
                container.innerHTML += sectionHTML;
            });
        });
    </script>
</body>
</html>
