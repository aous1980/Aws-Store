<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akad Digital Store</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --accent: #00ff88; --bg: #0b0f12; --card: #161b20; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: var(--card); border-radius: 15px; padding: 15px; border: 1px solid #2d353b; text-align: center; }
        .img-box { background: white; border-radius: 10px; height: 120px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
        .img-box img { max-height: 90%; max-width: 90%; }
        .btn { display: block; padding: 10px; border-radius: 8px; text-decoration: none; font-weight: bold; margin-top: 10px; }
        .btn-wa { background: #25d366; color: white; }
        .btn-dl { background: var(--accent); color: black; }
    </style>
</head>
<body>

<h1 style="text-align:center; color:var(--accent);">AKAD DIGITAL STORE</h1>
<div id="cats" style="text-align:center; margin-bottom:20px;"></div>
<div class="grid" id="products"></div>

<script>
    // إعدادات Firebase الثابتة الخاصة بك
    const config = {
        apiKey: "AIzaSyBcWwHSDX9kWVxbw1DLgGkTJoYFSBsdeuk",
        databaseURL: "https://aws-store-aaf40-default-rtdb.firebaseio.com",
        projectId: "aws-store-aaf40"
    };
    firebase.initializeApp(config);
    const db = firebase.database();

    // جلب المنتجات (سيعيد عرض كل ما أضفته سابقاً)
    db.ref('apps').on('value', s => {
        const grid = document.getElementById('products');
        grid.innerHTML = "";
        s.forEach(p => {
            const d = p.val();
            const isApp = d.url && d.url !== "#";
            grid.innerHTML += `
                <div class="card">
                    <div class="img-box"><img src="${d.img || 'https://via.placeholder.com/100'}"></div>
                    <h3>${d.name}</h3>
                    <p style="color:var(--accent)">${d.ver || ''}</p>
                    ${isApp ? `<a href="${d.url}" class="btn btn-dl">⬇ تحميل</a>` : ''}
                    <a href="https://wa.me/9647700000000?text=طلب: ${d.name}" class="btn btn-wa">💬 طلب واتساب</a>
                </div>`;
        });
    });
</script>
</body>
</html>
