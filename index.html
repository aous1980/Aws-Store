<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aws Store | المتجر المتكامل</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>

    <style>
        :root { 
            --accent: #bc13fe; 
            --accent-glow: rgba(188, 19, 254, 0.5);
            --text: #ffffff; 
            --glass-bg: rgba(15, 15, 25, 0.7);
            --body-bg: #0b0f12;
            --card-border: rgba(255, 255, 255, 0.08);
        }

        /* تنسيق الوضع النهاري */
        body.light-mode {
            --text: #1a1a1a;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --body-bg: #f0f2f5;
            --card-border: rgba(0, 0, 0, 0.1);
        }
        
        body { 
            background: var(--body-bg) url('https://cdn.pixground.com/storage/v1/render/image/public/wallpapers/7ce9c239-012c-4b86-a145-21e8edf7be29/p88gGVju6l.jpg?width=1280&quality=85&height=1080&resize=contain') no-repeat center center fixed;
            background-size: cover;
            color: var(--text); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            transition: background 0.5s ease, color 0.3s ease;
        }
        
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: -1;
        }
        body.light-mode::before { background: rgba(255, 255, 255, 0.4); }

        /* زر تبديل الوضع */
        .theme-toggle {
            position: absolute;
            left: 20px;
            top: 40px;
            background: var(--glass-bg);
            border: 1px solid var(--card-border);
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: 0.3s;
            z-index: 1001;
        }

        /* زر المشاركة العائم */
        .share-fab {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: var(--accent);
            color: white;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 20px var(--accent-glow);
            z-index: 2000;
            transition: 0.3s;
            font-size: 24px;
        }
        .share-fab:hover { transform: scale(1.1) rotate(-10deg); }

        .header-brand { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 40px 10px 20px; 
        }
