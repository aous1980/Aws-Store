<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Aws Store</title>
    <style>
        body { background: #111; color: #fff; font-family: Arial; text-align: center; padding: 20px; }
        .section-title { background: #fff; color: #000; padding: 10px; display: inline-block; min-width: 200px; margin: 20px 0; font-weight: bold; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-bottom: 50px; }
        .card { background: #1e1e1e; border-radius: 10px; width: 200px; padding: 15px; border: 1px solid #333; }
        .card img { width: 100%; height: 120px; border-radius: 8px; object-fit: cover; }
        .btn-down { background: #fff; color: #000; padding: 5px 20px; text-decoration: none; display: inline-block; margin-top: 10px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="section-title">التطبيقات</div>
    <div id="apps_container" class="container"></div>

    <div class="section-title">Sat Softwar</div>
    <div id="sat_container" class="container"></div>

    <script>
        function loadStore() {
            const data = JSON.parse(localStorage.getItem("store_data")) || [];
            const appsBox = document.getElementById("apps_container");
            const satBox = document.getElementById("sat_container");

            data.forEach(item => {
                const cardHTML = `
                    <div class="card">
                        <img src="${item.img}">
                        <h3>${item.name}</h3>
                        <a href="${item.url}" class="btn-down">downloade</a>
                    </div>
                `;

                if(item.category === "apps") {
                    appsBox.innerHTML += cardHTML;
                } else {
                    satBox.innerHTML += cardHTML;
                }
            });
        }
        loadStore();
    </script>
</body>
</html>
