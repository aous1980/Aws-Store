<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Aws Store - Sat Softwar</title>
    <style>
        body { background: #111; color: #fff; font-family: Arial, sans-serif; text-align: center; padding: 20px; margin: 0; }
        .section-title { background: #fff; color: #000; padding: 10px 30px; display: inline-block; margin: 30px 0; font-weight: bold; border-radius: 5px; font-size: 20px; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; min-height: 50px; padding: 10px; }
        .card { background: #1e1e1e; border: 1px solid #333; border-radius: 15px; width: 220px; padding: 15px; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: #555; }
        .card img { width: 100%; height: 130px; border-radius: 10px; object-fit: cover; background: #222; }
        .card h3 { font-size: 18px; margin: 15px 0 5px 0; }
        .card .device-info { font-size: 12px; color: #888; margin-bottom: 15px; }
        .btn-down { background: #fff; color: #000; text-decoration: none; padding: 10px 0; width: 100%; display: block; border-radius: 6px; font-weight: bold; text-transform: lowercase; }
        .btn-down:hover { background: #eee; }
    </style>
</head>
<body>

    <div class="section-title">التطبيقات</div>
    <div id="apps_container" class="container"></div>

    <div class="section-title">Sat Softwar</div>
    <div id="sat_container" class="container"></div>

    <script>
        const DB_KEY = 'aws_store_final_db';

        function loadStore() {
            const data = JSON.parse(localStorage.getItem(DB_KEY)) || [];
            const appsBox = document.getElementById("apps_container");
            const satBox = document.getElementById("sat_container");

            appsBox.innerHTML = "";
            satBox.innerHTML = "";

            data.forEach(item => {
                const cardHTML = `
                    <div class="card">
                        <img src="${item.img}" onerror="this.src='https://via.placeholder.com/150?text=No+Logo'">
                        <h3>${item.name}</h3>
                        <div class="device-info">اسم الجهاز</div>
                        <a href="${item.url}" class="btn-down" target="_blank">downloade</a>
                    </div>
                `;

                if(item.cat === "apps") {
                    appsBox.innerHTML += cardHTML;
                } else {
                    satBox.innerHTML += cardHTML;
                }
            });
        }
        
        // تحديث المتجر عند كل زيارة
        window.onload = loadStore;
    </script>
</body>
</html>
