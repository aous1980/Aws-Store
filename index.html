<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aws Store | متجر التطبيقات</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --main-bg: #0b0f12; --card-bg: #161b20; --accent: #00ff88; --text: #ffffff; }
        body { background: var(--main-bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; }
        
        /* البحث */
        .search-container { padding: 20px; position: sticky; top: 0; background: var(--main-bg); z-index: 1000; }
        .search-box { width: 100%; max-width: 800px; margin: auto; position: relative; }
        .search-box input { width: 100%; padding: 15px 45px 15px 15px; border-radius: 12px; border: 1px solid #2d353b; background: #1c2329; color: #fff; font-size: 16px; outline: none; box-sizing: border-box;}
        
        .container { max-width: 1100px; margin: auto; padding: 10px; }
        
        /* القسم */
        .section-header { margin: 25px 10px 15px; font-size: 20px; font-weight: bold; color: var(--accent); display: flex; align-items: center; gap: 10px; }

        /* الشبكة */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }

        /* بطاقة التطبيق */
        .app-card { background: var(--card-bg); border-radius: 15px; padding: 15px; position: relative; border: 1px solid #232a31; transition: 0.3s; }
        .app-card:hover { border-color: var(--accent); }
        
        .card-top { display: flex; gap: 15px; margin-bottom: 15px; }
        .app-icon { width: 65px; height: 65px; border-radius: 12px; object-fit: cover; }
        .app-info { flex: 1; }
        .app-name { font-size: 17px; font-weight: bold; margin: 0; }
        .app-cat { font-size: 12px; color: #8b96a0; margin-top: 5px; }
        .app-ver { position: absolute; left: 15px; top: 40px; background: #1c2329; color: var(--accent); padding: 2px 8px; border-radius: 5px; font-size: 10px; border: 1px solid #2d353b; }

        .btn-group { display: flex; gap: 8px; }
        .btn { flex: 1; padding: 12px; border-radius: 8px; text-decoration: none; text-align: center; font-weight: bold; font-size: 14px; transition: 0.2s; }
        .btn-main { background: var(--accent); color: #000; }
        .btn-sub { background: #232a31; color: #fff; }
        .btn:active { transform: scale(0.95); }

        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="search-container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="ابحث عن تطبيق..." oninput="searchApps()">
        </div>
    </div>

    <div class="container" id="mainStore"></div>

    <script>
        const firebaseConfig = { databaseURL: "https://aws-store-aaf40-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allApps = [];
        let allCats = [];

        // جلب البيانات
        db.ref().on('value', snap => {
            const data = snap.val();
            allApps = data.apps ? Object.values(data.apps).sort((a,b) => a.order - b.order) : [];
            allCats = data.categories ? Object.values(data.categories) : [];
            renderStore(allApps);
        });

        function renderStore(apps) {
            const container = document.getElementById('mainStore');
            container.innerHTML = "";

            allCats.forEach(cat => {
                const catApps = apps.filter(a => a.cat === cat.name);
                if(catApps.length > 0) {
                    let section = `<div class="section"><div class="section-header"># ${cat.name}</div><div class="grid">`;
                    catApps.forEach(app => {
                        section += `
                            <div class="app-card">
                                <span class="app-ver">${app.ver || 'v1.0'}</span>
                                <div class="card-top">
                                    <img src="${app.img}" class="app-icon" onerror="this.src='https://via.placeholder.com/65'">
                                    <div class="app-info">
                                        <p class="app-name">${app.name}</p>
                                        <p class="app-cat">${app.cat}</p>
                                    </div>
                                </div>
                                <div class="btn-group">
                                    <a href="${app.url}" class="btn btn-main">📥 تحميل</a>
                                    <a href="#" class="btn btn-sub">⚙️ المشغل</a>
                                </div>
                            </div>`;
                    });
                    section += `</div></div>`;
                    container.innerHTML += section;
                }
            });
        }

        function searchApps() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allApps.filter(a => a.name.toLowerCase().includes(query));
            renderStore(filtered);
        }
    </script>
</body>
</html>
