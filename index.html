<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aws Store | المتجر الكامل</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --main-bg: #0b0f12; --card-bg: #161b20; --accent: #00ff88; --text: #ffffff; }
        body { background: var(--main-bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 30px; }
        
        /* الهيدر والبحث */
        .top-bar { position: sticky; top: 0; background: var(--main-bg); z-index: 1000; padding: 15px; border-bottom: 1px solid #1c2329; }
        .search-box input { width: 100%; max-width: 600px; display: block; margin: auto; padding: 12px; border-radius: 10px; border: 1px solid #2d353b; background: #1c2329; color: #fff; outline: none; }
        
        .container { max-width: 1100px; margin: auto; padding: 15px; }
        .section-title { color: var(--accent); font-size: 20px; font-weight: bold; margin: 25px 0 15px; border-right: 4px solid var(--accent); padding-right: 10px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
        
        /* بطاقة التطبيق */
        .app-card { background: var(--card-bg); border-radius: 15px; padding: 15px; border: 1px solid #232a31; position: relative; }
        .app-ver { position: absolute; left: 15px; top: 15px; color: var(--accent); font-weight: bold; font-size: 12px; }
        .card-body { display: flex; gap: 15px; align-items: center; margin-bottom: 15px; }
        .app-icon { width: 60px; height: 60px; border-radius: 12px; object-fit: cover; background: #252525; }
        .app-name { font-size: 16px; font-weight: bold; margin: 0; }
        .app-cat { font-size: 12px; color: #888; margin-top: 4px; }
        
        .btn-group { display: flex; gap: 8px; }
        .btn { flex: 1; padding: 10px; border-radius: 8px; text-decoration: none; text-align: center; font-weight: bold; font-size: 14px; transition: 0.2s; }
        .btn-dl { background: var(--accent); color: #000; }
        .btn-sub { background: #232a31; color: #fff; }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="ابحث عن تطبيق..." oninput="fetchData()">
        </div>
    </div>

    <div class="container" id="storeContent">
        </div>

    <script>
        const firebaseConfig = { databaseURL: "https://aws-store-aaf40-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function fetchData() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            
            // جلب الأقسام والتطبيقات معاً
            db.ref().on('value', snap => {
                const data = snap.val();
                if (!data) return;

                const apps = data.apps ? Object.values(data.apps) : [];
                const categories = data.categories ? Object.values(data.categories) : [];
                const container = document.getElementById('storeContent');
                container.innerHTML = ""; // تنظيف المتجر قبل الرسم الجديد

                // ترتيب التطبيقات حسب الـ order (الأحدث أولاً أو حسب ترتيبك في اللوحة)
                apps.sort((a, b) => (a.order || 0) - (b.order || 0));

                categories.forEach(cat => {
                    // فلترة التطبيقات التي تنتمي لهذا القسم وتطابق البحث
                    const filteredApps = apps.filter(app => 
                        app.cat === cat.name && 
                        app.name.toLowerCase().includes(query)
                    );

                    if (filteredApps.length > 0) {
                        let sectionHTML = `<div class="section"><div class="section-title">${cat.name}</div><div class="grid">`;
                        
                        filteredApps.forEach(app => {
                            sectionHTML += `
                                <div class="app-card">
                                    <span class="app-ver">${app.ver || 'v1.0'}</span>
                                    <div class="card-body">
                                        <img src="${app.img}" class="app-icon" onerror="this.src='https://via.placeholder.com/60'">
                                        <div>
                                            <p class="app-name">${app.name}</p>
                                            <p class="app-cat">${app.cat}</p>
                                        </div>
                                    </div>
                                    <div class="btn-group">
                                        <a href="${app.url}" class="btn btn-dl">📥 تحميل</a>
                                        <a href="#" class="btn btn-sub">المشغل</a>
                                    </div>
                                </div>`;
                        });

                        sectionHTML += `</div></div>`;
                        container.innerHTML += sectionHTML; // إضافة القسم بالكامل للمتجر
                    }
                });
            });
        }

        // التشغيل الأول
        fetchData();
    </script>
</body>
</html>
