<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aws Store | المتجر المتكامل</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { 
            /* المتغيرات اللونية بناءً على الخلفية الجديدة */
            --accent: #bc13fe; /* بنفسجي مشع */
            --accent-glow: rgba(188, 19, 254, 0.5);
            --text: #ffffff; 
            --glass-bg: rgba(15, 15, 25, 0.7);
        }
        
        body { 
            background: #0b0f12 url('https://cdn.pixground.com/storage/v1/render/image/public/wallpapers/7ce9c239-012c-4b86-a145-21e8edf7be29/p88gGVju6l.jpg?width=1280&quality=85&height=1080&resize=contain') no-repeat center center fixed;
            background-size: cover;
            color: var(--text); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }
        
        /* تأثير التغبيش العام للخلفية لسهولة القراءة */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.3); /* تعتيم خفيف */
            z-index: -1;
        }

        .header-brand { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 40px 10px 20px; 
        }
        .header-brand img { 
            width: 150px; 
            filter: drop-shadow(0 0 15px var(--accent-glow));
            margin-bottom: 10px;
        }
        .header-brand h1 { 
            font-size: 28px; 
            color: #fff; 
            text-shadow: 0 0 10px var(--accent);
            margin: 0;
        }

        /* شريط البحث الزجاجي */
        .top-bar { 
            position: sticky; 
            top: 0; 
            background: rgba(10, 10, 20, 0.6); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 1000; 
            padding: 15px 10px; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); 
        }
        .search-box { max-width: 600px; margin: auto; }
        .search-box input { 
            width: 100%; 
            padding: 14px 25px; 
            border-radius: 50px; 
            border: 1px solid rgba(188, 19, 254, 0.3); 
            background: rgba(0, 0, 0, 0.5); 
            color: #fff; 
            outline: none; 
            box-sizing: border-box; 
            transition: 0.3s;
        }
        .search-box input:focus { 
            border-color: var(--accent); 
            box-shadow: 0 0 20px var(--accent-glow);
        }

        /* البطاقات بتأثير زجاجي متوافق مع الخلفية */
        .app-card { 
            background: var(--glass-bg); 
            backdrop-filter: blur(15px);
            border-radius: 25px; 
            padding: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .app-card:hover { 
            transform: translateY(-10px) scale(1.02); 
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .app-ver { 
            position: absolute; left: 20px; top: 20px; 
            color: #fff; background: var(--accent); 
            padding: 3px 10px; border-radius: 8px; font-size: 11px; font-weight: bold;
        }

        .btn-dl { 
            background: linear-gradient(45deg, var(--accent), #4facfe); 
            color: #fff; 
            border: none;
            box-shadow: 0 4px 15px rgba(188, 19, 254, 0.4);
        }
        .btn-sub { 
            background: rgba(255, 255, 255, 0.05); 
            color: #fff; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }

        .container { max-width: 1200px; margin: auto; padding: 20px; flex: 1; width: 100%; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .section-title { 
            color: #fff; font-size: 22px; margin: 40px 0 20px; 
            border-right: 5px solid var(--accent); padding-right: 15px; 
        }

        .cat-btn { 
            background: rgba(255, 255, 255, 0.05); color: #eee; 
            border: 1px solid rgba(255, 255, 255, 0.1); padding: 10px 25px; 
            border-radius: 50px; cursor: pointer; transition: 0.3s;
        }
        .cat-btn.active { 
            background: var(--accent); color: #fff; border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        footer { 
            text-align: center; padding: 50px; 
            background: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        footer strong { color: var(--accent); }

        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="header-brand">
        <img src="https://i.ibb.co/MxWwN7d8/aws-stor.png" alt="Aws Store Logo">
        <h1>Aws Store</h1>
    </div>

    <div class="top-bar">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="ابحث عن السحر..." oninput="renderAll()">
        </div>
        <div class="categories-nav" id="catNav" style="display: flex; gap: 10px; overflow-x: auto; padding: 15px 5px; max-width: 800px; margin: auto; scrollbar-width: none;">
            <button class="cat-btn active" onclick="filterByCat('الكل', this)">الكل</button>
        </div>
    </div>

    <div class="container" id="storeContainer"></div>

    <footer>
        <p>جميع الحقوق محفوظة &copy; 2026 <strong>Aws Store</strong></p>
        <p style="opacity:0.7; font-size: 12px; margin-top: 10px;">Powered by <strong>AWS Infrastructure</strong></p>
    </footer>

    <script>
        const firebaseConfig = { databaseURL: "https://aws-store-aaf40-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let allApps = []; let allCats = []; let currentFilter = "الكل";

        db.ref().on('value', snap => {
            const data = snap.val(); if (!data) return;
            allApps = data.apps ? Object.values(data.apps).sort((a,b) => (a.order || 0) - (b.order || 0)) : [];
            allCats = data.categories ? Object.values(data.categories) : [];
            updateCatNav(); renderAll();
        });

        function updateCatNav() {
            const nav = document.getElementById('catNav');
            const currentActive = currentFilter;
            nav.innerHTML = `<button class="cat-btn ${currentActive === 'الكل' ? 'active' : ''}" onclick="filterByCat('الكل', this)">الكل</button>`;
            allCats.forEach(cat => {
                nav.innerHTML += `<button class="cat-btn ${currentActive === cat.name ? 'active' : ''}" onclick="filterByCat('${cat.name}', this)">${cat.name}</button>`;
            });
        }

        function filterByCat(catName, btn) {
            currentFilter = catName;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active'); renderAll();
        }

        function renderAll() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const container = document.getElementById('storeContainer');
            container.innerHTML = "";
            const targetCats = currentFilter === "الكل" ? allCats : allCats.filter(c => c.name === currentFilter);
            targetCats.forEach(cat => {
                const filteredApps = allApps.filter(app => app.cat === cat.name && app.name.toLowerCase().includes(query));
                if (filteredApps.length > 0) {
                    let sectionHTML = `<div class="section"><div class="section-title">${cat.name}</div><div class="grid">`;
                    filteredApps.forEach(app => {
                        sectionHTML += `
                            <div class="app-card" style="position:relative;">
                                <span class="app-ver">${app.ver || 'v1.0'}</span>
                                <div class="card-body" style="display:flex; gap:15px; align-items:center; margin-bottom:20px; margin-top:10px;">
                                    <img src="${app.img}" style="width:75px; height:75px; border-radius:20px; object-fit:cover;" onerror="this.src='https://via.placeholder.com/80/252525/ffffff?text=App'">
                                    <div>
                                        <p style="font-size:18px; font-weight:bold; margin:0;">${app.name}</p>
                                        <p style="font-size:13px; color:rgba(255,255,255,0.6); margin-top:5px;">${app.cat}</p>
                                    </div>
                                </div>
                                <div class="btn-group" style="display:flex; gap:10px;">
                                    <a href="${app.url}" class="btn btn-dl" style="flex:1; padding:12px; border-radius:15px; text-decoration:none; text-align:center; font-weight:bold;">📥 تحميل</a>
                                    <a href="#" class="btn btn-sub" style="flex:1; padding:12px; border-radius:15px; text-decoration:none; text-align:center; font-weight:bold;">المشغل</a>
                                </div>
                            </div>`;
                    });
                    sectionHTML += `</div></div>`; container.innerHTML += sectionHTML;
                }
            });
        }
    </script>
</body>
</html>
