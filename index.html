<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aws Store | المتجر المتكامل</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { 
            --accent: #bc13fe; 
            --accent-glow: rgba(188, 19, 254, 0.5);
            --text: #ffffff; 
            --glass-bg: rgba(15, 15, 25, 0.7);
            --body-bg: #0b0f12;
            --card-border: rgba(255, 255, 255, 0.08);
        }

        body.light-mode {
            --text: #1a1a1a;
            --glass-bg: rgba(255, 255, 255, 0.8);
            --body-bg: #f0f2f5;
            --card-border: rgba(0, 0, 0, 0.1);
        }
        
        body { 
            background: var(--body-bg) url('https://cdn.pixground.com/storage/v1/render/image/public/wallpapers/7ce9c239-012c-4b86-a145-21e8edf7be29/p88gGVju6l.jpg?width=1280&quality=85&height=1080&resize=contain') no-repeat center center fixed;
            background-size: cover;
            color: var(--text); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            transition: 0.5s ease;
        }
        
        body::before {
            content: "";
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.3); z-index: -1;
        }

        /* --- تأثيرات الماوس والتحكم --- */
        .top-controls {
            position: absolute; left: 20px; top: 30px; display: flex; gap: 10px; z-index: 2000;
        }

        .icon-btn {
            background: var(--glass-bg); border: 1px solid var(--card-border);
            width: 45px; height: 45px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(10px); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--text); font-size: 18px;
        }

        .icon-btn:hover {
            transform: scale(1.15) rotate(15deg);
            background: var(--accent);
            color: white;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .header-brand { display: flex; flex-direction: column; align-items: center; padding: 40px 10px 20px; }
        .header-brand img { width: 130px; filter: drop-shadow(0 0 15px var(--accent-glow)); margin-bottom: 10px; transition: 0.5s; }
        .header-brand:hover img { transform: scale(1.05); }
        .header-brand h1 { font-size: 28px; text-shadow: 0 0 10px var(--accent); margin: 0; }

        .top-bar { 
            position: sticky; top: 0; background: rgba(10, 10, 20, 0.6); backdrop-filter: blur(20px);
            z-index: 1000; padding: 15px 10px; border-bottom: 1px solid var(--card-border); 
        }

        .search-container { max-width: 600px; margin: auto; text-align: center; }
        .search-box input { 
            width: 100%; padding: 14px 25px; border-radius: 50px; border: 1px solid rgba(188, 19, 254, 0.3); 
            background: rgba(0, 0, 0, 0.5); color: #fff; outline: none; text-align: center; transition: 0.3s;
        }
        .search-box input:focus { border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }

        .downloader-info { margin-top: 10px; font-size: 14px; background: rgba(188, 19, 254, 0.15); display: inline-block; padding: 5px 20px; border-radius: 20px; border: 1px solid var(--accent); }
        .downloader-info span { color: var(--accent); font-weight: bold; }

        .categories-nav { display: flex; gap: 10px; overflow-x: auto; padding: 15px 5px; max-width: 800px; margin: auto; scrollbar-width: none; }
        .cat-btn { 
            background: rgba(255, 255, 255, 0.05); color: var(--text); border: 1px solid var(--card-border); 
            padding: 8px 22px; border-radius: 50px; cursor: pointer; white-space: nowrap; transition: 0.3s; 
        }
        .cat-btn:hover:not(.active) { transform: translateY(-3px); background: rgba(188, 19, 254, 0.1); border-color: var(--accent); }
        .cat-btn.active { background: var(--accent); color: #fff; box-shadow: 0 0 12px var(--accent-glow); }

        .container { max-width: 1200px; margin: auto; padding: 20px; flex: 1; width: 100%; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        
        .section-title { font-size: 20px; margin: 30px 0 15px; border-right: 4px solid var(--accent); padding-right: 12px; }

        /* تأثيرات البطاقات */
        .app-card { 
            background: var(--glass-bg); backdrop-filter: blur(15px); border-radius: 22px; 
            padding: 18px; border: 1px solid var(--card-border); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative;
        }
        .app-card:hover { 
            transform: translateY(-10px); 
            border-color: var(--accent); 
            box-shadow: 0 15px 30px rgba(188, 19, 254, 0.2);
        }

        .app-ver { position: absolute; left: 15px; top: 15px; color: #fff; background: var(--accent); padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; }

        .card-body img { width: 70px; height: 70px; border-radius: 18px; object-fit: cover; transition: 0.5s; }
        .app-card:hover .card-body img { transform: rotate(5deg) scale(1.1); }

        /* أزرار التحميل مع اللمعان */
        .btn-group { display: flex; gap: 8px; margin-top: 10px; }
        .btn-dl { 
            background: linear-gradient(45deg, var(--accent), #4facfe); color: #fff; flex: 1; padding: 10px; 
            border-radius: 12px; text-decoration: none; text-align: center; font-weight: bold; 
            position: relative; overflow: hidden; transition: 0.3s;
        }
        .btn-dl::after {
            content: ''; position: absolute; top: -50%; left: -60%; width: 20%; height: 200%;
            background: rgba(255, 255, 255, 0.4); transform: rotate(30deg); transition: 0.5s; opacity: 0;
        }
        .btn-dl:hover::after { left: 120%; opacity: 1; }
        .btn-dl:hover { transform: translateY(-2px); box-shadow: 0 5px 15px var(--accent-glow); }

        .btn-sub { background: rgba(255, 255, 255, 0.1); color: var(--text); flex: 1; padding: 10px; border-radius: 12px; text-decoration: none; text-align: center; border: 1px solid var(--card-border); transition: 0.3s; }
        .btn-sub:hover { background: rgba(255, 255, 255, 0.2); }

        footer { text-align: center; padding: 40px; background: rgba(0, 0, 0, 0.5); border-top: 1px solid var(--card-border); }

        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } .top-controls { top: 15px; left: 15px; } }
    </style>
</head>
<body id="mainBody">

    <div class="top-controls">
        <div class="icon-btn" onclick="toggleTheme()" id="themeBtn" title="تبديل الوضع">🌙</div>
        <div class="icon-btn" onclick="shareStore()" title="مشاركة المتجر">🔗</div>
    </div>

    <div class="header-brand">
        <img src="https://i.ibb.co/MxWwN7d8/aws-stor.png" alt="Aws Store Logo">
        <h1>Aws Store</h1>
    </div>

    <div class="top-bar">
        <div class="search-container">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="ابحث عن تطبيق..." oninput="renderAll()">
            </div>
            <div class="downloader-info">كود الداونلودر: <span>4131623</span></div>
        </div>
        <div class="categories-nav" id="catNav">
            <button class="cat-btn active" onclick="filterByCat('الكل', this)">الكل</button>
        </div>
    </div>

    <div class="container" id="storeContainer"></div>

    <footer>
        <p>جميع الحقوق محفوظة &copy; 2026 <strong>Aws Store</strong></p>
    </footer>

            document.getElementById('themeBtn').innerText = body.classList.contains('light-mode') ? "☀️" : "🌙";
